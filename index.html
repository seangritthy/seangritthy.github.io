<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Exo+2:wght@300;400;600&family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d; --secondary: #7b61ff;
            --dark-bg: #0a0a0f; --card-bg: #13131f;
            --cyber-blue: #00ccff; --cyber-yellow: #fff200;
            --accent: #ff00e5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Exo 2', 'Noto Sans SC', 'Battambang', sans-serif; 
            background: var(--dark-bg); color: white; min-height: 100vh;
            background-image: linear-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        header {
            padding: 40px 20px 20px; background: rgba(10, 10, 15, 0.95); text-align: center;
            border-bottom: 2px solid var(--primary); box-shadow: 0 0 25px rgba(0, 255, 157, 0.3);
            position: sticky; top: 0; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.3, 1, 0.2, 1);
            will-change: transform;
        }
        .header-hidden { transform: translateY(-100%); }
        
        /* Menu Toggle Styles */
        #menuToggle {
            position: absolute; top: 20px; left: 20px; cursor: pointer; color: var(--primary); 
            font-family: 'Orbitron'; font-weight: bold; border: 1px solid var(--primary); 
            padding: 5px 10px; border-radius: 4px;
        }

        .ui-lang-wrapper { position: absolute; top: 15px; right: 20px; }
        .ui-lang-select {
            background: rgba(0, 0, 0, 0.8); border: 1px solid var(--primary); color: var(--primary);
            padding: 5px 10px; font-family: 'Share Tech Mono', 'Noto Sans SC', 'Battambang', monospace; outline: none; cursor: pointer;
            border-radius: 4px; transition: all 0.3s;
        }

        h1 { font-family: 'Orbitron', 'Noto Sans SC', 'Battambang', sans-serif; color: var(--primary); margin-bottom: 20px; font-size: 2.8rem; text-shadow: 0 0 15px rgba(0, 255, 157, 0.6); letter-spacing: 4px; }
        
        /* Menu Area */
        #collapsibleMenu { display: none; margin-top: 20px; }
        .search-container { display: flex; justify-content: center; gap: 15px; max-width: 600px; margin: 0 auto; flex-wrap: wrap; }
        #searchInput { flex: 1; padding: 12px 15px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--secondary); color: var(--primary); font-family: 'Share Tech Mono', 'Noto Sans SC', 'Battambang', monospace; font-size: 1rem; outline: none; }
        #searchBtn { padding: 12px 24px; border: 1px solid var(--primary); background: rgba(0, 255, 157, 0.1); color: var(--primary); font-family: 'Orbitron', 'Noto Sans SC', 'Battambang', sans-serif; font-weight: bold; cursor: pointer; }
        
        .type-selector, .category-selector { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .type-btn, .cat-btn, .lang-btn { padding: 8px 20px; background: rgba(0, 255, 157, 0.05); border: 1px solid var(--secondary); color: var(--secondary); cursor: pointer; font-family: 'Share Tech Mono', 'Noto Sans SC', 'Battambang', monospace; }
        .type-btn.active, .cat-btn.active, .lang-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .filter-alert { background: rgba(255,0,229,0.2); border: 1px solid var(--accent); color: #fff; display: none; }
        
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 35px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .movie-card { background: var(--card-bg); border: 1px solid var(--secondary); overflow: hidden; cursor: pointer; transition: all 0.3s ease; position: relative; border-radius: 5px; }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 255, 157, 0.4); }
        .movie-poster { width: 100%; height: 330px; object-fit: cover; }
        .movie-info { padding: 15px; }
        .movie-title { font-family: 'Orbitron', 'Noto Sans SC', 'Battambang', sans-serif; font-size: 1.1rem; color: var(--primary); }
        
        .loading { text-align: center; padding: 60px; color: var(--primary); grid-column: 1 / -1; font-size: 1.2rem; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pagination { display: none; justify-content: center; align-items: center; gap: 20px; padding: 20px; }
        .page-btn { padding: 10px 20px; background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary); color: var(--primary); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body>
    <header id="mainHeader">
        <div id="menuToggle">≡ MENU</div>
        <div class="ui-lang-wrapper">
            <select id="uiLangSelect" class="ui-lang-select">
                <option value="en">🇬🇧 English</option>
                <option value="km">🇰🇭 ភាសាខ្មែរ</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
        </div>

        <h1 id="siteTitle">MVHD CYBERCINEMA</h1>
        
        <div id="collapsibleMenu">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search...">
                <button id="searchBtn">🔍 SEARCH</button>
            </div>
            
            <div class="type-selector">
                <button id="movieBtn" class="type-btn active">🎥 MOVIES</button>
                <button id="tvBtn" class="type-btn">📺 TV SHOWS</button>
                <button id="resetFilterBtn" class="type-btn filter-alert">✖ CLEAR FILTER</button>
            </div>

            <div class="category-selector">
                <button class="cat-btn active" data-cat="popular" id="catPopular">🔥 POPULAR</button>
                <button class="cat-btn" data-cat="trending" id="catTrending">📈 TRENDING</button>
                <button class="cat-btn" data-cat="top_rated" id="catTopRated">⭐ TOP RATED</button>
            </div>

            <div class="category-selector">
                <button class="lang-btn active" data-lang="" id="langAll">🌐 ALL LANGUAGES</button>
                <button class="lang-btn" data-lang="km" id="langKhmer">🇰🇭 KHMER</button>
                <button class="lang-btn" data-lang="en" id="langEnglish">🇬🇧 ENGLISH</button>
                <button class="lang-btn" data-lang="zh" id="langChinese">🇨🇳 CHINESE</button>
            </div>
        </div>
    </header>

    <main>
        <div id="moviesGrid" class="movies-grid">
            <div class="loading"><div class="spinner"></div><div id="initText">INITIALIZING...</div></div>
        </div>

        <div class="pagination" id="pagination">
            <button id="prevBtn" class="page-btn">← PREV</button>
            <span id="pageInfo" style="font-family: monospace;">PAGE 1</span>
            <button id="nextBtn" class="page-btn">NEXT →</button>
        </div>
    </main>

    <script>
        // Toggle Logic
        document.getElementById('menuToggle').onclick = () => {
            const menu = document.getElementById('collapsibleMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        };

        // Scroll Logic
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY && window.scrollY > 100) document.getElementById('mainHeader').classList.add('header-hidden');
            else document.getElementById('mainHeader').classList.remove('header-hidden');
            lastScrollY = window.scrollY;
        });

        // Language and Data Logic
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        let currentPage = 1;
        let currentType = new URLSearchParams(window.location.search).get('type') || 'movie';
        let currentCategory = 'popular';
        let currentLanguage = '';

        async function fetchDashboardData() {
            const lang = localStorage.getItem('uiLang') || 'en';
            const tmdbLang = lang === 'km' ? 'km-KH' : (lang === 'zh' ? 'zh-CN' : 'en-US');
            
            let url = `https://api.themoviedb.org/3/${currentType}/${currentCategory}?api_key=${TMDB_API_KEY}&language=${tmdbLang}&page=${currentPage}`;
            if(currentCategory === 'trending') url = `https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
            
            const res = await fetch(url);
            const data = await res.json();
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = data.results.map(m => `
                <div class="movie-card" onclick="window.location.href='play.html?tmdb=${m.id}&type=${currentType}'">
                    <img class="movie-poster" src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="movie-info"><div class="movie-title">${m.title || m.name}</div></div>
                </div>`).join('');
            document.getElementById('pagination').style.display = 'flex';
        }

        document.getElementById('uiLangSelect').onchange = (e) => { localStorage.setItem('uiLang', e.target.value); location.reload(); };
        document.getElementById('nextBtn').onclick = () => { currentPage++; fetchDashboardData(); };
        document.getElementById('prevBtn').onclick = () => { if(currentPage > 1) { currentPage--; fetchDashboardData(); } };
        
        fetchDashboardData();
    </script>
</body>
</html>
