<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Exo+2:wght@300;400;600&family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff9d; --secondary: #7b61ff; --dark-bg: #0a0a0f; --card-bg: #13131f; --cyber-blue: #00ccff; --accent: #ff00e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Exo 2', 'Noto Sans SC', 'Battambang', sans-serif; background: var(--dark-bg); color: white; min-height: 100vh; }

        .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 2100; background: var(--primary); color: #000; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        #sideDrawer { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: rgba(10, 10, 15, 0.98); border-right: 2px solid var(--primary); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000; padding: 80px 20px; }
        #sideDrawer.open { left: 0; }

        .ui-lang-select { background: #000; border: 1px solid var(--primary); color: var(--primary); padding: 5px; width: 100%; margin-bottom: 20px; cursor: pointer; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 10px; border: 1px solid var(--secondary); background: transparent; color: white; cursor: pointer; text-align: left; }
        .btn.active { border-color: var(--primary); color: var(--primary); }

        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 80px 20px; }
        .movie-card { background: var(--card-bg); cursor: pointer; border-radius: 5px; overflow: hidden; }
        .movie-poster { width: 100%; height: 280px; object-fit: cover; }
        .movie-info { padding: 10px; }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="document.getElementById('sideDrawer').classList.toggle('open')">≡ MENU</div>
    <aside id="sideDrawer">
        <select id="uiLangSelect" class="ui-lang-select">
            <option value="en">🇬🇧 English</option>
            <option value="km">🇰🇭 ភាសាខ្មែរ</option>
            <option value="zh">🇨🇳 中文</option>
        </select>
        <div class="btn-group">
            <button class="btn active" onclick="window.location.href='index.html?type=movie'">🎥 MOVIES</button>
            <button class="btn" onclick="window.location.href='index.html?type=tv'">📺 TV SHOWS</button>
        </div>
    </aside>
    <main><div id="moviesGrid" class="movies-grid"></div></main>
    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        async function loadMovies() {
            const lang = localStorage.getItem('uiLang') || 'en';
            const tmdbLang = lang === 'km' ? 'km-KH' : (lang === 'zh' ? 'zh-CN' : 'en-US');
            const type = new URLSearchParams(window.location.search).get('type') || 'movie';
            const res = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${TMDB_API_KEY}&language=${tmdbLang}`);
            const data = await res.json();
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = data.results.map(m => `
                <div class="movie-card" onclick="window.location.href='play.html?tmdb=${m.id}&type=${type}'">
                    <img class="movie-poster" src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="movie-info"><div class="movie-title">${m.title || m.name}</div></div>
                </div>`).join('');
        }
        document.getElementById('uiLangSelect').onchange = (e) => { localStorage.setItem('uiLang', e.target.value); location.reload(); };
        loadMovies();
    </script>
</body>
</html>
