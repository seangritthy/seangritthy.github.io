<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Movies</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=Sora:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6f5cff;
            --secondary: #4d7cff;
            --accent: #14b8a6;
            --dark-bg: #f4f6ff;
            --card-bg: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1b1f3b;
            --muted: #64748b;
            --line-glow: rgba(111, 92, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', 'Battambang', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background-color: var(--dark-bg);
            background-image:
                radial-gradient(circle at 10% 4%, rgba(111, 92, 255, 0.16), transparent 34%),
                radial-gradient(circle at 88% 9%, rgba(77, 124, 255, 0.14), transparent 36%),
                radial-gradient(circle at 50% 100%, rgba(20, 184, 166, 0.12), transparent 45%),
                linear-gradient(rgba(111, 92, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77, 124, 255, 0.04) 1px, transparent 1px);
            background-size: auto, auto, auto, 44px 44px, 44px 44px;
            background-attachment: fixed;
        }

        header {
            padding: 18px 20px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(246, 248, 255, 0.92));
            border-bottom: 1px solid var(--line-glow);
            box-shadow: 0 12px 26px rgba(36, 53, 90, 0.12), inset 0 -1px 0 rgba(111, 92, 255, 0.08);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.3, 1, 0.2, 1);
            will-change: transform;
        }

        .header-hidden { transform: translateY(-100%); }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo-container {
            display: flex;
            align-items: center;
            padding: 6px;
            border: 1px solid rgba(111, 92, 255, 0.24);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: inset 0 0 0 1px rgba(111, 92, 255, 0.08);
        }

        .site-logo {
            height: 36px;
            width: auto;
            display: block;
            filter: drop-shadow(0 0 8px rgba(179, 169, 217, 0.45));
        }

        h1 {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            color: var(--primary);
            font-size: 1.9rem;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 10px rgba(111, 92, 255, 0.2);
        }

        .menu-toggle-btn {
            padding: 9px 18px;
            border-radius: 999px;
            border: 1px solid var(--secondary);
            background: rgba(77, 124, 255, 0.08);
            color: var(--secondary);
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-toggle-btn:hover,
        .menu-toggle-btn.active {
            color: #ffffff;
            background: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 0 20px rgba(77, 124, 255, 0.35);
        }

        .menu-container {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.3, 1, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .menu-container.active {
            max-height: 880px;
            opacity: 1;
            padding-top: 18px;
            margin-top: 16px;
            border-top: 1px dashed rgba(111, 92, 255, 0.35);
        }

        .ui-lang-wrapper { text-align: center; }

        .ui-lang-select {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(111, 92, 255, 0.35);
            color: var(--primary);
            padding: 7px 12px;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            outline: none;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .ui-lang-select:hover {
            border-color: var(--primary);
            box-shadow: 0 0 14px rgba(179, 169, 217, 0.45);
        }

        .ui-lang-select option {
            background: #ffffff;
            color: #1b1f3b;
        }

        .search-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            min-width: 260px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(111, 92, 255, 0.28);
            border-radius: 10px;
            color: #1b1f3b;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            font-size: 0.98rem;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 16px rgba(179, 169, 217, 0.35);
        }

        #searchBtn {
            padding: 12px 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: linear-gradient(135deg, rgba(111, 92, 255, 0.18), rgba(77, 124, 255, 0.08));
            color: var(--primary);
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        #searchBtn:hover {
            transform: translateY(-1px);
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 0 18px rgba(111, 92, 255, 0.35);
        }

        .type-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .type-btn {
            padding: 8px 18px;
            border-radius: 999px;
            background: rgba(77, 124, 255, 0.08);
            border: 1px solid rgba(77, 124, 255, 0.32);
            color: var(--secondary);
            cursor: pointer;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            transition: all 0.3s;
        }

        .type-btn:hover,
        .type-btn.active {
            color: #ffffff;
            background: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 0 14px rgba(77, 124, 255, 0.32);
        }

        .filter-alert {
            background: rgba(217, 167, 134, 0.18);
            border-color: rgba(217, 167, 134, 0.75);
            color: #ffcfda;
        }

        .category-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 13px;
            flex-wrap: wrap;
        }

        .cat-btn,
        .lang-btn {
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 999px;
            cursor: pointer;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            font-size: 0.82rem;
            transition: all 0.3s;
        }

        .cat-btn {
            border: 1px solid rgba(77, 124, 255, 0.32);
            color: var(--secondary);
        }

        .cat-btn.active,
        .cat-btn:hover {
            background: var(--secondary);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(77, 124, 255, 0.28);
        }

        .lang-btn {
            border: 1px solid rgba(20, 184, 166, 0.4);
            color: var(--accent);
        }

        .lang-btn.active,
        .lang-btn:hover {
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(20, 184, 166, 0.28);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
            padding: 34px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            background: linear-gradient(175deg, rgba(255, 255, 255, 0.98), rgba(246, 248, 255, 0.98));
            border: 1px solid rgba(111, 92, 255, 0.18);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
            position: relative;
            border-radius: 14px;
            box-shadow: 0 12px 20px rgba(29, 44, 73, 0.12);
        }

        .movie-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            border: 1px solid transparent;
            background: linear-gradient(130deg, rgba(179, 169, 217, 0.5), rgba(127, 149, 191, 0.45), rgba(217, 167, 134, 0.36)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            border-color: rgba(111, 92, 255, 0.42);
            box-shadow: 0 18px 28px rgba(29, 44, 73, 0.2), 0 0 14px rgba(77, 124, 255, 0.15);
        }

        .movie-card:hover::before { opacity: 1; }

        .movie-poster {
            width: 100%;
            height: 330px;
            object-fit: cover;
            border-bottom: 1px solid rgba(127, 149, 191, 0.25);
        }

        .movie-info { padding: 14px; }

        .movie-title {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-size: 1.02rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--primary);
        }

        .movie-year,
        .movie-rating {
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            font-size: 0.88rem;
            margin-bottom: 4px;
        }

        .movie-year { color: var(--secondary); }
        .movie-rating { color: #0f766e; }

        .loading {
            text-align: center;
            padding: 62px;
            color: var(--primary);
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            grid-column: 1 / -1;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .spinner {
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            margin: 0 auto 20px;
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            text-shadow: 0 0 12px rgba(179, 169, 217, 0.45);
            animation: btcPulse 1s ease-in-out infinite;
        }

        .spinner::before { content: '₿'; }

        @keyframes btcPulse {
            0%, 100% { transform: scale(1); opacity: 0.72; }
            50% { transform: scale(1.12); opacity: 1; }
        }

        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 18px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(127, 149, 191, 0.1);
            border: 1px solid rgba(127, 149, 191, 0.55);
            color: var(--secondary);
            cursor: pointer;
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            transition: all 0.28s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--secondary);
            color: #02121c;
            box-shadow: 0 0 16px rgba(127, 149, 191, 0.55);
        }

        .page-btn:disabled {
            border-color: #c7d2fe;
            color: #94a3b8;
            cursor: not-allowed;
            background: rgba(241, 245, 249, 0.92);
            box-shadow: none;
        }

        .page-info {
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            color: #ffd166;
            font-size: 1.02rem;
            letter-spacing: 1px;
        }

        .wallet-modal {
            position: fixed;
            inset: 0;
            z-index: 2300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wallet-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2200;
            display: none;
            background: rgba(8, 12, 27, 0.62);
            backdrop-filter: blur(2px);
        }

        .wallet-modal-content {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 1px solid rgba(111, 92, 255, 0.28);
            border-radius: 16px;
            box-shadow: 0 22px 34px rgba(15, 23, 42, 0.24);
            overflow: hidden;
        }

        .wallet-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(111, 92, 255, 0.16);
            background: linear-gradient(145deg, rgba(247, 248, 255, 0.95), rgba(242, 246, 255, 0.94));
        }

        .wallet-modal-header h2 {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-size: 1rem;
            color: var(--primary);
        }

        .wallet-modal-close {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--muted);
            line-height: 1;
        }

        .wallet-modal-body {
            padding: 16px;
            display: grid;
            gap: 10px;
        }

        .wallet-option {
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 10px;
            align-items: center;
            width: 100%;
            text-align: left;
            padding: 12px 12px;
            border-radius: 12px;
            border: 1px solid rgba(111, 92, 255, 0.2);
            background: rgba(247, 249, 255, 0.92);
            color: #1b1f3b;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .wallet-option:hover {
            transform: translateY(-1px);
            border-color: rgba(111, 92, 255, 0.45);
            box-shadow: 0 10px 18px rgba(77, 124, 255, 0.14);
        }

        .wallet-icon {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wallet-name {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: #1e2347;
        }

        .wallet-desc {
            grid-column: 2 / 3;
            margin-top: -2px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.3rem; }
            .menu-toggle-btn { padding: 7px 13px; font-size: 0.85rem; }
            .movies-grid { gap: 18px; padding: 22px 14px; }
            .movie-poster { height: 280px; }
            .search-container { flex-direction: column; }
            #searchInput { min-width: unset; width: 100%; }
            #searchBtn { width: 100%; }
            header { padding: 14px; }
            .top-bar { justify-content: center; }
            .logo-container { order: 1; }
            h1 { order: 2; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <header id="mainHeader">
        <div class="top-bar">
            <div class="logo-container">
                <img src="logo.svg" alt="GitHub Movies" class="site-logo">
            </div>
            <h1 id="siteTitle">GITHUB MOVIES</h1>
            <button id="menuToggleBtn" class="menu-toggle-btn">☰ MENU</button>
            <div id="authContainer" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <div id="userInfo" style="display:none;color:var(--primary);font-family:'JetBrains Mono',monospace;cursor:pointer;"></div>
                <div id="walletInfo" style="display:none;color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:0.9rem;cursor:pointer;"></div>
                <button id="signOutBtn" class="type-btn" style="display:none;">Sign out</button>
            </div>
        </div>

        <div id="menuContainer" class="menu-container">
            <div class="ui-lang-wrapper">
                <select id="uiLangSelect" class="ui-lang-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="km">🇰🇭 ភាសាខ្មែរ</option>
                    <option value="zh">🇨🇳 中文</option>
                </select>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Database...">
                <button id="searchBtn">🔍 SEARCH</button>
            </div>

            <div style="display:flex;justify-content:center;gap:10px;margin-top:12px;">
                <button id="menuLoginBtn" class="type-btn">🔐 Login</button>
                <button id="menuProfileBtn" class="type-btn" style="display:none;">👤 Profile</button>
            </div>
            
            <div class="type-selector">
                <button id="movieBtn" class="type-btn active">🎥 MOVIES</button>
                <button id="tvBtn" class="type-btn">📺 TV SHOWS</button>
                <button id="resetFilterBtn" class="type-btn filter-alert">✖ CLEAR ACTIVE FILTER</button>
            </div>

            <div id="filterWrapper">
                <div class="category-selector" id="categorySelector">
                    <button class="cat-btn active" data-cat="popular" id="catPopular">🔥 POPULAR</button>
                    <button class="cat-btn" data-cat="trending" id="catTrending">📈 TRENDING</button>
                    <button class="cat-btn" data-cat="top_rated" id="catTopRated">⭐ TOP RATED</button>
                </div>

                <div class="category-selector" id="languageSelector">
                    <button class="lang-btn active" data-lang="" id="langAll">🌐 ALL LANGUAGES</button>
                    <button class="lang-btn" data-lang="km" id="langKhmer">🇰🇭 KHMER</button>
                    <button class="lang-btn" data-lang="en" id="langEnglish">🇬🇧 ENGLISH</button>
                    <button class="lang-btn" data-lang="zh" id="langChinese">🇨🇳 CHINESE</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div id="moviesGrid" class="movies-grid">
            <div class="loading"><div class="spinner"></div><div id="initText">₿</div></div>
        </div>

        <div class="pagination" id="pagination">
            <button id="prevBtn" class="page-btn" disabled>&#8592; PREV</button>
            <span id="pageInfo" class="page-info">PAGE 1</span>
            <button id="nextBtn" class="page-btn">NEXT &#8594;</button>
        </div>
    </main>

    <div class="wallet-modal" id="walletModal" style="display:none;">
        <div class="wallet-modal-content">
            <div class="wallet-modal-header">
                <h2>Connect Wallet</h2>
                <span class="wallet-modal-close" id="walletModalClose">&times;</span>
            </div>
            <div class="wallet-modal-body">
                <p style="color:var(--secondary);margin-bottom:20px;text-align:center;font-family:'JetBrains Mono',monospace;">Connect with MetaMask</p>
                <button class="wallet-option" id="connectMetaMask">
                    <div class="wallet-icon">🦊</div>
                    <div class="wallet-name">MetaMask</div>
                    <div class="wallet-desc">Connect to your MetaMask wallet</div>
                </button>
            </div>
        </div>
    </div>
    <div class="wallet-modal-overlay" id="walletModalOverlay" style="display:none;"></div>

    <div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:2100;align-items:center;justify-content:center;padding:20px;">
        <div style="max-width:420px;width:100%;background:var(--card-bg);border:1px solid var(--secondary);border-radius:10px;padding:18px;box-shadow:0 0 24px rgba(0,0,0,0.45);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h2 id="profileName" style="font-family:'Sora',sans-serif;font-size:1.05rem;color:var(--primary);">Wallet Profile</h2>
                <button id="profileClose" class="type-btn" style="padding:6px 10px;">✕</button>
            </div>
            <div id="profileEmail" style="color:var(--secondary);margin-bottom:10px;font-family:'JetBrains Mono',monospace;"></div>
            <div id="walletAssetsSection" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--secondary);">
                <h3 style="color:var(--primary);margin-bottom:10px;font-size:0.9rem;">💰 Wallet Assets</h3>
                <div id="walletAddress" style="color:var(--secondary);font-family:'JetBrains Mono',monospace;font-size:0.8rem;margin-bottom:8px;"></div>
                <div id="walletBalance" style="color:#ffd166;font-family:'JetBrains Mono',monospace;font-size:1rem;margin-bottom:8px;"></div>
                <div id="walletChain" style="color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;margin-bottom:10px;"></div>
                <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px;">
                    <button class="type-btn" id="walletBuyBtn" style="padding:8px 6px;">🛒 Buy</button>
                    <button class="type-btn" id="walletSendBtn" style="padding:8px 6px;">📤 Send</button>
                    <button class="type-btn" id="walletReceiveBtn" style="padding:8px 6px;">📥 Receive</button>
                    <button class="type-btn" id="walletScanBtn" style="padding:8px 6px;">📷 Scan</button>
                </div>
                <div id="walletActionStatus" style="display:none;color:var(--secondary);font-family:'JetBrains Mono',monospace;font-size:0.78rem;margin-bottom:10px;"></div>
                <div id="walletSendPanel" style="display:none;background:rgba(77,124,255,0.08);border:1px solid rgba(77,124,255,0.32);border-radius:10px;padding:10px;margin-bottom:10px;">
                    <div style="color:var(--primary);font-family:'Sora',sans-serif;font-size:0.84rem;margin-bottom:8px;">Send Native Token</div>
                    <label for="walletSendTo" style="display:block;color:var(--secondary);font-family:'JetBrains Mono',monospace;font-size:0.75rem;margin-bottom:6px;">Recipient Address</label>
                    <input id="walletSendTo" type="text" placeholder="0x..." style="width:100%;margin-bottom:8px;padding:9px 10px;background:rgba(255,255,255,0.96);border:1px solid rgba(111,92,255,0.28);border-radius:8px;color:#1b1f3b;font-family:'JetBrains Mono',monospace;font-size:0.78rem;outline:none;" />

        async function fetchDashboardData() {
            const t = getT();
            if(currentPage === 1) setGridMessage(t.fetchingDB, true);
            let url;
            let displayContext = "";
            
            const uiLangCode = localStorage.getItem('uiLang') || 'en';
            const tmdbLang = uiLangCode === 'km' ? 'km-KH' : (uiLangCode === 'zh' ? 'zh-CN' : 'en-US');

            try {
                if (targetActorId) {
                    displayContext = t.scanCast(targetActorName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_cast=${targetActorId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetGenreId) {
                    displayContext = t.filterGenre(targetGenreName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_genres=${targetGenreId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetCountryId) {
                    displayContext = t.filterRegion(targetCountryName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_origin_country=${targetCountryId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetLangId) {
                    displayContext = t.filterLang(targetLangName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_original_language=${targetLangId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetSearch) {
                    displayContext = t.scanFor(targetSearch.toUpperCase());
                    url = `https://api.themoviedb.org/3/search/${currentType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(targetSearch)}&page=${currentPage}&language=${tmdbLang}`;
                    searchInput.value = targetSearch;
                } else {
                    if (currentLanguage) {
                        let sortType = currentCategory === 'top_rated' ? 'vote_average.desc&vote_count.gte=200' : 'popularity.desc';
                        url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_original_language=${currentLanguage}&sort_by=${sortType}&page=${currentPage}&language=${tmdbLang}`;
                    } else {
                        if (currentCategory === 'trending') {
                            url = `https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
                        } else if (currentCategory === 'top_rated') {
                            url = `https://api.themoviedb.org/3/${currentType}/top_rated?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
                        } else {
                            url = `https://api.themoviedb.org/3/${currentType}/popular?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
                        }
                    }
                }

                if (displayContext && currentPage === 1) setGridMessage(displayContext, true);

                const res = await fetch(url);
                const data = await res.json();
                
                totalPages = data.total_pages || 1;
                if(totalPages > 500) totalPages = 500; 

                displayItems(data.results);
                updatePaginationUI();
            } catch (error) {
                setGridMessage(t.networkError);
            }
        }

        function displayItems(items) {
            moviesGrid.innerHTML = '';
            const t = getT();
            if (!items || items.length === 0) {
                setGridMessage(t.noResults);
                return;
            }
            const fragment = document.createDocumentFragment();
            items.forEach(item => {
                if (!item.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                const title = item.title || item.name;
                const date = item.release_date || item.first_air_date;
                const year = date ? date.substring(0, 4) : 'N/A';
                const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
                
                card.onclick = () => { window.location.href = `play.html?tmdb=${item.id}&type=${currentType}&title=${encodeURIComponent(title)}`; };
                
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" class="movie-poster" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-title">${escapeHtml(title)}</div>
                        <div class="movie-year">📅 ${year}</div>
                        <div class="movie-rating">⭐ ${rating}/10</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            moviesGrid.appendChild(fragment);
            paginationWrap.style.display = 'flex';
        }

        function escapeHtml(text) {

            }
            return null;
        }

        function createEmergencyAuthAdapter() {
            const adapter = {
                provider: 'Web3 Wallet',
                address: null,
                balance: null,
                chainId: null,
                chainName: null,
                isMetaMaskAvailable() { return typeof window.ethereum !== 'undefined'; },
                isInsideMetaMaskApp() {
                    const ua = String(navigator?.userAgent || '').toLowerCase();
                    return ua.includes('metamaskmobile');
                },
                isConnected() { return !!this.address; },
                getShortAddress(addr = this.address) { return addr ? `${addr.slice(0, 6)}...${addr.slice(-4)}` : ''; },
                getChainName(chainId) { return chainId ? `Network ${chainId}` : 'Unknown'; },
                getMetaMaskDeepLinks(targetUrl = null) {
                    const url = new URL(targetUrl || window.location.href, window.location.origin);
                    const dappPath = `${url.host}${url.pathname}${url.search}${url.hash}`;
                    return {
                        native: `metamask://dapp/${dappPath}`,
                        universal: `https://metamask.app.link/dapp/${dappPath}`,
                        universalEncoded: `https://metamask.app.link/dapp/${encodeURIComponent(dappPath)}`
                    };
                },
                getMetaMaskDeepLink() {
                    return this.getMetaMaskDeepLinks().universal;
                },
                openMetaMaskApp(targetUrl = null) {
                    if (window.ethereum?.isMetaMask) return;

                    const target = targetUrl || window.location.href;
                    const links = this.getMetaMaskDeepLinks(target);
                    let hidden = document.visibilityState === 'hidden';
                    const onVisibilityChange = () => {
                        if (document.visibilityState === 'hidden') hidden = true;
                    };
                    document.addEventListener('visibilitychange', onVisibilityChange, { once: true });

                    window.location.href = links.native;
                    setTimeout(() => {
                        if (!hidden) window.location.href = links.universal;
                    }, 700);
                    setTimeout(() => {
                        if (!hidden) window.location.href = links.universalEncoded;
                    }, 1600);
                },
                isMetaMaskInternalError(error) {
                    const message = String(
                        error?.data?.originalError?.message ||
                        error?.data?.message ||
                        error?.message ||
                        ''
                    ).toLowerCase();
                    return error?.code === -32603 || message.includes('internal error');
                },
                getWalletData() {
                    return {
                        address: this.address,
                        balance: this.balance,
                        chainId: this.chainId,
                        chainName: this.chainName,
                        provider: this.provider,
                        shortAddress: this.getShortAddress()
                    };
                },
                async refreshBalance() {
                    if (!this.address || !window.ethereum) return null;
                    const wei = await window.ethereum.request({ method: 'eth_getBalance', params: [this.address, 'latest'] });
                    this.balance = (parseInt(wei, 16) / 1e18).toFixed(4);
                    return this.balance;
                },
                async restoreSession(expectedAddress = null) {
                    if (!window.ethereum) return null;
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (!accounts || !accounts.length) return null;
                    const address = accounts[0];
                    if (expectedAddress && address.toLowerCase() !== String(expectedAddress).toLowerCase()) return null;
                    this.address = address;
                    const chainHex = await window.ethereum.request({ method: 'eth_chainId' });
                    this.chainId = parseInt(chainHex, 16);
                    this.chainName = this.getChainName(this.chainId);
                    await this.refreshBalance();
                    return this.getWalletData();
                },
                async connectMetaMask() {
                    if (!window.ethereum) {
                        this.openMetaMaskApp();
                        return null;
                    }
                    this.provider = 'MetaMask';
                    let accounts = null;
                    try {
                        accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    } catch (error) {
                        if (this.isMetaMaskInternalError(error)) {
                            try {
                                const existing = await window.ethereum.request({ method: 'eth_accounts' });
                                if (Array.isArray(existing) && existing.length) {
                                    accounts = existing;
                                } else {
                                    this.openMetaMaskApp();
                                    return null;
                                }
                            } catch (_) {
                                this.openMetaMaskApp();
                                return null;
                            }
                        } else {
                            throw error;
                        }
                    }
                    if (!accounts || !accounts.length) return null;
                    this.address = accounts[0];
                    const chainHex = await window.ethereum.request({ method: 'eth_chainId' });
                    this.chainId = parseInt(chainHex, 16);
                    this.chainName = this.getChainName(this.chainId);
                    await this.refreshBalance();
                    return this.getWalletData();
                },
                async connectTrustWallet() {
                    alert('Only MetaMask is supported for wallet login.');
                    return null;
                },
                disconnect() {
                    this.address = null;
                    this.balance = null;
                    this.chainId = null;
                    this.chainName = null;
                }
            };
            window.web3Auth = adapter;
            return adapter;
        }

        function loadScriptOnce(src) {
            return new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[data-loader="${src}"]`);
                if (existing) {
                    if (existing.dataset.ready === '1') return resolve();
                    existing.addEventListener('load', () => resolve(), { once: true });
                    existing.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), { once: true });
                    return;
                }

                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.dataset.loader = src;
                script.addEventListener('load', () => {
                    script.dataset.ready = '1';
                    resolve();
                }, { once: true });
                script.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), { once: true });
                document.head.appendChild(script);
            });
        }

        async function ensureWeb3AuthLoaded() {
            let auth = getAuth();
            if (auth) return auth;

            try {
                await loadScriptOnce('web3-auth.js?v=20260707');
            } catch (error) {
                console.error('Primary web3 auth load failed:', error);
            }

            auth = getAuth();
            if (auth) return auth;
            return createEmergencyAuthAdapter();
        }

        function openWalletModal() {
            connectMetaMaskWallet();
        }

        function shouldAutoMetaMaskLogin() {
            const params = new URLSearchParams(window.location.search);
            return params.get('mm_login') === '1';
        }

        function shouldOpenProfileOnLoad() {
            const params = new URLSearchParams(window.location.search);
            return params.get('open_profile') === '1';
        }

        function getIndexLoginUrl() {
            const target = new URL(window.location.href);
            target.pathname = target.pathname.replace(/[^/]*$/, 'index.html');
            target.search = '';
            target.hash = '';
            target.searchParams.set('mm_login', '1');
            return target.toString();
        }

        function redirectToCleanIndex() {
            const target = new URL(window.location.href);
            target.pathname = target.pathname.replace(/[^/]*$/, 'index.html');
            target.search = '';
            target.hash = '';
            window.location.replace(target.toString());
        }

        function redirectToProfileIndex() {
            const target = new URL(window.location.href);
            target.pathname = target.pathname.replace(/[^/]*$/, 'index.html');
            target.search = '';
            target.hash = '';
            target.searchParams.set('open_profile', '1');
            window.location.replace(target.toString());
        }

        function clearTransientAuthParams() {
            const current = new URL(window.location.href);
            const hadMmLogin = current.searchParams.has('mm_login');
            const hadOpenProfile = current.searchParams.has('open_profile');
            if (!hadMmLogin && !hadOpenProfile) return;
            current.searchParams.delete('mm_login');
            current.searchParams.delete('open_profile');
            window.history.replaceState({}, '', current.toString());
        }

        function closeWalletModal() {
            if (!walletModal || !walletModalOverlay) return;
            walletModal.style.display = 'none';
            walletModalOverlay.style.display = 'none';
        }

        function showProfileModal() {
            const auth = getAuth();
            if (!profileModal || !auth) return;
            
            // Safely fetch data regardless of adapter version
            const data = (typeof auth.getWalletData === 'function') ? auth.getWalletData() : {
                address: auth.address,
                balance: auth.balance,
                chainName: auth.chainName,
                shortAddress: auth.address ? `${auth.address.slice(0, 6)}...${auth.address.slice(-4)}` : ''
            };

            if (!data || !data.address) return;

            const symbol = getNativeTokenSymbol(data.chainName);
            if (profileName) profileName.innerText = `Wallet Profile (${data.shortAddress || 'Connected'})`;
            if (profileEmail) profileEmail.innerText = `Connected with ${auth.provider || 'Web3 Wallet'}`;
            if (walletAddress) walletAddress.innerText = `Address: ${data.address || 'N/A'}`;
            if (walletBalance) walletBalance.innerText = `Balance: ${data.balance || '0.0000'} ${symbol}`;
            if (walletChain) walletChain.innerText = `Network: ${data.chainName || 'Unknown'}`;
            if (walletSendSymbol) walletSendSymbol.innerText = symbol;
            if (walletAssetsSection) walletAssetsSection.style.display = 'block';
            hideWalletActionPanels();
            if (walletSendTo) walletSendTo.value = '';
            if (walletSendAmount) walletSendAmount.value = '';
            setWalletActionStatus('');
            profileModal.style.display = 'flex';
        }

        function hideProfileModal() {
            hideWalletActionPanels();
            setWalletActionStatus('');
            if (profileModal) profileModal.style.display = 'none';
        }

        function setWalletActionStatus(message, isError = false) {
            if (!walletActionStatus) return;
            if (!message) {
                walletActionStatus.style.display = 'none';
                walletActionStatus.innerText = '';
                return;
            }

            walletActionStatus.style.display = 'block';
            walletActionStatus.style.color = isError ? '#ef4444' : 'var(--secondary)';
            walletActionStatus.innerText = message;
        }

        function getNativeTokenSymbol(chainName = '') {
            const value = String(chainName || '').toLowerCase();
            if (value.includes('polygon')) return 'MATIC';
            if (value.includes('binance') || value.includes('bsc')) return 'BNB';
            if (value.includes('avalanche')) return 'AVAX';
            if (value.includes('fantom')) return 'FTM';
            return 'ETH';
        }

        function hideWalletActionPanels() {
            if (walletSendPanel) walletSendPanel.style.display = 'none';
            if (walletReceivePanel) walletReceivePanel.style.display = 'none';
        }

        function openSendPanel(prefilledAddress = '') {
            hideWalletActionPanels();
            if (!walletSendPanel) return;

            walletSendPanel.style.display = 'block';
            if (walletSendTo && prefilledAddress) walletSendTo.value = prefilledAddress;
            if (walletSendTo && !walletSendTo.value) walletSendTo.focus();
            setWalletActionStatus('Fill recipient and amount, then confirm in MetaMask app.');
        }

        function formatAddressCompact(address) {
            if (!address || address.length < 12) return address || '';
            return `${address.slice(0, 8)}...${address.slice(-6)}`;
        }

        function parseAddressFromScannedValue(rawValue) {
            if (!rawValue) return null;
            const raw = String(rawValue).trim();
            let candidate = raw;

            if (raw.toLowerCase().startsWith('ethereum:')) {
                const payload = raw.slice(9);
                candidate = payload.split(/[/?@]/)[0] || '';
            }

            if (/^0x[a-fA-F0-9]{40}$/.test(candidate)) return candidate;
            return null;
        }

        function toWeiHex(ethAmountInput) {
            const amount = String(ethAmountInput || '').trim();
            if (!/^\d+(\.\d+)?$/.test(amount)) {
                throw new Error('Amount must be a valid number.');
            }

            const [wholePart, fractionRaw = ''] = amount.split('.');
            if (fractionRaw.length > 18) {
                throw new Error('Amount supports up to 18 decimals.');
            }

            const fractionPart = fractionRaw.padEnd(18, '0');
            const wei = (BigInt(wholePart) * (10n ** 18n)) + BigInt(fractionPart || '0');
            if (wei <= 0n) {
                throw new Error('Amount must be greater than zero.');
            }

            return `0x${wei.toString(16)}`;
        }

        function updateReceivePanel(address) {
            if (!walletReceivePanel || !walletReceiveAddress || !walletQrImage) return;
            if (!address) {
                walletReceivePanel.style.display = 'none';
                return;
            }

            if (walletSendPanel) walletSendPanel.style.display = 'none';
            const qrPayload = `ethereum:${address}`;
            walletReceiveAddress.innerText = address;
            walletQrImage.src = `https://quickchart.io/qr?size=220&text=${encodeURIComponent(qrPayload)}`;
            walletReceivePanel.style.display = 'block';
        }

        async function handleWalletBuy() {
            window.location.href = 'https://portfolio.metamask.io/buy';
        }

        async function handleWalletSend(prefilledAddress = '') {
            const auth = getAuth();
            if (!auth || !auth.isConnected()) {
                setWalletActionStatus('Connect your wallet first.', true);
                return;
            }

            openSendPanel(prefilledAddress);
        }

        async function submitWalletSend() {
            const auth = getAuth();
            if (!auth || !auth.isConnected()) {
                setWalletActionStatus('Connect your wallet first.', true);
                return;
            }

            if (!window.ethereum) {
                setWalletActionStatus('Ethereum provider not available in this context.', true);
                return;
            }

            const senderAddress = auth.getWalletData()?.address;
            if (!senderAddress) {
                setWalletActionStatus('Wallet address is missing.', true);
                return;
            }

            const cleanTo = String(walletSendTo?.value || '').trim();
            if (!/^0x[a-fA-F0-9]{40}$/.test(cleanTo)) {
                setWalletActionStatus('Invalid recipient address.', true);
                return;
            }

            const amountEth = String(walletSendAmount?.value || '').trim();
            if (!amountEth) {
                setWalletActionStatus('Enter amount to send.', true);
                return;
            }

            let valueHex;
            try {
                valueHex = toWeiHex(amountEth);
            } catch (error) {
                setWalletActionStatus(error.message || 'Invalid amount.', true);
                return;
            }

            try {
                setWalletActionStatus('Submitting transaction to MetaMask...');
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: senderAddress,
                        to: cleanTo,
                        value: valueHex
                    }]
                });
                setWalletActionStatus(`Sent. TX: ${formatAddressCompact(txHash)}`);
                if (walletSendAmount) walletSendAmount.value = '';
            } catch (error) {
                const message = error?.message || 'Transaction failed.';
                setWalletActionStatus(message, true);
            }
        }

        async function handleWalletReceive() {
            const auth = getAuth();
            if (!auth || !auth.isConnected()) {
                setWalletActionStatus('Connect your wallet first.', true);
                return;
            }

            const address = auth.getWalletData()?.address;
            if (!address) {
                setWalletActionStatus('Wallet address not available.', true);
                return;
            }

            updateReceivePanel(address);
            setWalletActionStatus('Receive wallet QR is ready.');
        }

        async function handleWalletScan() {
            if (!walletScanInput) return;
            setWalletActionStatus('Pick a QR image to scan.');
            walletScanInput.value = '';
            walletScanInput.click();
        }

        async function processWalletScanFile(file) {
            if (!file) return;

            if (!('BarcodeDetector' in window) || typeof createImageBitmap !== 'function') {
                setWalletActionStatus('QR scan is not supported on this browser. Paste address manually in Send.', true);
                return;
            }

            try {
                const bitmap = await createImageBitmap(file);
                const detector = new BarcodeDetector({ formats: ['qr_code'] });
                const results = await detector.detect(bitmap);
                if (typeof bitmap.close === 'function') bitmap.close();

                if (!results || !results.length) {
                    setWalletActionStatus('No QR code detected. Try another image.', true);
                    return;
                }

                const rawValue = results[0]?.rawValue || '';
                const recipientAddress = parseAddressFromScannedValue(rawValue);
                if (!recipientAddress) {
                    setWalletActionStatus('QR detected, but no valid Ethereum address found.', true);
                    return;
                }

                setWalletActionStatus(`Scanned recipient: ${formatAddressCompact(recipientAddress)}`);
                openSendPanel(recipientAddress);
            } catch (_) {
                setWalletActionStatus('Failed to scan QR image.', true);
            }
        }

        function updateWalletUI(walletData) {
            if (!walletData) return;
            const short = `${walletData.address.slice(0, 6)}...${walletData.address.slice(-4)}`;
            if (walletInfo) {
                walletInfo.style.display = 'inline-block';
                walletInfo.innerText = `🦊 ${short}`;
            }
            if (menuLoginBtn) menuLoginBtn.style.display = 'none';
            if (menuProfileBtn) menuProfileBtn.style.display = 'inline-block';
            if (topSignOutBtn) topSignOutBtn.style.display = 'inline-block';
        }

        function persistWalletSession(walletData, providerLabel) {
            if (!walletData || !walletData.address) return;
            localStorage.setItem('g_user', JSON.stringify({
                type: 'web3',
                verified: true,
                provider: providerLabel || walletData.provider || 'Web3 Wallet',
                address: walletData.address,
                shortAddress: walletData.shortAddress,
                balance: walletData.balance,
                chainId: walletData.chainId,
                chainName: walletData.chainName,
                signature: walletData.signature || null,
                signatureMessage: walletData.signatureMessage || null,
                signedAt: walletData.signedAt || null
            }));
        }

        async function restoreWalletSession() {
            const auth = await ensureWeb3AuthLoaded();
            if (!auth) return;

            const raw = localStorage.getItem('g_user');
            if (!raw) return;

            try {
                const stored = JSON.parse(raw);
                if (stored?.type !== 'web3' || !stored?.verified || !stored?.address) {
                    localStorage.removeItem('g_user');
                    return;
                }

                const walletData = await auth.restoreSession(stored.address);
                if (!walletData) {
                    localStorage.removeItem('g_user');
                    signOutWallet();
                    return;
                }

                walletData.provider = stored.provider || walletData.provider;
                updateWalletUI(walletData);
                persistWalletSession(walletData, walletData.provider);
            } catch (error) {
                console.error('Wallet session restore failed:', error);
                localStorage.removeItem('g_user');
            }
        }

        async function connectMetaMaskWallet() {
            const auth = await ensureWeb3AuthLoaded();
            if (!auth) {
                alert('Web3 module not loaded. Please refresh the page.');
                return;
            }

            const loginUrl = getIndexLoginUrl();
            if (!auth.isMetaMaskAvailable?.()) {
                if (typeof auth.openMetaMaskApp === 'function') {
                    auth.openMetaMaskApp(loginUrl);
                }
                return;
            }

            const walletData = await auth.connectMetaMask();
            if (walletData) {
                updateWalletUI(walletData);
                persistWalletSession(walletData, 'MetaMask');
                closeWalletModal();

                if (shouldAutoMetaMaskLogin()) {
                    redirectToProfileIndex();
                    return;
                }
                showProfileModal();
            }
        }

        function signOutWallet() {
            const auth = getAuth();
            if (auth) auth.disconnect();
            localStorage.removeItem('g_user');
            if (walletInfo) {
                walletInfo.style.display = 'none';
                walletInfo.innerText = '';
            }
            if (menuLoginBtn) menuLoginBtn.style.display = 'inline-block';
            if (menuProfileBtn) menuProfileBtn.style.display = 'none';
            if (topSignOutBtn) topSignOutBtn.style.display = 'none';
            hideProfileModal();
        }

        // Action Listeners
        if (menuLoginBtn) menuLoginBtn.addEventListener('click', openWalletModal);
        if (menuProfileBtn) menuProfileBtn.addEventListener('click', showProfileModal);
        if (walletInfo) walletInfo.addEventListener('click', showProfileModal);
        
        document.getElementById('walletModalClose')?.addEventListener('click', closeWalletModal);
        if (walletModalOverlay) walletModalOverlay.addEventListener('click', closeWalletModal);
        
        document.getElementById('connectMetaMask')?.addEventListener('click', connectMetaMaskWallet);
        
        document.getElementById('profileClose')?.addEventListener('click', hideProfileModal);
        document.getElementById('profileSignOut')?.addEventListener('click', signOutWallet);
        document.getElementById('signOutBtn')?.addEventListener('click', signOutWallet);
        
        document.getElementById('walletBuyBtn')?.addEventListener('click', handleWalletBuy);
        document.getElementById('walletSendBtn')?.addEventListener('click', () => handleWalletSend());
        document.getElementById('walletReceiveBtn')?.addEventListener('click', handleWalletReceive);
        document.getElementById('walletScanBtn')?.addEventListener('click', handleWalletScan);
        document.getElementById('walletSendSubmit')?.addEventListener('click', submitWalletSend);
        document.getElementById('walletSendCancel')?.addEventListener('click', () => {
            if (walletSendPanel) walletSendPanel.style.display = 'none';
            setWalletActionStatus('');
        });
        
        document.getElementById('walletCopyAddress')?.addEventListener('click', async () => {
            const auth = getAuth();
            const address = auth?.getWalletData?.()?.address || auth?.address;
            if (!address) {
                setWalletActionStatus('Wallet address not available.', true);
                return;
            }

            try {
                await navigator.clipboard.writeText(address);
                setWalletActionStatus('Address copied to clipboard.');
            } catch (_) {
                setWalletActionStatus('Could not copy automatically. Copy from the address text.', true);
            }
        });
        
        walletScanInput?.addEventListener('change', async (event) => {
            const file = event.target?.files?.[0] || null;
            await processWalletScanFile(file);
        });
        
        document.getElementById('walletRefresh')?.addEventListener('click', async () => {
            const auth = getAuth();
            if (!auth) return;
            await auth.refreshBalance?.();
            showProfileModal();
        });

        // Keep UI synced with wallet events
        window.addEventListener('walletAccountChanged', () => {
            const auth = getAuth();
            if (!auth || !auth.isConnected?.()) return signOutWallet();
            updateWalletUI(auth.getWalletData?.());
        });
        window.addEventListener('walletChainChanged', () => {
            const auth = getAuth();
            if (!auth || !auth.isConnected?.()) return;
            updateWalletUI(auth.getWalletData?.());
        });

        updateUI();
        fetchDashboardData();
        restoreWalletSession().then(() => {
            if (shouldOpenProfileOnLoad()) {
                showProfileModal();
                clearTransientAuthParams();
            }
        });
        if (shouldAutoMetaMaskLogin()) connectMetaMaskWallet();
    </script>
</body>
</html>
