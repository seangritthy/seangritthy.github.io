<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Exo+2:wght@300;400;600&family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff9d; --secondary: #7b61ff; --dark-bg: #0a0a0f; --card-bg: #13131f; --cyber-blue: #00ccff; --accent: #ff00e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Exo 2', 'Noto Sans SC', 'Battambang', sans-serif; background: var(--dark-bg); color: white; min-height: 100vh; }

        /* Mobile Side Drawer */
        #sideDrawer {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: rgba(10, 10, 15, 0.98); border-right: 2px solid var(--primary);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            padding: 40px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #sideDrawer.open { left: 0; }
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 2100;
            background: var(--primary); color: #000; padding: 10px 15px; border-radius: 5px;
            cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
        }

        header { padding: 20px; text-align: center; }
        h1 { font-family: 'Orbitron'; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        .search-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        #searchInput { padding: 10px; background: #000; border: 1px solid var(--secondary); color: white; }
        #searchBtn { padding: 10px; background: var(--primary); border: none; cursor: pointer; }

        .type-selector, .category-selector { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .btn { padding: 8px; cursor: pointer; background: transparent; border: 1px solid var(--secondary); color: white; text-align: left; }
        .btn.active { border-color: var(--primary); color: var(--primary); }

        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: var(--card-bg); cursor: pointer; border-radius: 5px; }
        .movie-poster { width: 100%; height: 280px; object-fit: cover; }
        .movie-info { padding: 10px; }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleDrawer()">MENU ≡</div>

    <aside id="sideDrawer">
        <h1 id="siteTitle">MVHD</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
            <button id="searchBtn">SEARCH</button>
        </div>
        <div class="type-selector">
            <button class="btn active" id="movieBtn">MOVIES</button>
            <button class="btn" id="tvBtn">TV SHOWS</button>
        </div>
        <div class="category-selector">
            <button class="cat-btn active" data-cat="popular">POPULAR</button>
            <button class="cat-btn" data-cat="trending">TRENDING</button>
        </div>
    </aside>

    <main style="padding-top: 80px;">
        <div id="moviesGrid" class="movies-grid"></div>
    </main>

    <script>
        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); }
        
        // ... (Keep your existing JS logic for fetchDashboardData, translations, etc., but update selectors)
        // Ensure buttons like movieBtn, tvBtn are updated to use the new IDs in index.html
    </script>
</body>
</html>
