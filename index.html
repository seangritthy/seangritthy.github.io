<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD | Cyberpunk Movie Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: -1;
            opacity: 0.2;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            z-index: 1000;
            border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--primary);
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            padding: 10px 25px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
            transform: translateY(-2px);
        }

        .header-content {
            margin-top: 100px;
            text-align: center;
            padding: 50px 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .site-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.7);
            letter-spacing: 4px;
        }

        .site-subtitle {
            font-size: 1.2rem;
            color: var(--cyber-blue);
            margin-bottom: 30px;
            font-family: monospace;
        }

        .datetime {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            font-family: monospace;
            color: var(--cyber-yellow);
        }

        .cyber-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .cyber-stat {
            text-align: center;
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            min-width: 150px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--cyber-blue);
            text-transform: uppercase;
        }

        .search-container {
            display: flex;
            justify-content: center;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-form {
            width: 100%;
        }

        .search-input-container {
            display: flex;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: 2px solid var(--secondary);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-family: monospace;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.3);
        }

        .search-button {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.3rem;
        }

        .results-info {
            text-align: center;
            padding: 20px;
            color: var(--cyber-blue);
            font-family: monospace;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-item {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--secondary);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .movie-item:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.4);
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .cyber-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .movie-item:hover .cyber-overlay {
            opacity: 1;
        }

        .watch-now {
            background: linear-gradient(45deg, var(--primary), var(--cyber-blue));
            color: #000;
            padding: 10px 20px;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .pagination a, .pagination span {
            padding: 12px 25px;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            font-family: monospace;
        }

        .pagination a:hover {
            background: var(--primary);
            color: #000;
        }

        .search-results {
            text-align: center;
            padding: 20px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
        }

        @media (max-width: 768px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
            .site-title { font-size: 2rem; }
            .movie-poster { height: 220px; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <header>
        <nav>
            <a href="#">HOME</a>
            <a href="#">IPTV</a>
            <a href="#">PROFILE</a>
            <a href="#">CONTACT</a>
        </nav>
    </header>

    <div class="header-content">
        <h1 class="site-title">MVHD CYBERCINEMA</h1>
        <div class="site-subtitle">NEURAL STREAMING NETWORK • 100+ MOVIES PER LOAD</div>
        
        <div class="datetime">
            <div id="current-date"></div>
            <div id="current-time"></div>
        </div>
        
        <div class="cyber-stats">
            <div class="cyber-stat">
                <div class="stat-value" id="totalResults">0</div>
                <div class="stat-label">DATABANKS</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-value" id="totalPages">0</div>
                <div class="stat-label">SECTORS</div>
            </div>
            <div class="cyber-stat">
                <div class="stat-value">100+</div>
                <div class="stat-label">PER SECTOR</div>
            </div>
        </div>
    </div>

    <div class="search-container">
        <form class="search-form" onsubmit="searchMovies(event)">
            <div class="search-input-container">
                <input type="text" id="searchInput" placeholder="ENTER NEURAL SEARCH PARAMETERS..." class="search-input">
                <button type="submit" class="search-button">🔍</button>
            </div>
        </form>
    </div>

    <div class="results-info" id="resultsInfo">ACCESSING DATABANKS...</div>
    <div class="search-results" id="searchResults" style="display: none;"></div>

    <div class="movie-grid" id="movieGrid">
        <div class="cyber-loading">LOADING...</div>
    </div>

    <div class="pagination" id="pagination"></div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        let currentPage = 1;
        let currentSearch = '';
        let totalResults = 0;
        let totalPages = 1;

        // Update date and time
        function updateDateTime() {
            const now = new Date();
            document.getElementById('current-date').innerHTML = `DATE: ${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            document.getElementById('current-time').innerHTML = `TIME: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Generate Cloudnestra URL
        function generateCloudnestraUrl(tmdbId, type = 'movie') {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${tmdbId}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudorchestranova.com/rcp/${encoded}`;
        }

        // Search movies
        async function searchMovies(event) {
            if (event) event.preventDefault();
            currentSearch = document.getElementById('searchInput').value.trim();
            currentPage = 1;
            await loadMovies();
        }

        // Load movies from TMDB
        async function loadMovies() {
            const movieGrid = document.getElementById('movieGrid');
            movieGrid.innerHTML = '<div class="cyber-loading">LOADING DATABANKS...</div>';
            
            try {
                let url;
                if (currentSearch) {
                    url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(currentSearch)}&page=${currentPage}`;
                    document.getElementById('searchResults').style.display = 'block';
                    document.getElementById('searchResults').innerHTML = `🔍 NEURAL SCAN RESULTS FOR: "<strong>${currentSearch}</strong>"`;
                } else {
                    url = `https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}&page=${currentPage}`;
                    document.getElementById('searchResults').style.display = 'none';
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                totalResults = data.total_results;
                totalPages = Math.min(data.total_pages, 50);
                
                document.getElementById('totalResults').innerHTML = totalResults.toLocaleString();
                document.getElementById('totalPages').innerHTML = totalPages;
                document.getElementById('resultsInfo').innerHTML = `ACCESSING ${data.results.length} DATABANKS • SECTOR ${currentPage} OF ${totalPages} • ${totalResults.toLocaleString()} TOTAL ENTRIES`;
                
                displayMovies(data.results);
                setupPagination();
                
            } catch(error) {
                console.error('Error:', error);
                movieGrid.innerHTML = '<div class="cyber-error">⚠️ NETWORK ERROR • INITIATE NEW NEURAL SEARCH</div>';
            }
        }

        function displayMovies(movies) {
            const movieGrid = document.getElementById('movieGrid');
            movieGrid.innerHTML = '';
            
            if (movies.length === 0) {
                movieGrid.innerHTML = '<div class="search-results">⚠️ NO DATABANKS FOUND • INITIATE NEW NEURAL SEARCH</div>';
                return;
            }
            
            movies.forEach(movie => {
                if (!movie.poster_path) return;
                
                const movieItem = document.createElement('div');
                movieItem.className = 'movie-item';
                movieItem.onclick = () => {
                    const cloudUrl = generateCloudnestraUrl(movie.id, 'movie');
                    window.location.href = `play.html?tmdb=${movie.id}&title=${encodeURIComponent(movie.title)}`;
                };
                
                movieItem.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" class="movie-poster" alt="${movie.title}">
                    <div class="cyber-overlay">
                        <button class="watch-now">STREAM NOW</button>
                    </div>
                `;
                movieGrid.appendChild(movieItem);
            });
        }

        function setupPagination() {
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            
            if (totalPages <= 1) return;
            
            if (currentPage > 1) {
                const prevLink = document.createElement('a');
                prevLink.href = '#';
                prevLink.innerHTML = '◄ PREV SECTOR';
                prevLink.onclick = (e) => {
                    e.preventDefault();
                    currentPage--;
                    loadMovies();
                };
                paginationDiv.appendChild(prevLink);
            }
            
            const pageSpan = document.createElement('span');
            pageSpan.innerHTML = `SECTOR ${currentPage} OF ${totalPages}`;
            paginationDiv.appendChild(pageSpan);
            
            if (currentPage < totalPages) {
                const nextLink = document.createElement('a');
                nextLink.href = '#';
                nextLink.innerHTML = 'NEXT SECTOR ►';
                nextLink.onclick = (e) => {
                    e.preventDefault();
                    currentPage++;
                    loadMovies();
                };
                paginationDiv.appendChild(nextLink);
            }
        }

        // Initial load
        loadMovies();
    </script>
</body>
</html>
