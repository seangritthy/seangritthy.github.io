<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Exo+2:wght@300;400;600&family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff9d; --secondary: #7b61ff; --dark-bg: #0a0a0f; --card-bg: #13131f; --cyber-blue: #00ccff; --accent: #ff00e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Exo 2', 'Noto Sans SC', 'Battambang', sans-serif; background: var(--dark-bg); color: white; min-height: 100vh; }

        /* Menu Toggle Button */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 2100;
            background: var(--primary); color: #000; padding: 10px 15px; border-radius: 5px;
            cursor: pointer; font-family: 'Orbitron'; font-weight: bold; box-shadow: 0 0 15px var(--primary);
        }

        /* Slide Drawer */
        #sideDrawer {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: rgba(10, 10, 15, 0.98); border-right: 2px solid var(--primary);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            padding: 80px 20px 20px; overflow-y: auto;
        }
        #sideDrawer.open { left: 0; }

        .ui-lang-wrapper { margin-bottom: 20px; text-align: center; }
        .ui-lang-select { background: rgba(0,0,0,0.8); border: 1px solid var(--primary); color: var(--primary); padding: 5px; width: 100%; }

        h1 { font-family: 'Orbitron'; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
        
        .search-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        #searchInput { padding: 10px; background: #000; border: 1px solid var(--secondary); color: white; }
        #searchBtn { padding: 10px; background: var(--primary); border: none; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px; border: 1px solid var(--secondary); background: transparent; color: white; cursor: pointer; text-align: left; }
        .btn.active { border-color: var(--primary); color: var(--primary); }

        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .movie-card { background: var(--card-bg); cursor: pointer; border-radius: 5px; overflow: hidden; }
        .movie-poster { width: 100%; height: 280px; object-fit: cover; }
        .movie-info { padding: 10px; }
        .movie-title { font-family: 'Orbitron'; font-size: 1rem; color: var(--primary); margin-bottom: 5px; white-space: nowrap; overflow: hidden; }
        
        .loading { text-align: center; padding: 60px; color: var(--primary); grid-column: 1 / -1; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleDrawer()">≡ MENU</div>

    <aside id="sideDrawer">
        <h1 id="siteTitle">MVHD</h1>
        <div class="ui-lang-wrapper">
            <select id="uiLangSelect" class="ui-lang-select">
                <option value="en">🇬🇧 English</option>
                <option value="km">🇰🇭 ភាសាខ្មែរ</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
            <button id="searchBtn">🔍 SEARCH</button>
        </div>
        <div class="btn-group">
            <button class="btn active" id="movieBtn">🎥 MOVIES</button>
            <button class="btn" id="tvBtn">📺 TV SHOWS</button>
            <button class="btn" id="catPopular" data-cat="popular">🔥 POPULAR</button>
            <button class="btn" id="catTrending" data-cat="trending">📈 TRENDING</button>
            <button class="btn" id="catTopRated" data-cat="top_rated">⭐ TOP RATED</button>
            <button class="btn" id="resetFilterBtn" style="display:none; color: var(--accent);">✖ CLEAR FILTER</button>
        </div>
    </aside>

    <main>
        <div id="moviesGrid" class="movies-grid">
            <div class="loading"><div class="spinner"></div><div id="initText">LOADING...</div></div>
        </div>
    </main>

    <script>
        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); }
        
        // ... (Keep the rest of your Javascript logic here, just make sure to link the UI translation functions to these new IDs)
        // Ensure that clicking movieBtn, tvBtn, and category buttons calls your existing fetchDashboardData() function.
    </script>
</body>
</html>
