<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Movies</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=Sora:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6f5cff;
            --secondary: #4d7cff;
            --accent: #14b8a6;
            --dark-bg: #f4f6ff;
            --card-bg: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1b1f3b;
            --muted: #64748b;
            --line-glow: rgba(111, 92, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', 'Battambang', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background-color: var(--dark-bg);
            background-image:
                radial-gradient(circle at 10% 4%, rgba(111, 92, 255, 0.16), transparent 34%),
                radial-gradient(circle at 88% 9%, rgba(77, 124, 255, 0.14), transparent 36%),
                radial-gradient(circle at 50% 100%, rgba(20, 184, 166, 0.12), transparent 45%),
                linear-gradient(rgba(111, 92, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77, 124, 255, 0.04) 1px, transparent 1px);
            background-size: auto, auto, auto, 44px 44px, 44px 44px;
            background-attachment: fixed;
        }

        header {
            padding: 18px 20px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(246, 248, 255, 0.92));
            border-bottom: 1px solid var(--line-glow);
            box-shadow: 0 12px 26px rgba(36, 53, 90, 0.12), inset 0 -1px 0 rgba(111, 92, 255, 0.08);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.3, 1, 0.2, 1);
            will-change: transform;
        }

        .header-hidden { transform: translateY(-100%); }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo-container {
            display: flex;
            align-items: center;
            padding: 6px;
            border: 1px solid rgba(111, 92, 255, 0.24);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: inset 0 0 0 1px rgba(111, 92, 255, 0.08);
        }

        .site-logo {
            height: 36px;
            width: auto;
            display: block;
            filter: drop-shadow(0 0 8px rgba(179, 169, 217, 0.45));
        }

        h1 {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            color: var(--primary);
            font-size: 1.9rem;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 10px rgba(111, 92, 255, 0.2);
        }

        .menu-toggle-btn {
            padding: 9px 18px;
            border-radius: 999px;
            border: 1px solid var(--secondary);
            background: rgba(77, 124, 255, 0.08);
            color: var(--secondary);
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-toggle-btn:hover,
        .menu-toggle-btn.active {
            color: #ffffff;
            background: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 0 20px rgba(77, 124, 255, 0.35);
        }

        .menu-container {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.3, 1, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .menu-container.active {
            max-height: 880px;
            opacity: 1;
            padding-top: 18px;
            margin-top: 16px;
            border-top: 1px dashed rgba(111, 92, 255, 0.35);
        }

        .ui-lang-wrapper { text-align: center; }

        .ui-lang-select {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(111, 92, 255, 0.35);
            color: var(--primary);
            padding: 7px 12px;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            outline: none;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .ui-lang-select:hover {
            border-color: var(--primary);
            box-shadow: 0 0 14px rgba(179, 169, 217, 0.45);
        }

        .ui-lang-select option {
            background: #ffffff;
            color: #1b1f3b;
        }

        .search-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            min-width: 260px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(111, 92, 255, 0.28);
            border-radius: 10px;
            color: #1b1f3b;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            font-size: 0.98rem;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 16px rgba(179, 169, 217, 0.35);
        }

        #searchBtn {
            padding: 12px 22px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: linear-gradient(135deg, rgba(111, 92, 255, 0.18), rgba(77, 124, 255, 0.08));
            color: var(--primary);
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        #searchBtn:hover {
            transform: translateY(-1px);
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 0 18px rgba(111, 92, 255, 0.35);
        }

        .type-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .type-btn {
            padding: 8px 18px;
            border-radius: 999px;
            background: rgba(77, 124, 255, 0.08);
            border: 1px solid rgba(77, 124, 255, 0.32);
            color: var(--secondary);
            cursor: pointer;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            transition: all 0.3s;
        }

        .type-btn:hover,
        .type-btn.active {
            color: #ffffff;
            background: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 0 14px rgba(77, 124, 255, 0.32);
        }

        .filter-alert {
            background: rgba(217, 167, 134, 0.18);
            border-color: rgba(217, 167, 134, 0.75);
            color: #ffcfda;
        }

        .category-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 13px;
            flex-wrap: wrap;
        }

        .cat-btn,
        .lang-btn {
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 999px;
            cursor: pointer;
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            font-size: 0.82rem;
            transition: all 0.3s;
        }

        .cat-btn {
            border: 1px solid rgba(77, 124, 255, 0.32);
            color: var(--secondary);
        }

        .cat-btn.active,
        .cat-btn:hover {
            background: var(--secondary);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(77, 124, 255, 0.28);
        }

        .lang-btn {
            border: 1px solid rgba(20, 184, 166, 0.4);
            color: var(--accent);
        }

        .lang-btn.active,
        .lang-btn:hover {
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 12px rgba(20, 184, 166, 0.28);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
            padding: 34px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            background: linear-gradient(175deg, rgba(255, 255, 255, 0.98), rgba(246, 248, 255, 0.98));
            border: 1px solid rgba(111, 92, 255, 0.18);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
            position: relative;
            border-radius: 14px;
            box-shadow: 0 12px 20px rgba(29, 44, 73, 0.12);
        }

        .movie-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            border: 1px solid transparent;
            background: linear-gradient(130deg, rgba(179, 169, 217, 0.5), rgba(127, 149, 191, 0.45), rgba(217, 167, 134, 0.36)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            border-color: rgba(111, 92, 255, 0.42);
            box-shadow: 0 18px 28px rgba(29, 44, 73, 0.2), 0 0 14px rgba(77, 124, 255, 0.15);
        }

        .movie-card:hover::before { opacity: 1; }

        .movie-poster {
            width: 100%;
            height: 330px;
            object-fit: cover;
            border-bottom: 1px solid rgba(127, 149, 191, 0.25);
        }

        .movie-info { padding: 14px; }

        .movie-title {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-size: 1.02rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--primary);
        }

        .movie-year,
        .movie-rating {
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            font-size: 0.88rem;
            margin-bottom: 4px;
        }

        .movie-year { color: var(--secondary); }
        .movie-rating { color: #0f766e; }

        .loading {
            text-align: center;
            padding: 62px;
            color: var(--primary);
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            grid-column: 1 / -1;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .spinner {
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            margin: 0 auto 20px;
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            text-shadow: 0 0 12px rgba(179, 169, 217, 0.45);
            animation: btcPulse 1s ease-in-out infinite;
        }

        .spinner::before { content: '₿'; }

        @keyframes btcPulse {
            0%, 100% { transform: scale(1); opacity: 0.72; }
            50% { transform: scale(1.12); opacity: 1; }
        }

        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 18px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(127, 149, 191, 0.1);
            border: 1px solid rgba(127, 149, 191, 0.55);
            color: var(--secondary);
            cursor: pointer;
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            transition: all 0.28s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--secondary);
            color: #02121c;
            box-shadow: 0 0 16px rgba(127, 149, 191, 0.55);
        }

        .page-btn:disabled {
            border-color: #c7d2fe;
            color: #94a3b8;
            cursor: not-allowed;
            background: rgba(241, 245, 249, 0.92);
            box-shadow: none;
        }

        .page-info {
            font-family: 'JetBrains Mono', 'Noto Sans SC', 'Battambang', monospace;
            color: #ffd166;
            font-size: 1.02rem;
            letter-spacing: 1px;
        }

        .wallet-modal {
            position: fixed;
            inset: 0;
            z-index: 2300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wallet-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2200;
            display: none;
            background: rgba(8, 12, 27, 0.62);
            backdrop-filter: blur(2px);
        }

        .wallet-modal-content {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 1px solid rgba(111, 92, 255, 0.28);
            border-radius: 16px;
            box-shadow: 0 22px 34px rgba(15, 23, 42, 0.24);
            overflow: hidden;
        }

        .wallet-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(111, 92, 255, 0.16);
            background: linear-gradient(145deg, rgba(247, 248, 255, 0.95), rgba(242, 246, 255, 0.94));
        }

        .wallet-modal-header h2 {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-size: 1rem;
            color: var(--primary);
        }

        .wallet-modal-close {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--muted);
            line-height: 1;
        }

        .wallet-modal-body {
            padding: 16px;
            display: grid;
            gap: 10px;
        }

        .wallet-option {
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 10px;
            align-items: center;
            width: 100%;
            text-align: left;
            padding: 12px 12px;
            border-radius: 12px;
            border: 1px solid rgba(111, 92, 255, 0.2);
            background: rgba(247, 249, 255, 0.92);
            color: #1b1f3b;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .wallet-option:hover {
            transform: translateY(-1px);
            border-color: rgba(111, 92, 255, 0.45);
            box-shadow: 0 10px 18px rgba(77, 124, 255, 0.14);
        }

        .wallet-icon {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wallet-name {
            font-family: 'Sora', 'Noto Sans SC', 'Battambang', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: #1e2347;
        }

        .wallet-desc {
            grid-column: 2 / 3;
            margin-top: -2px;
            color: var(--muted);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.3rem; }
            .menu-toggle-btn { padding: 7px 13px; font-size: 0.85rem; }
            .movies-grid { gap: 18px; padding: 22px 14px; }
            .movie-poster { height: 280px; }
            .search-container { flex-direction: column; }
            #searchInput { min-width: unset; width: 100%; }
            #searchBtn { width: 100%; }
            header { padding: 14px; }
            .top-bar { justify-content: center; }
            .logo-container { order: 1; }
            h1 { order: 2; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <header id="mainHeader">
        <div class="top-bar">
            <div class="logo-container">
                <img src="logo.svg" alt="GitHub Movies" class="site-logo">
            </div>
            <h1 id="siteTitle">GITHUB MOVIES</h1>
            <button id="menuToggleBtn" class="menu-toggle-btn">☰ MENU</button>
            <div id="authContainer" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <div id="userInfo" style="display:none;color:var(--primary);font-family:'JetBrains Mono',monospace;cursor:pointer;"></div>
                <div id="walletInfo" style="display:none;color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:0.9rem;cursor:pointer;"></div>
                <button id="signOutBtn" class="type-btn" style="display:none;">Sign out</button>
            </div>
        </div>

        <div id="menuContainer" class="menu-container">
            <div class="ui-lang-wrapper">
                <select id="uiLangSelect" class="ui-lang-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="km">🇰🇭 ភាសាខ្មែរ</option>
                    <option value="zh">🇨🇳 中文</option>
                </select>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search Database...">
                <button id="searchBtn">🔍 SEARCH</button>
            </div>

            <div style="display:flex;justify-content:center;gap:10px;margin-top:12px;">
                <button id="menuLoginBtn" class="type-btn">🔐 Login</button>
                <button id="menuProfileBtn" class="type-btn" style="display:none;">👤 Profile</button>
            </div>
            
            <div class="type-selector">
                <button id="movieBtn" class="type-btn active">🎥 MOVIES</button>
                <button id="tvBtn" class="type-btn">📺 TV SHOWS</button>
                <button id="resetFilterBtn" class="type-btn filter-alert">✖ CLEAR ACTIVE FILTER</button>
            </div>

            <div id="filterWrapper">
                <div class="category-selector" id="categorySelector">
                    <button class="cat-btn active" data-cat="popular" id="catPopular">🔥 POPULAR</button>
                    <button class="cat-btn" data-cat="trending" id="catTrending">📈 TRENDING</button>
                    <button class="cat-btn" data-cat="top_rated" id="catTopRated">⭐ TOP RATED</button>
                </div>

                <div class="category-selector" id="languageSelector">
                    <button class="lang-btn active" data-lang="" id="langAll">🌐 ALL LANGUAGES</button>
                    <button class="lang-btn" data-lang="km" id="langKhmer">🇰🇭 KHMER</button>
                    <button class="lang-btn" data-lang="en" id="langEnglish">🇬🇧 ENGLISH</button>
                    <button class="lang-btn" data-lang="zh" id="langChinese">🇨🇳 CHINESE</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div id="moviesGrid" class="movies-grid">
            <div class="loading"><div class="spinner"></div><div id="initText">₿</div></div>
        </div>

        <div class="pagination" id="pagination">
            <button id="prevBtn" class="page-btn" disabled>&#8592; PREV</button>
            <span id="pageInfo" class="page-info">PAGE 1</span>
            <button id="nextBtn" class="page-btn">NEXT &#8594;</button>
        </div>
    </main>

    <!-- Wallet Selection Modal (Like OpenSea) -->
    <div class="wallet-modal" id="walletModal" style="display:none;">
        <div class="wallet-modal-content">
            <div class="wallet-modal-header">
                <h2>Connect Wallet</h2>
                <span class="wallet-modal-close" id="walletModalClose">&times;</span>
            </div>
            <div class="wallet-modal-body">
                <p style="color:var(--secondary);margin-bottom:20px;text-align:center;font-family:'JetBrains Mono',monospace;">Select a wallet to connect</p>
                <button class="wallet-option" id="connectMetaMask">
                    <div class="wallet-icon">🦊</div>
                    <div class="wallet-name">MetaMask</div>
                    <div class="wallet-desc">Connect to your MetaMask wallet</div>
                </button>
                <button class="wallet-option" id="connectTrustWallet">
                    <div class="wallet-icon">💎</div>
                    <div class="wallet-name">Trust Wallet</div>
                    <div class="wallet-desc">Connect to your Trust Wallet</div>
                </button>
            </div>
        </div>
    </div>
    <div class="wallet-modal-overlay" id="walletModalOverlay" style="display:none;"></div>

    <div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:2100;align-items:center;justify-content:center;padding:20px;">
        <div style="max-width:420px;width:100%;background:var(--card-bg);border:1px solid var(--secondary);border-radius:10px;padding:18px;box-shadow:0 0 24px rgba(0,0,0,0.45);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h2 id="profileName" style="font-family:'Sora',sans-serif;font-size:1.05rem;color:var(--primary);">Wallet Profile</h2>
                <button id="profileClose" class="type-btn" style="padding:6px 10px;">✕</button>
            </div>
            <div id="profileEmail" style="color:var(--secondary);margin-bottom:10px;font-family:'JetBrains Mono',monospace;"></div>
            <div id="walletAssetsSection" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--secondary);">
                <h3 style="color:var(--primary);margin-bottom:10px;font-size:0.9rem;">💰 Wallet Assets</h3>
                <div id="walletAddress" style="color:var(--secondary);font-family:'JetBrains Mono',monospace;font-size:0.8rem;margin-bottom:8px;"></div>
                <div id="walletBalance" style="color:#ffd166;font-family:'JetBrains Mono',monospace;font-size:1rem;margin-bottom:8px;"></div>
                <div id="walletChain" style="color:var(--primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;margin-bottom:10px;"></div>
                <button class="type-btn" id="walletRefresh" style="margin-bottom:10px;width:100%;">🔄 Refresh Balance</button>
            </div>
            <button class="type-btn" id="profileSignOut" style="width:100%;">Sign out</button>
        </div>
    </div>

    <script>
        // --- MENU TOGGLE LOGIC ---
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const menuContainer = document.getElementById('menuContainer');
        
        menuToggleBtn.addEventListener('click', () => {
            menuContainer.classList.toggle('active');
            menuToggleBtn.classList.toggle('active');
        });

        // --- HEADER HIDE ON SCROLL LOGIC ---
        let lastScrollY = window.scrollY;
        const mainHeader = document.getElementById('mainHeader');
        
        window.addEventListener('scroll', () => {
            // Only hide header if scrolled past its own height (so it doesn't glitch at the top)
            if (window.scrollY > lastScrollY && window.scrollY > mainHeader.offsetHeight) {
                // Scrolling DOWN - Hide Header (also closes the menu if left open)
                mainHeader.classList.add('header-hidden');
                menuContainer.classList.remove('active');
                menuToggleBtn.classList.remove('active');
            } else {
                // Scrolling UP - Show Header
                mainHeader.classList.remove('header-hidden');
            }
            lastScrollY = window.scrollY;
        });

        // Automatic Browser Language Detection on First Visit
        if (!localStorage.getItem('uiLang')) {
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang.toLowerCase().includes('km')) localStorage.setItem('uiLang', 'km');
            else if (browserLang.toLowerCase().includes('zh')) localStorage.setItem('uiLang', 'zh');
            else localStorage.setItem('uiLang', 'en');
        }

        const translations = {
            en: {
                siteTitle: "GITHUB MOVIES",
                searchPlaceholder: "Search Database...",
                searchBtn: "🔍 SEARCH",
                menuBtn: "☰ MENU",
                moviesBtn: "🎥 MOVIES",
                tvBtn: "📺 TV SHOWS",
                clearFilter: "✖ CLEAR ACTIVE FILTER",
                catPopular: "🔥 POPULAR",
                catTrending: "📈 TRENDING",
                catTopRated: "⭐ TOP RATED",
                langAll: "🌐 ALL LANGUAGES",
                langKhmer: "🇰🇭 KHMER",
                langEnglish: "🇬🇧 ENGLISH",
                langChinese: "🇨🇳 CHINESE",
                prevBtn: "&#8592; PREV",
                nextBtn: "NEXT &#8594;",
                initSystem: "₿",
                fetchingDB: "FETCHING ON-CHAIN CATALOG...",
                noResults: "🔍 NO RESULTS FOUND IN ARCHIVE",
                networkError: "⚠️ NETWORK ERROR • PLEASE REFRESH",
                pageOf: (cur, tot) => `PAGE ${cur} OF ${tot}`,
                scanCast: (name) => `SEARCHING TITLES FEATURING: ${name}`,
                filterGenre: (name) => `FILTERING BY GENRE: ${name}`,

                filterLang: (name) => `FILTERING NATIVE LANGUAGE: ${name}`,
                scanFor: (term) => `SEARCHING FOR "${term}"...`
            },
            km: {
                siteTitle: "GITHUB MOVIES",
                searchPlaceholder: "ស្វែងរកទិន្នន័យ...",
                searchBtn: "🔍 ស្វែងរក",
                menuBtn: "☰ ម៉ឺនុយ",

                langAll: "🌐 ភាសាទាំងអស់",
                langKhmer: "🇰🇭 ខ្មែរ",
                langEnglish: "🇬🇧 អង់គ្លេស",
                langChinese: "🇨🇳 ចិន",
                prevBtn: "&#8592; ថយក្រោយ",
                nextBtn: "បន្ទាប់ &#8594;",

                fetchingDB: "កំពុងទាញយកកាតាឡុក Web3...",

                networkError: "⚠️ បញ្ហាបណ្តាញ • សូមព្យាយាមម្តងទៀត",
                pageOf: (cur, tot) => `ទំព័រ ${cur} នៃ ${tot}`,
                scanCast: (name) => `ស្វែងរកតួសម្តែង: ${name}`,
                filterGenre: (name) => `ប្រភេទ: ${name}`,
                filterRegion: (name) => `តំបន់: ${name}`,
                filterLang: (name) => `ភាសា: ${name}`,
                scanFor: (term) => `ស្វែងរក "${term}"...`
            },
            zh: {
                siteTitle: "GITHUB MOVIES",
                searchPlaceholder: "搜索数据库...",
                searchBtn: "🔍 搜索",
                menuBtn: "☰ 菜单",
                moviesBtn: "🎥 电影",
                tvBtn: "📺 电视剧",
                clearFilter: "✖ 清除过滤",
                catPopular: "🔥 热门",
                catTrending: "📈 趋势",
                catTopRated: "⭐ 最高评分",
                langAll: "🌐 所有语言",
                langKhmer: "🇰🇭 高棉语",
                langEnglish: "🇬🇧 英语",
                langChinese: "🇨🇳 中文",
                prevBtn: "&#8592; 上一页",
                nextBtn: "下一页 &#8594;",
                initSystem: "₿",
                fetchingDB: "正在获取 Web3 片库...",
                noResults: "🔍 未找到结果",
                networkError: "⚠️ 网络错误 • 请刷新",
                pageOf: (cur, tot) => `第 ${cur} 页，共 ${tot} 页`,
                scanCast: (name) => `扫描参演文件: ${name}`,
                filterGenre: (name) => `按类型过滤: ${name}`,
                filterRegion: (name) => `过滤地区: ${name}`,
                filterLang: (name) => `过滤语言: ${name}`,
                scanFor: (term) => `正在搜索 "${term}"...`
            }
        };

        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        const urlParams = new URLSearchParams(window.location.search);
        let currentType = urlParams.get('type') || 'movie';
        const targetGenreId = urlParams.get('genre');
        const targetGenreName = urlParams.get('genreName');
        const targetActorId = urlParams.get('actor');
        const targetActorName = urlParams.get('actorName');
        const targetSearch = urlParams.get('search');
        const targetCountryId = urlParams.get('country');
        const targetCountryName = urlParams.get('countryName');
        const targetLangId = urlParams.get('lang');
        const targetLangName = urlParams.get('langName');

        let currentPage = 1;
        let totalPages = 1;
        let currentCategory = 'popular';
        let currentLanguage = '';

        const moviesGrid = document.getElementById('moviesGrid');
        const searchInput = document.getElementById('searchInput');
        const resetBtn = document.getElementById('resetFilterBtn');
        const filterWrapper = document.getElementById('filterWrapper');
        const paginationWrap = document.getElementById('pagination');
        const uiLangSelect = document.getElementById('uiLangSelect');

        if (currentType === 'tv') {
            document.getElementById('tvBtn').classList.add('active');
            document.getElementById('movieBtn').classList.remove('active');
        }

        if (targetGenreId || targetActorId || targetSearch || targetCountryId || targetLangId) {
            resetBtn.style.display = 'block';
            filterWrapper.style.display = 'none';
        }

        function getT() { return translations[localStorage.getItem('uiLang') || 'en']; }

        function updateUI() {
            const lang = localStorage.getItem('uiLang') || 'en';
            const t = translations[lang];
            uiLangSelect.value = lang;
            
            document.getElementById('siteTitle').innerText = t.siteTitle;
            document.title = t.siteTitle;
            searchInput.placeholder = t.searchPlaceholder;
            document.getElementById('searchBtn').innerText = t.searchBtn;
            document.getElementById('menuToggleBtn').innerText = t.menuBtn;
            document.getElementById('movieBtn').innerText = t.moviesBtn;
            document.getElementById('tvBtn').innerText = t.tvBtn;
            resetBtn.innerText = t.clearFilter;
            
            document.getElementById('catPopular').innerText = t.catPopular;
            document.getElementById('catTrending').innerText = t.catTrending;
            document.getElementById('catTopRated').innerText = t.catTopRated;
            
            document.getElementById('langAll').innerText = t.langAll;
            document.getElementById('langKhmer').innerText = t.langKhmer;
            document.getElementById('langEnglish').innerText = t.langEnglish;
            document.getElementById('langChinese').innerText = t.langChinese;

            document.getElementById('prevBtn').innerHTML = t.prevBtn;
            document.getElementById('nextBtn').innerHTML = t.nextBtn;
            
            const initEl = document.getElementById('initText');
            if(initEl) initEl.innerText = t.initSystem;
            
            updatePaginationUI();
        }

        function setGridMessage(message, showSpinner = false) {
            moviesGrid.innerHTML = `<div class="loading">${showSpinner ? '<div class="spinner"></div>' : ''}<div>${message}</div></div>`;
            paginationWrap.style.display = 'none';
        }

        async function fetchDashboardData() {
            const t = getT();
            if(currentPage === 1) setGridMessage(t.fetchingDB, true);
            let url;
            let displayContext = "";
            
            const uiLangCode = localStorage.getItem('uiLang') || 'en';
            const tmdbLang = uiLangCode === 'km' ? 'km-KH' : (uiLangCode === 'zh' ? 'zh-CN' : 'en-US');

            try {
                if (targetActorId) {
                    displayContext = t.scanCast(targetActorName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_cast=${targetActorId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetGenreId) {
                    displayContext = t.filterGenre(targetGenreName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_genres=${targetGenreId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetCountryId) {
                    displayContext = t.filterRegion(targetCountryName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_origin_country=${targetCountryId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetLangId) {
                    displayContext = t.filterLang(targetLangName.toUpperCase());
                    url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_original_language=${targetLangId}&sort_by=popularity.desc&page=${currentPage}&language=${tmdbLang}`;
                } else if (targetSearch) {
                    displayContext = t.scanFor(targetSearch.toUpperCase());
                    url = `https://api.themoviedb.org/3/search/${currentType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(targetSearch)}&page=${currentPage}&language=${tmdbLang}`;
                    searchInput.value = targetSearch;
                } else {
                    if (currentLanguage) {
                        let sortType = currentCategory === 'top_rated' ? 'vote_average.desc&vote_count.gte=200' : 'popularity.desc';
                        url = `https://api.themoviedb.org/3/discover/${currentType}?api_key=${TMDB_API_KEY}&with_original_language=${currentLanguage}&sort_by=${sortType}&page=${currentPage}&language=${tmdbLang}`;
                    } else {
                        if (currentCategory === 'trending') {
                            url = `https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
                        } else if (currentCategory === 'top_rated') {
                            url = `https://api.themoviedb.org/3/${currentType}/top_rated?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
                        } else {
                            url = `https://api.themoviedb.org/3/${currentType}/popular?api_key=${TMDB_API_KEY}&page=${currentPage}&language=${tmdbLang}`;
                        }
                    }
                }

                if (displayContext && currentPage === 1) setGridMessage(displayContext, true);

                const res = await fetch(url);
                const data = await res.json();
                
                totalPages = data.total_pages || 1;
                if(totalPages > 500) totalPages = 500; 

                displayItems(data.results);
                updatePaginationUI();
            } catch (error) {
                setGridMessage(t.networkError);
            }
        }

        function displayItems(items) {
            moviesGrid.innerHTML = '';
            const t = getT();
            if (!items || items.length === 0) {
                setGridMessage(t.noResults);
                return;
            }
            const fragment = document.createDocumentFragment();
            items.forEach(item => {
                if (!item.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                const title = item.title || item.name;
                const date = item.release_date || item.first_air_date;
                const year = date ? date.substring(0, 4) : 'N/A';
                const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
                
                card.onclick = () => { window.location.href = `play.html?tmdb=${item.id}&type=${currentType}&title=${encodeURIComponent(title)}`; };
                
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" class="movie-poster" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-title">${escapeHtml(title)}</div>
                        <div class="movie-year">📅 ${year}</div>
                        <div class="movie-rating">⭐ ${rating}/10</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            moviesGrid.appendChild(fragment);
            paginationWrap.style.display = 'flex';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updatePaginationUI() {
            const t = getT();
            document.getElementById('pageInfo').innerText = t.pageOf(currentPage, totalPages);
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        uiLangSelect.addEventListener('change', (e) => {
            localStorage.setItem('uiLang', e.target.value);
            updateUI();
            currentPage = 1; 
            fetchDashboardData();
        });

        function searchContent() {
            const term = searchInput.value.trim();
            if (term) window.location.href = `index.html?search=${encodeURIComponent(term)}&type=${currentType}`;
            else window.location.href = `index.html?type=${currentType}`;
        }
        document.getElementById('movieBtn').addEventListener('click', () => { window.location.href = 'index.html?type=movie'; });
        document.getElementById('tvBtn').addEventListener('click', () => { window.location.href = 'index.html?type=tv'; });
        resetBtn.addEventListener('click', () => { window.location.href = `index.html?type=${currentType}`; });
        document.getElementById('searchBtn').addEventListener('click', searchContent);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchContent(); });

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.cat;
                currentPage = 1; fetchDashboardData();
            });
        });

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentLanguage = e.target.dataset.lang;
                currentPage = 1; fetchDashboardData();
            });
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; fetchDashboardData(); window.scrollTo({top: 0, behavior: 'smooth'}); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentPage < totalPages) { currentPage++; fetchDashboardData(); window.scrollTo({top: 0, behavior: 'smooth'}); }
        });

        // --- Web3 Wallet Login (MetaMask / Trust Wallet) ---
        const menuLoginBtn = document.getElementById('menuLoginBtn');
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const walletInfo = document.getElementById('walletInfo');
        const walletModal = document.getElementById('walletModal');
        const walletModalOverlay = document.getElementById('walletModalOverlay');
        const profileModal = document.getElementById('profileModal');
        const profileName = document.getElementById('profileName');
        const profileEmail = document.getElementById('profileEmail');
        const walletAssetsSection = document.getElementById('walletAssetsSection');
        const walletAddress = document.getElementById('walletAddress');
        const walletBalance = document.getElementById('walletBalance');
        const walletChain = document.getElementById('walletChain');

        function openWalletModal() {
            if (!walletModal || !walletModalOverlay) return;
            walletModal.style.display = 'flex';
            walletModalOverlay.style.display = 'block';
        }

        function closeWalletModal() {
            if (!walletModal || !walletModalOverlay) return;
            walletModal.style.display = 'none';
            walletModalOverlay.style.display = 'none';
        }

        function showProfileModal() {
            if (!profileModal || !window.web3Auth || !web3Auth.isConnected()) return;
            const data = web3Auth.getWalletData();
            if (profileName) profileName.innerText = `Wallet Profile (${data.shortAddress})`;
            if (profileEmail) profileEmail.innerText = `Connected with ${web3Auth.provider || 'Web3 Wallet'}`;
            if (walletAddress) walletAddress.innerText = `Address: ${data.address || 'N/A'}`;
            if (walletBalance) walletBalance.innerText = `Balance: ${data.balance || '0.0000'} ETH`;
            if (walletChain) walletChain.innerText = `Network: ${data.chainName || 'Unknown'}`;
            if (walletAssetsSection) walletAssetsSection.style.display = 'block';
            profileModal.style.display = 'flex';
        }

        function hideProfileModal() {
            if (profileModal) profileModal.style.display = 'none';
        }

        function updateWalletUI(walletData) {
            if (!walletData) return;
            const short = `${walletData.address.slice(0, 6)}...${walletData.address.slice(-4)}`;
            if (walletInfo) {
                walletInfo.style.display = 'inline-block';
                walletInfo.innerText = `🦊 ${short}`;
            }
            if (menuLoginBtn) menuLoginBtn.style.display = 'none';
            if (menuProfileBtn) menuProfileBtn.style.display = 'inline-block';
        }

        async function connectMetaMaskWallet() {
            if (!window.web3Auth) {
                alert('Web3 module not loaded. Please refresh the page.');
                return;
            }
            const walletData = await web3Auth.connectMetaMask();
            if (walletData) {
                updateWalletUI(walletData);
                closeWalletModal();
            }
        }

        async function connectTrustWalletProvider() {
            if (!window.web3Auth) {
                alert('Web3 module not loaded. Please refresh the page.');
                return;
            }
            const walletData = await web3Auth.connectTrustWallet();
            if (walletData) {
                updateWalletUI(walletData);
                closeWalletModal();
            }
        }

        function signOutWallet() {
            if (window.web3Auth) web3Auth.disconnect();
            if (walletInfo) {
                walletInfo.style.display = 'none';
                walletInfo.innerText = '';
            }
            if (menuLoginBtn) menuLoginBtn.style.display = 'inline-block';
            if (menuProfileBtn) menuProfileBtn.style.display = 'none';
            hideProfileModal();
        }

        if (menuLoginBtn) {
            menuLoginBtn.addEventListener('click', async () => {
                // MetaMask-first UX: connect directly when available, else show options
                if (window.web3Auth && web3Auth.isMetaMaskAvailable()) {
                    await connectMetaMaskWallet();
                } else {
                    openWalletModal();
                }
            });
        }
        if (menuProfileBtn) menuProfileBtn.addEventListener('click', showProfileModal);
        if (walletInfo) walletInfo.addEventListener('click', showProfileModal);
        document.getElementById('walletModalClose')?.addEventListener('click', closeWalletModal);
        if (walletModalOverlay) walletModalOverlay.addEventListener('click', closeWalletModal);
        document.getElementById('connectMetaMask')?.addEventListener('click', connectMetaMaskWallet);
        document.getElementById('connectTrustWallet')?.addEventListener('click', connectTrustWalletProvider);
        document.getElementById('profileClose')?.addEventListener('click', hideProfileModal);
        document.getElementById('profileSignOut')?.addEventListener('click', signOutWallet);
        document.getElementById('walletRefresh')?.addEventListener('click', async () => {
            if (!window.web3Auth || !web3Auth.isConnected()) return;
            await web3Auth.refreshBalance();
            showProfileModal();
        });

        // Keep UI synced with wallet events
        window.addEventListener('walletAccountChanged', () => {
            if (!window.web3Auth || !web3Auth.isConnected()) return signOutWallet();
            updateWalletUI(web3Auth.getWalletData());
        });
        window.addEventListener('walletChainChanged', () => {
            if (!window.web3Auth || !web3Auth.isConnected()) return;
            updateWalletUI(web3Auth.getWalletData());
        });

        updateUI();
        fetchDashboardData();
    </script>
    <script src="web3-auth.js"></script>
