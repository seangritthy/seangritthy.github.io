name: Deploy Pages (inject Google Client ID)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          rm -rf site
          mkdir site
          rsync -av --exclude='.git' --exclude='.github' --exclude='.github/workflows' ./ site/

      - name: Inject Google Client ID
        env:
          G_CLIENT_ID: ${{ secrets.G_CLIENT_ID }}
        run: |
          if [ -n "$G_CLIENT_ID" ]; then
            echo "Injecting Google Client ID"
            sed -i "s/REPLACE_WITH_GOOGLE_CLIENT_ID.apps.googleusercontent.com/${G_CLIENT_ID}/g" site/script.js || true
            sed -i "s/REPLACE_WITH_GOOGLE_CLIENT_ID.apps.googleusercontent.com/${G_CLIENT_ID}/g" site/play.html || true
          else
            echo "G_CLIENT_ID not set; leaving placeholder in place"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
