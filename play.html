<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MVHD | Cloudnestra Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            color: #00ff9d;
            padding: 10px 20px;
            font-size: 12px;
            font-family: monospace;
            z-index: 1000;
            border-top: 1px solid #00ff9d;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge {
            padding: 4px 12px;
            background: rgba(0,255,157,0.1);
            border: 1px solid #00ff9d;
            border-radius: 20px;
            font-size: 11px;
        }
        .badge.success {
            background: rgba(0,255,157,0.2);
            color: #00ff9d;
        }
        .badge.error {
            border-color: #ff4444;
            color: #ff4444;
        }
        button {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 6px 15px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        .back-btn {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,157,0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #00ff9d;
        }
        .loading-step {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="videoPlayer" controls autoplay playsinline></video>
    </div>

    <div class="info-bar">
        <div class="info-left">
            <span id="movieTitle">Cloudnestra Player</span>
            <span class="badge" id="statusBadge">⚡ INITIALIZING</span>
        </div>
        <div class="info-right">
            <button class="back-btn" onclick="window.location.href='index.html'">← BACK</button>
            <button onclick="location.reload()">⟳ RELOAD</button>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">DECODING CLOUDNESTRA URL...</div>
        <div class="loading-step" id="loadingStep"></div>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        let cloudnestraUrl = urlParams.get('url');
        const tmdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const title = urlParams.get('title') || '';

        if (title) {
            document.title = `MVHD | ${title}`;
            document.getElementById('movieTitle').innerHTML = title;
        }

        function updateLoading(msg, step) {
            document.getElementById('loadingText').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
            console.log(msg);
        }

        function updateStatus(msg, isError = false) {
            const badge = document.getElementById('statusBadge');
            badge.textContent = msg;
            badge.className = `badge ${isError ? 'error' : 'success'}`;
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }

        function showError(msg) {
            updateStatus(msg, true);
            updateLoading('ERROR', msg);
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.95);
                border: 2px solid #ff4444;
                padding: 30px;
                border-radius: 10px;
                text-align: center;
                z-index: 1002;
                min-width: 300px;
            `;
            errorDiv.innerHTML = `
                <div style="color: #ff4444; font-size: 48px; margin-bottom: 15px;">❌</div>
                <div style="color: #ff4444; margin-bottom: 20px;">${msg}</div>
                <button onclick="location.reload()">RETRY</button>
                <button onclick="window.location.href='index.html'" style="margin-left: 10px;">GO BACK</button>
            `;
            document.body.appendChild(errorDiv);
            setTimeout(() => hideLoading(), 3000);
        }

        // Generate Cloudnestra URL from TMDB ID
        function generateCloudnestraUrl(id, type) {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudnestra.com/rcp/${encoded}`;
        }

        // Decode Cloudnestra URL to get vidsrc URL
        function decodeCloudnestraUrl(cloudUrl) {
            try {
                const match = cloudUrl.match(/\/rcp\/([A-Za-z0-9+\/=]+)/);
                if (!match) throw new Error('Invalid Cloudnestra URL');
                
                let encoded = match[1];
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                const decoded = atob(encoded);
                console.log('Decoded vidsrc URL:', decoded);
                return decoded;
            } catch(e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        // Fetch the actual stream URL from vidsrc page
        async function fetchStreamFromVidSrc(vidsrcUrl) {
            updateLoading('FETCHING STREAM...', 'Connecting to vidsrc.to');
            
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(vidsrcUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(vidsrcUrl)}`
            ];
            
            for (const proxy of proxies) {
                try {
                    updateLoading('FETCHING STREAM...', `Trying to fetch...`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    const response = await fetch(proxy, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const html = await response.text();
                        updateLoading('PARSING RESPONSE...', 'Looking for video stream');
                        
                        const patterns = [
                            /(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i,
                            /(https?:\/\/[^\s"']+\/master[^\s"']*\.m3u8)/i,
                            /(https?:\/\/[^\s"']+\/playlist[^\s"']*\.m3u8)/i,
                            /(https?:\/\/[^\s"']+\/index[^\s"']*\.m3u8)/i
                        ];
                        
                        for (const pattern of patterns) {
                            const match = html.match(pattern);
                            if (match) {
                                return match[1];
                            }
                        }
                    }
                } catch(e) {
                    console.log('Proxy failed:', e.message);
                }
            }
            return null;
        }

        // Play video with HLS.js
        function playVideo(url) {
            const video = document.getElementById('videoPlayer');
            updateStatus('STREAM FOUND', false);
            
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    if (video.hls) video.hls.destroy();
                    const hls = new Hls({
                        debug: false,
                        enableWorker: true,
                        manifestLoadingTimeOut: 15000,
                        manifestLoadingMaxRetry: 3
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    video.hls = hls;
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        updateStatus('PLAYING', false);
                        hideLoading();
                        video.play().catch(e => updateStatus('CLICK TO PLAY', false));
                    });
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            showError('HLS Error: ' + data.type);
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    updateStatus('PLAYING', false);
                    hideLoading();
                    video.play();
                } else {
                    showError('HLS not supported in this browser');
                }
            } else {
                video.src = url;
                updateStatus('PLAYING', false);
                hideLoading();
                video.play();
            }
        }

        // Main function
        async function main() {
            let cloudUrl = cloudnestraUrl;
            
            // If no Cloudnestra URL but have TMDB ID, generate one
            if (!cloudUrl && tmdbId) {
                updateLoading('GENERATING CLOUDNESTRA URL...', `TMDB ID: ${tmdbId}`);
                cloudUrl = generateCloudnestraUrl(tmdbId, mediaType);
                console.log('Generated Cloudnestra URL:', cloudUrl);
            }
            
            if (!cloudUrl) {
                showError('No Cloudnestra URL or TMDB ID provided');
                return;
            }
            
            try {
                // First decode to verify it's valid
                const decodedUrl = decodeCloudnestraUrl(cloudUrl);
                if (!decodedUrl) {
                    showError('Invalid Cloudnestra URL format');
                    return;
                }
                console.log('Decoded to:', decodedUrl);
                
                // Fetch the actual stream
                const streamUrl = await fetchStreamFromVidSrc(decodedUrl);
                
                if (streamUrl) {
                    playVideo(streamUrl);
                } else {
                    // Fallback: Try to use the decoded URL directly
                    updateLoading('FALLBACK MODE...', 'Using direct vidsrc embed');
                    const iframe = document.createElement('iframe');
                    iframe.src = decodedUrl;
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.border = 'none';
                    document.querySelector('.container').innerHTML = '';
                    document.querySelector('.container').appendChild(iframe);
                    updateStatus('FALLBACK MODE', true);
                    hideLoading();
                }
            } catch(e) {
                showError(e.message);
            }
        }

        // Start
        main();
    </script>
</body>
</html>
