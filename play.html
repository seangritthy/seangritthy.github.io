<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --web3-purple: #8a2be2;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0; padding: 0; background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden;
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2; pointer-events: none;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5); font-family: 'Share Tech Mono', monospace;
        }

        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; text-decoration: none;}

        .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; display: none; }
        
        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border);
            padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; display: flex; gap: 30px; flex-wrap: wrap;
        }
        .movie-info-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite; background-size: 200% 100%;
        }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        .movie-details { flex: 1; min-width: 300px; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.7); }
        .tagline { font-style: italic; color: var(--cyber-blue); margin-bottom: 15px; font-size: 1.1rem; }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); }
        .overview { margin: 20px 0; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }
        .genres { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .genre-tag { padding: 5px 15px; background: rgba(123, 97, 255, 0.2); border: 1px solid var(--secondary); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; }

        .player-container {
            background: var(--player-bg); border: 3px solid var(--primary); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px; position: relative;
        }
        .player-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite; z-index: 2;
        }
        #stream-frame { width: 100%; height: 650px; border: none; display: block; }

        .status-badges { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .status-badge {
            padding: 12px 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; letter-spacing: 1px;
            display: inline-flex; align-items: center; gap: 10px; animation: badgePulse 2s infinite;
        }
        .badge-primary { background: rgba(0, 255, 157, 0.1); border: 2px solid var(--primary); color: var(--primary); }
        .badge-warning { background: rgba(255, 242, 0, 0.1); border: 2px solid var(--cyber-yellow); color: var(--cyber-yellow); }
        .badge-success { background: rgba(0, 204, 255, 0.1); border: 2px solid var(--cyber-blue); color: var(--cyber-blue); }
        @keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; gap: 20px;
            transition: opacity 0.5s;
        }
        .spinner { width: 60px; height: 60px; border: 3px solid rgba(0, 255, 157, 0.2); border-top-color: #00ff9d; border-right-color: #7b61ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 255, 157, 0.7); }
        .loading-bar { width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 2s infinite; }
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }

        /* Server Selector */
        .server-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .server-btn {
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .server-btn:hover, .server-btn.active {
            background: var(--primary);
            color: #000;
        }

        @media (max-width: 768px) { #stream-frame { height: 400px; } .movie-title { font-size: 1.5rem; } .main-container { padding: 120px 15px 30px; } .movie-info-panel { flex-direction: column; } .movie-poster { max-width: 200px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">INITIALIZING MAINFRAME...</div>
        <div class="loading-bar"></div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        </div>
    </header>

    <div class="main-container" id="mainContent">
        <!-- Server Selector -->
        <div class="server-selector" id="serverSelector">
            <button class="server-btn active" data-server="vidsrc">🎬 VidSrc.to</button>
            <button class="server-btn" data-server="embed2">📺 2Embed</button>
            <button class="server-btn" data-server="auto">🔄 AutoEmbed</button>
            <button class="server-btn" data-server="multi">📽️ MultiEmbed</button>
        </div>

        <div class="movie-info-panel" id="moviePanel">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="movieTitle">Loading...</span> <span id="movieYear" style="color: var(--cyber-yellow);"></span></h1>
                <div class="tagline" id="taglineText" style="display: none;"></div>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="movieRating">-</span>/10 (<span id="voteCount">0</span> votes)</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="movieRuntime">-</span></div>
                    <div class="meta-item">📅 RELEASE: <span id="releaseDate">-</span></div>
                </div>
                <div class="overview" id="movieOverview"></div>
                <div class="genres" id="genresContainer"></div>
            </div>
        </div>

        <div class="player-container">
            <iframe id="stream-frame" src="" allowfullscreen></iframe>
        </div>

        <div class="status-badges">
            <div class="status-badge badge-success" id="tmdbBadge">🎬 TMDB ID: -</div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        let tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        const season = urlParams.get('season') || 1;
        const episode = urlParams.get('episode') || 1;
        
        // Default demo movie
        if (!tmdbId) {
            tmdbId = '1380291';
        }
        
        // Server configurations (working embed sources)
        const servers = {
            vidsrc: {
                name: 'VidSrc.to',
                getUrl: () => {
                    if (mediaType === 'tv') {
                        return `https://vidsrc.to/embed/tv/${tmdbId}/${season}/${episode}`;
                    }
                    return `https://vidsrc.to/embed/movie/${tmdbId}`;
                }
            },
            embed2: {
                name: '2Embed',
                getUrl: () => {
                    if (mediaType === 'tv') {
                        return `https://www.2embed.cc/embedtv/${tmdbId}&s=${season}&e=${episode}`;
                    }
                    return `https://www.2embed.cc/embed/${tmdbId}`;
                }
            },
            auto: {
                name: 'AutoEmbed',
                getUrl: () => {
                    if (mediaType === 'tv') {
                        return `https://autoembed.to/tv/tmdb/${tmdbId}/${season}/${episode}`;
                    }
                    return `https://autoembed.to/movie/tmdb/${tmdbId}`;
                }
            },
            multi: {
                name: 'MultiEmbed',
                getUrl: () => {
                    if (mediaType === 'tv') {
                        return `https://multiembed.mov/video/${tmdbId}/tv-${season}-${episode}`;
                    }
                    return `https://multiembed.mov/video/${tmdbId}`;
                }
            }
        };
        
        let currentServer = 'vidsrc';
        
        function updateLoading(text) {
            document.getElementById('loadingText').textContent = text;
        }
        
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 500);
        }
        
        // Fetch movie info from TMDB
        async function fetchMovieInfo() {
            try {
                const url = `https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${TMDB_API_KEY}&language=en-US`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Movie not found');
                
                const data = await response.json();
                const title = data.title || data.name;
                const year = (data.release_date || data.first_air_date || '').substring(0,4);
                
                document.title = `MVHD | ${title}`;
                document.getElementById('movieTitle').textContent = title;
                document.getElementById('movieYear').textContent = year ? `(${year})` : '';
                document.getElementById('movieRating').textContent = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
                document.getElementById('voteCount').textContent = data.vote_count || 0;
                document.getElementById('movieRuntime').textContent = data.runtime ? `${data.runtime} min` : (data.episode_run_time?.[0] ? `${data.episode_run_time[0]} min` : 'N/A');
                document.getElementById('releaseDate').textContent = data.release_date || data.first_air_date || 'N/A';
                document.getElementById('movieOverview').textContent = data.overview || 'No description available.';
                document.getElementById('tmdbBadge').innerHTML = `🎬 ${title} (${year})`;
                
                if (data.poster_path) {
                    document.getElementById('moviePoster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                }
                
                if (data.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                }

                if (data.tagline) {
                    document.getElementById('taglineText').innerHTML = `"${data.tagline}"`;
                    document.getElementById('taglineText').style.display = 'block';
                }

                if (data.genres && data.genres.length > 0) {
                    const genresDiv = document.getElementById('genresContainer');
                    genresDiv.innerHTML = '';
                    data.genres.forEach(g => {
                        const span = document.createElement('span');
                        span.className = 'genre-tag';
                        span.textContent = g.name;
                        genresDiv.appendChild(span);
                    });
                }
                
                return true;
            } catch(e) {
                console.error('TMDB Error:', e);
                document.getElementById('movieTitle').textContent = `Movie ID: ${tmdbId}`;
                document.getElementById('movieOverview').textContent = 'Movie details unavailable, but stream may still work.';
                return false;
            }
        }
        
        // Load server
        function loadServer(serverKey) {
            currentServer = serverKey;
            const server = servers[serverKey];
            
            if (!server) return;
            
            const url = server.getUrl();
            const iframe = document.getElementById('stream-frame');
            iframe.src = url;
            
            // Update active button
            document.querySelectorAll('.server-btn').forEach(btn => {
                if (btn.dataset.server === serverKey) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Initialize
        async function init() {
            updateLoading('FETCHING MOVIE DATA...');
            await fetchMovieInfo();
            updateLoading('LOADING STREAM...');
            loadServer(currentServer);
            
            const iframe = document.getElementById('stream-frame');
            iframe.onload = () => {
                hideLoading();
            };
            
            setTimeout(() => {
                hideLoading();
            }, 5000);
        }
        
        // Server button handlers
        document.querySelectorAll('.server-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const serverKey = btn.dataset.server;
                loadServer(serverKey);
            });
        });
        
        init();
    </script>
</body>
</html>
