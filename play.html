<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD | CloudCinema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #00ff9d;
            z-index: 100;
        }

        .header h1 {
            color: #00ff9d;
            font-size: 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px 20px;
        }

        .movie-info {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00ff9d;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .poster {
            width: 200px;
            height: auto;
            border: 2px solid #00ff9d;
        }

        .details {
            flex: 1;
        }

        .title {
            font-size: 2rem;
            color: #00ff9d;
            margin-bottom: 10px;
        }

        .meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .overview {
            line-height: 1.5;
            color: #ccc;
        }

        .player {
            background: #000;
            border: 3px solid #00ff9d;
            border-radius: 10px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 650px;
            border: none;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,255,157,0.1);
            border: 1px solid #00ff9d;
            text-align: center;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,157,0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            iframe { height: 400px; }
            .title { font-size: 1.3rem; }
            .poster { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">INITIALIZING...</div>
    </div>

    <div class="header">
        <h1>🎬 MVHD CYBERCINEMA</h1>
    </div>

    <div class="container" id="container" style="display: none;">
        <div class="movie-info" id="movieInfo">
            <img class="poster" id="poster" src="" alt="Poster">
            <div class="details">
                <div class="title" id="title">Loading...</div>
                <div class="meta">
                    <span>⭐ RATING: <span id="rating">-</span>/10</span>
                    <span>⏱️ RUNTIME: <span id="runtime">-</span></span>
                </div>
                <div class="overview" id="overview"></div>
            </div>
        </div>

        <div class="player">
            <iframe id="player" src="" allowfullscreen></iframe>
        </div>

        <div class="status" id="status">☁️ CLOUDORCHESTRANOVA • READY</div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        let tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        
        // Default demo movie
        if (!tmdbId) {
            tmdbId = '1380291';
        }
        
        function updateLoading(text) {
            document.getElementById('loadingText').textContent = text;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading');
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
                document.getElementById('container').style.display = 'block';
            }, 500);
        }
        
        // Generate CloudOrchestraNova URL from TMDB ID
        function generateCloudUrl(id, type) {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudorchestranova.com/rcp/${encoded}`;
        }
        
        async function loadMovie() {
            try {
                // Fetch movie info from TMDB
                updateLoading(`FETCHING MOVIE: ${tmdbId}...`);
                const res = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${TMDB_API_KEY}&language=en-US`);
                
                if (res.ok) {
                    const movie = await res.json();
                    const title = movie.title || movie.name;
                    const year = (movie.release_date || movie.first_air_date || '').substring(0,4);
                    
                    document.getElementById('title').innerHTML = `${title} ${year ? `(${year})` : ''}`;
                    document.getElementById('rating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                    document.getElementById('runtime').textContent = movie.runtime ? `${movie.runtime} min` : 'N/A';
                    document.getElementById('overview').textContent = movie.overview || 'No description available.';
                    
                    if (movie.poster_path) {
                        document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    }
                    
                    if (movie.backdrop_path) {
                        document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                        document.body.style.backgroundSize = 'cover';
                    }
                } else {
                    document.getElementById('title').innerHTML = `Movie ID: ${tmdbId}`;
                    document.getElementById('overview').textContent = 'Movie details unavailable, but stream may still work.';
                }
                
                // Generate and load CloudOrchestraNova URL
                updateLoading('GENERATING STREAM URL...');
                const cloudUrl = generateCloudUrl(tmdbId, mediaType);
                console.log('Cloud URL:', cloudUrl);
                
                document.getElementById('player').src = cloudUrl;
                document.getElementById('status').innerHTML = `☁️ CLOUDORCHESTRANOVA • STREAMING (${tmdbId})`;
                
                hideLoading();
                
            } catch(e) {
                console.error('Error:', e);
                updateLoading('ERROR LOADING MOVIE');
                setTimeout(() => hideLoading(), 2000);
            }
        }
        
        loadMovie();
    </script>
</body>
</html>
