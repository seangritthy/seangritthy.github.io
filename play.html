<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MVHD | Cloudnestra Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #ff006e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input, select {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #00d4ff, #ff006e);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .player-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        video {
            width: 100%;
            height: auto;
            min-height: 400px;
            max-height: 70vh;
            display: block;
        }

        .info-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }

        .info-row {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            font-size: 12px;
            word-break: break-all;
            flex-wrap: wrap;
        }

        .info-label {
            font-weight: 600;
            color: #00d4ff;
            min-width: 100px;
        }

        .info-value {
            color: #aaa;
            font-family: monospace;
            flex: 1;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 15px;
        }

        .status.loading { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status.success { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status.error { background: rgba(244,67,54,0.2); color: #f44336; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .extraction-log {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #888;
        }

        .log-entry.success { color: #4caf50; }
        .log-entry.error { color: #f44336; }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .input-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Initializing...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>☁️ Cloudnestra Extractor</h1>
            <p style="color: #888; margin-top: 10px;">Extracts Cloudnestra stream from vidsrc.to · No ads · Direct playback</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="tmdbId" placeholder="Enter TMDB ID (e.g., 1327819 for The Matrix)">
                <select id="mediaType">
                    <option value="movie">🎬 Movie</option>
                    <option value="tv">📺 TV Show</option>
                </select>
                <button id="extractBtn">🔍 Extract & Play</button>
            </div>
        </div>

        <div class="player-container">
            <video id="videoPlayer" controls preload="auto" playsinline></video>
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">📺 Status:</span>
                <span class="info-value" id="statusText">Ready</span>
            </div>
            <div class="info-row">
                <span class="info-label">🎬 Movie:</span>
                <span class="info-value" id="movieTitle">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">☁️ Stream URL:</span>
                <span class="info-value" id="streamUrl">-</span>
            </div>
        </div>

        <div class="extraction-log" id="extractionLog">
            <div class="log-entry">📡 Ready to extract Cloudnestra from vidsrc.to</div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('extractionLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            console.log(message);
        }

        function showLoading(msg) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').textContent = msg;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function updateStatus(msg, isError = false) {
            const statusSpan = document.getElementById('statusText');
            statusSpan.textContent = msg;
            statusSpan.style.color = isError ? '#f44336' : '#4caf50';
        }

        // Decode Cloudnestra RCP URL to get actual video URL
        function decodeCloudnestraUrl(cloudnestraUrl) {
            try {
                addLog(`🔓 Decoding Cloudnestra URL...`);
                const match = cloudnestraUrl.match(/\/rcp\/([A-Za-z0-9+\/=]+)/);
                if (!match) throw new Error("Invalid Cloudnestra URL");
                
                let encoded = match[1];
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                const decoded = atob(encoded);
                addLog(`📦 Decoded payload (${decoded.length} chars)`);
                
                // Find video URL in decoded content
                const patterns = [
                    /(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\.mp4[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\/master[^\s"']*\.m3u8)/i,
                    /(https?:\/\/[^\s"']+\/playlist[^\s"']*\.m3u8)/i
                ];
                
                for (const pattern of patterns) {
                    const match = decoded.match(pattern);
                    if (match) {
                        addLog(`✅ Found stream: ${match[1].substring(0, 60)}...`, 'success');
                        return match[1];
                    }
                }
                
                if (decoded.startsWith('http')) {
                    addLog(`✅ Decoded result is direct URL`, 'success');
                    return decoded;
                }
                
                throw new Error("No video URL found");
            } catch(e) {
                addLog(`❌ Decode failed: ${e.message}`, 'error');
                return null;
            }
        }

        // Fetch vidsrc.to page and extract Cloudnestra URL
        async function extractCloudnestraFromVidSrc(tmdbId, type) {
            const embedUrl = `https://vidsrc.to/embed/${type}/${tmdbId}`;
            addLog(`🌐 Fetching: ${embedUrl}`);
            
            // Try multiple CORS proxies
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(embedUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(embedUrl)}`,
                `https://cors-anywhere.herokuapp.com/${embedUrl}`
            ];
            
            for (const proxy of proxies) {
                try {
                    addLog(`🔄 Trying proxy: ${proxy.substring(0, 50)}...`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    const response = await fetch(proxy, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        const html = data.contents || data;
                        addLog(`📄 Got HTML (${html.length} bytes)`);
                        
                        // Look for Cloudnestra RCP URL
                        const cloudPatterns = [
                            /https?:\/\/[^\s"']*cloudnestra[^\s"']*\/rcp\/[A-Za-z0-9+\/=]+/gi,
                            /["']([^"']*\/rcp\/[^"']+)["']/gi,
                            /(?:src|href)=["']([^"']*cloudnestra[^"']*\/rcp\/[^"']*)["']/gi
                        ];
                        
                        for (const pattern of cloudPatterns) {
                            const matches = html.matchAll(pattern);
                            for (const match of matches) {
                                let cloudUrl = match[1] || match[0];
                                if (!cloudUrl.startsWith('http')) cloudUrl = 'https:' + cloudUrl;
                                addLog(`🎯 Found Cloudnestra URL!`, 'success');
                                return cloudUrl;
                            }
                        }
                        
                        // Also check for direct m3u8 as fallback
                        const directM3u8 = html.match(/(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i);
                        if (directM3u8) {
                            addLog(`🎯 Found direct m3u8!`, 'success');
                            return directM3u8[1];
                        }
                    }
                } catch(e) {
                    addLog(`⚠️ Proxy failed: ${e.message}`, 'error');
                }
            }
            return null;
        }

        // Fetch movie info from TMDB
        async function fetchMovieInfo(id, type) {
            try {
                const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=en-US`;
                const response = await fetch(url);
                const data = await response.json();
                return data.title || data.name;
            } catch(e) {
                return `ID: ${id}`;
            }
        }

        // Play video with HLS.js
        function playVideo(url) {
            const video = document.getElementById('videoPlayer');
            document.getElementById('streamUrl').textContent = url.substring(0, 80) + (url.length > 80 ? '...' : '');
            
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    if (video.hls) video.hls.destroy();
                    const hls = new Hls({ debug: false, enableWorker: true });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    video.hls = hls;
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        updateStatus("Playing HLS stream");
                        video.play().catch(() => updateStatus("Click play to start"));
                    });
                    hls.on(Hls.Events.ERROR, () => updateStatus("HLS error", true));
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    updateStatus("Playing HLS stream");
                    video.play();
                } else {
                    updateStatus("HLS not supported", true);
                }
            } else {
                video.src = url;
                updateStatus("Playing video");
                video.play();
            }
        }

        // Main extraction and playback
        async function extractAndPlay() {
            const tmdbId = document.getElementById('tmdbId').value.trim();
            const mediaType = document.getElementById('mediaType').value;
            
            if (!tmdbId) {
                updateStatus("Please enter a TMDB ID", true);
                return;
            }
            
            showLoading(`Extracting Cloudnestra from vidsrc.to...`);
            updateStatus("Extracting...");
            addLog(`🎬 Starting extraction for ${mediaType} ID: ${tmdbId}`);
            
            try {
                // Get movie title
                const title = await fetchMovieInfo(tmdbId, mediaType);
                document.getElementById('movieTitle').textContent = title;
                addLog(`📽️ Movie: ${title}`);
                
                // Extract Cloudnestra URL from vidsrc.to
                const cloudUrl = await extractCloudnestraFromVidSrc(tmdbId, mediaType);
                
                if (!cloudUrl) {
                    addLog(`❌ Could not extract Cloudnestra URL`, 'error');
                    updateStatus("Extraction failed - try different ID", true);
                    hideLoading();
                    return;
                }
                
                addLog(`☁️ Cloudnestra URL found, decoding...`, 'success');
                showLoading("Decoding Cloudnestra stream...");
                
                // Decode to get actual video URL
                const videoUrl = decodeCloudnestraUrl(cloudUrl);
                
                if (!videoUrl) {
                    addLog(`❌ Failed to decode stream`, 'error');
                    updateStatus("Decoding failed", true);
                    hideLoading();
                    return;
                }
                
                addLog(`🎉 Success! Playing extracted stream`, 'success');
                updateStatus("Stream ready!");
                playVideo(videoUrl);
                
            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');
                updateStatus("Extraction failed", true);
            } finally {
                hideLoading();
            }
        }

        // Event listeners
        document.getElementById('extractBtn').addEventListener('click', extractAndPlay);
        document.getElementById('tmdbId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') extractAndPlay();
        });
    </script>
</body>
</html>
