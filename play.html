<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MVHD | Cloudnestra Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --web3-purple: #8a2be2;
            --player-bg: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }

        .video-stream-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }

        .data-packet {
            position: absolute;
            width: 3px;
            height: 20px;
            background: var(--primary);
            animation: dataFlow 3s linear infinite;
            filter: blur(1px);
        }

        @keyframes dataFlow {
            0% { transform: translateY(-100px) rotate(45deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
        }

        .cyber-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            z-index: 1000;
            border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .site-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.7);
            font-weight: 700;
            text-decoration: none;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9);
            backdrop-filter: blur(10px);
            border: var(--pixel-border);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--neon-glow);
            position: relative;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .movie-info-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .movie-poster {
            flex: 0 0 200px;
        }

        .movie-poster img {
            width: 100%;
            height: auto;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .movie-details {
            flex: 1;
            min-width: 300px;
        }

        .movie-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.7);
        }

        .tagline {
            font-style: italic;
            color: var(--cyber-blue);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyber-blue);
        }

        .overview {
            margin: 20px 0;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .genre-tag {
            padding: 5px 15px;
            background: rgba(123, 97, 255, 0.2);
            border: 1px solid var(--secondary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
        }

        .player-container {
            background: var(--player-bg);
            border: 3px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3);
            margin-bottom: 30px;
            position: relative;
        }

        .player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite;
            z-index: 2;
        }

        #stream-frame {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
        }

        .status-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .status-badge {
            padding: 12px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            animation: badgePulse 2s infinite;
        }

        .badge-primary {
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .badge-warning {
            background: rgba(255, 242, 0, 0.1);
            border: 2px solid var(--cyber-yellow);
            color: var(--cyber-yellow);
        }

        .badge-success {
            background: rgba(0, 204, 255, 0.1);
            border: 2px solid var(--cyber-blue);
            color: var(--cyber-blue);
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .control-panel {
            background: rgba(19, 19, 31, 0.9);
            border: var(--pixel-border);
            padding: 25px;
            margin-top: 30px;
            box-shadow: var(--neon-glow);
        }

        .control-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border: 1px solid var(--secondary);
            transition: all 0.3s ease;
        }

        .control-item:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            transform: translateY(-5px);
        }

        .control-label {
            color: var(--cyber-yellow);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .control-value {
            color: white;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
        }

        .quality-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .quality-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            color: white;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quality-btn:hover,
        .quality-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.2);
            border-top-color: #00ff9d;
            border-right-color: #7b61ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.7);
            animation: loadingPulse 2s infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: loadingMove 2s infinite;
        }

        @keyframes loadingMove {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 768px) {
            #stream-frame { height: 400px; }
            .movie-title { font-size: 1.5rem; }
            .main-container { padding: 120px 15px 30px; }
            .movie-info-panel { flex-direction: column; }
            .movie-poster { max-width: 200px; margin: 0 auto; }
            .control-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>
    <div class="video-stream-effect" id="streamEffect"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">LOADING STREAM...</div>
        <div class="loading-bar"></div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        </div>
    </header>

    <div class="main-container" id="mainContent" style="display: none;">
        <div class="movie-info-panel" id="moviePanel">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="movieTitle">Loading...</span> <span id="movieYear" style="color: var(--cyber-yellow);"></span></h1>
                <div class="tagline" id="movieTagline"></div>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="movieRating">-</span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="movieRuntime">-</span></div>
                    <div class="meta-item">🎯 QUALITY: <span id="streamQuality">1080p</span></div>
                </div>
                <div class="overview" id="movieOverview"></div>
                <div class="genres" id="movieGenres"></div>
            </div>
        </div>

        <div class="player-container">
            <iframe id="stream-frame" src="" allowfullscreen></iframe>
        </div>

        <div class="status-badges">
            <div class="status-badge badge-primary" id="streamBadge">🚀 MVHD • CLOUDNESTRA STREAM</div>
            <div class="status-badge badge-success" id="tmdbBadge">🎬 TMDB ID: -</div>
        </div>

        <div class="control-panel">
            <h2 class="control-title">STREAM CONTROL PANEL</h2>
            <div class="control-grid">
                <div class="control-item">
                    <div class="control-label">SERVER STATUS</div>
                    <div class="control-value" id="serverStatus">CONNECTED</div>
                </div>
                <div class="control-item">
                    <div class="control-label">STREAM QUALITY</div>
                    <div class="control-value" id="displayQuality">1080p</div>
                </div>
                <div class="control-item">
                    <div class="control-label">BITRATE</div>
                    <div class="control-value" id="bitrate">8.5 MBPS</div>
                </div>
                <div class="control-item">
                    <div class="control-label">BUFFER HEALTH</div>
                    <div class="control-value" id="bufferHealth">98%</div>
                </div>
            </div>
            <div class="quality-selector">
                <button class="quality-btn active" data-quality="auto">AUTO (RECOMMENDED)</button>
                <button class="quality-btn" data-quality="1080">1080P</button>
                <button class="quality-btn" data-quality="720">720P</button>
                <button class="quality-btn" data-quality="480">480P</button>
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        const titleParam = urlParams.get('title') || '';

        // Generate Cloudnestra URL from TMDB ID (same as PHP's getCloudNestraUrl fallback)
        function generateCloudnestraUrl(id, type) {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudnestra.com/rcp/${encoded}`;
        }

        // Fetch movie info from TMDB (same as PHP's getMovieInfoFromTMDB)
        async function fetchMovieInfo(id, type) {
            try {
                const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=en-US`;
                const response = await fetch(url);
                const data = await response.json();
                return {
                    title: data.title || data.name,
                    original_title: data.original_title || data.original_name || data.title,
                    year: (data.release_date || data.first_air_date || '').substring(0,4),
                    release_date: data.release_date || data.first_air_date || 'N/A',
                    rating: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                    vote_count: data.vote_count || 0,
                    runtime: type === 'movie' ? (data.runtime ? data.runtime + ' min' : 'N/A') : (data.episode_run_time?.[0] ? data.episode_run_time[0] + ' min' : 'N/A'),
                    overview: data.overview || 'No description available.',
                    genres: data.genres ? data.genres.map(g => g.name) : ['Unknown'],
                    poster: data.poster_path ? `https://image.tmdb.org/t/p/w500${data.poster_path}` : null,
                    backdrop: data.backdrop_path ? `https://image.tmdb.org/t/p/w1280${data.backdrop_path}` : null,
                    status: data.status || 'Streaming',
                    tagline: data.tagline || ''
                };
            } catch(e) {
                console.error('Error fetching movie info:', e);
                return {
                    title: titleParam || 'CYBERPUNK STREAM',
                    original_title: 'Unknown',
                    year: 'N/A',
                    release_date: 'N/A',
                    rating: 'N/A',
                    vote_count: 0,
                    runtime: 'N/A',
                    overview: 'Unable to fetch movie details. Streaming in progress.',
                    genres: ['Action', 'Sci-Fi'],
                    poster: null,
                    backdrop: null,
                    status: 'Streaming',
                    tagline: 'Experience Cyberpunk Streaming'
                };
            }
        }

        // Get stream quality based on TMDB ID (same as PHP's getStreamQuality)
        function getStreamQuality(id) {
            const qualities = ['4K HDR', '1080p', '720p', '480p'];
            const hash = parseInt(id) % qualities.length;
            return qualities[hash];
        }

        // Update UI with movie info
        function updateMovieUI(movieInfo, quality) {
            document.title = `MVHD | ${movieInfo.title}`;
            document.getElementById('movieTitle').textContent = movieInfo.title;
            document.getElementById('movieYear').textContent = movieInfo.year ? `(${movieInfo.year})` : '';
            document.getElementById('movieTagline').textContent = movieInfo.tagline ? `"${movieInfo.tagline}"` : '';
            document.getElementById('movieRating').textContent = movieInfo.rating;
            document.getElementById('movieRuntime').textContent = movieInfo.runtime;
            document.getElementById('movieOverview').textContent = movieInfo.overview;
            document.getElementById('streamQuality').textContent = quality;
            document.getElementById('displayQuality').textContent = quality;
            document.getElementById('tmdbBadge').innerHTML = `🎬 TMDB ID: ${tmdbId} • ${movieInfo.title}`;
            
            if (movieInfo.poster) {
                document.getElementById('moviePoster').src = movieInfo.poster;
            }
            
            if (movieInfo.backdrop) {
                document.body.style.backgroundImage = `linear-gradient(rgba(10, 10, 15, 0.9), rgba(10, 10, 15, 0.9)), url('${movieInfo.backdrop}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundAttachment = 'fixed';
            }
            
            const genresContainer = document.getElementById('movieGenres');
            genresContainer.innerHTML = '';
            movieInfo.genres.forEach(genre => {
                const tag = document.createElement('span');
                tag.className = 'genre-tag';
                tag.textContent = genre;
                genresContainer.appendChild(tag);
            });
        }

        // Create streaming effect
        function createStreamEffect() {
            const container = document.getElementById('streamEffect');
            const colors = ['#00ff9d', '#7b61ff', '#ff00e5', '#00ccff'];
            for (let i = 0; i < 25; i++) {
                const packet = document.createElement('div');
                packet.className = 'data-packet';
                packet.style.left = `${Math.random() * 100}%`;
                packet.style.animationDelay = `${Math.random() * 3}s`;
                packet.style.animationDuration = `${Math.random() * 2 + 2}s`;
                packet.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(packet);
            }
        }

        // Simulate stream statistics
        function updateStreamStats() {
            setInterval(() => {
                const bitrates = ['8.5 MBPS', '9.2 MBPS', '7.8 MBPS', '8.1 MBPS'];
                const bufferLevels = ['98%', '95%', '99%', '97%'];
                document.getElementById('bitrate').textContent = bitrates[Math.floor(Math.random() * bitrates.length)];
                document.getElementById('bufferHealth').textContent = bufferLevels[Math.floor(Math.random() * bufferLevels.length)];
                if (Math.random() > 0.9) {
                    document.getElementById('serverStatus').textContent = 'RECONNECTING';
                    document.getElementById('serverStatus').style.color = 'var(--cyber-yellow)';
                    setTimeout(() => {
                        document.getElementById('serverStatus').textContent = 'CONNECTED';
                        document.getElementById('serverStatus').style.color = 'var(--primary)';
                    }, 2000);
                }
            }, 3000);
        }

        // Quality selector
        function setupQualitySelector() {
            const qualityBtns = document.querySelectorAll('.quality-btn');
            qualityBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    qualityBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const quality = this.getAttribute('data-quality');
                    const qualityText = quality === 'auto' ? 'AUTO' : quality + 'P';
                    document.getElementById('displayQuality').textContent = qualityText;
                });
            });
        }

        // Show notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.9); border: 2px solid var(--primary);
                padding: 12px 24px; font-family: 'Orbitron', sans-serif;
                color: var(--primary); z-index: 10000; border-radius: 0;
                letter-spacing: 2px; font-size: 12px;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // Main function
        async function main() {
            if (!tmdbId) {
                document.getElementById('loadingText').textContent = 'ERROR: NO TMDB ID';
                setTimeout(() => window.location.href = 'index.html', 3000);
                return;
            }

            try {
                // Fetch movie info
                document.getElementById('loadingText').textContent = `LOADING ${tmdbId}...`;
                const movieInfo = await fetchMovieInfo(tmdbId, mediaType);
                const quality = getStreamQuality(tmdbId);
                
                updateMovieUI(movieInfo, quality);
                
                // Generate and set Cloudnestra URL
                const cloudUrl = generateCloudnestraUrl(tmdbId, mediaType);
                const iframe = document.getElementById('stream-frame');
                iframe.src = cloudUrl;
                
                document.getElementById('streamBadge').innerHTML = '🚀 CLOUDNESTRA STREAM • DIRECT PLAY';
                
                // Hide loading when iframe loads
                iframe.onload = () => {
                    const overlay = document.getElementById('loadingOverlay');
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        document.getElementById('mainContent').style.display = 'block';
                    }, 500);
                };
                
                setTimeout(() => {
                    const overlay = document.getElementById('loadingOverlay');
                    if (overlay.style.display !== 'none') {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.style.display = 'none', 500);
                        document.getElementById('mainContent').style.display = 'block';
                    }
                }, 5000);
                
            } catch(e) {
                console.error('Error:', e);
                document.getElementById('loadingText').textContent = 'ERROR LOADING STREAM';
            }
        }

        // Initialize
        createStreamEffect();
        updateStreamStats();
        setupQualitySelector();
        main();
    </script>
</body>
</html>
