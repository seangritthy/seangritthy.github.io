<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3;
        }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000;
            border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .header-content {
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .site-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.7);
            text-decoration: none;
        }

        .main-container {
            max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px;
            display: none;
        }

        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9);
            border: var(--pixel-border);
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); }

        .movie-details { flex: 1; }
        .movie-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            color: var(--cyber-blue);
        }

        .overview {
            margin: 20px 0;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .player-container {
            background: #000;
            border: 3px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
            min-height: 400px;
        }

        .player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff003c, var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite;
            z-index: 2;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        iframe {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
        }

        .status-badge {
            padding: 12px 20px;
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid var(--primary);
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 255, 157, 0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .loading-step {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            iframe { height: 400px; }
            .movie-info-panel { flex-direction: column; }
            .movie-poster { max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">INITIALIZING CLOUDNESTRA...</div>
        <div class="loading-step" id="loadingStep">Connecting to stream server</div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        </div>
    </header>

    <div class="main-container" id="mainContent">
        <div class="movie-info-panel">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="movieTitle">Loading...</span> <span id="movieYear" style="color: var(--cyber-yellow);"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="movieRating">-</span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="movieRuntime">-</span></div>
                </div>
                <div class="overview" id="movieOverview"></div>
            </div>
        </div>

        <div class="player-container">
            <iframe id="playerFrame" src="" allowfullscreen></iframe>
        </div>

        <div class="status-badge" id="statusBadge">🚀 CLOUDNESTRA STREAM</div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // WORKING DOMAINS (cloudnestra.com doesn't work, use these)
        const CLOUD_DOMAINS = [
            'https://cloudorchestranova.com',
            'https://cloudnestra.cc',
            'https://cloudstream.to'
        ];
        
        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        let tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        
        // Default movie if none provided
        if (!tmdbId) {
            tmdbId = '1380291'; // Swapped (2026)
        }

        function updateLoading(msg, step) {
            document.getElementById('loadingText').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 500);
        }

        // Generate Cloudnestra URL using working domain
        function generateCloudnestraUrl(id, type, domain) {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `${domain}/rcp/${encoded}`;
        }

        // Try multiple domains
        async function tryPlayWithDomains(id, type) {
            for (const domain of CLOUD_DOMAINS) {
                try {
                    const cloudUrl = generateCloudnestraUrl(id, type, domain);
                    console.log(`Trying ${domain}:`, cloudUrl);
                    
                    // Test if domain is reachable
                    const testUrl = `${domain}/rcp/test`;
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    const response = await fetch(testUrl, { signal: controller.signal, mode: 'no-cors' });
                    clearTimeout(timeoutId);
                    
                    // If we get here, domain is reachable
                    return cloudUrl;
                } catch(e) {
                    console.log(`${domain} not reachable, trying next...`);
                }
            }
            return null;
        }

        // Direct play with working URL (using the one you provided)
        function playWithCloudOrchestra(id, type) {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudorchestranova.com/rcp/${encoded}`;
        }

        async function loadMovie() {
            try {
                // Fetch movie info
                updateLoading('FETCHING MOVIE DATA...', `TMDB ID: ${tmdbId}`);
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();
                
                const title = movie.title || movie.name;
                const year = (movie.release_date || movie.first_air_date || '').substring(0,4);
                
                document.title = `MVHD | ${title}`;
                document.getElementById('movieTitle').textContent = title;
                document.getElementById('movieYear').textContent = year ? `(${year})` : '';
                document.getElementById('movieRating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('movieRuntime').textContent = movie.runtime ? `${movie.runtime} min` : 'N/A';
                document.getElementById('movieOverview').textContent = movie.overview || 'No description available.';
                document.getElementById('moviePoster').src = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/300x450/1a1a1a/ffffff?text=MVHD';
                
                if (movie.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                }
                
                document.getElementById('mainContent').style.display = 'block';
                
                // Generate the CloudOrchestraNova URL (WORKING DOMAIN)
                updateLoading('GENERATING STREAM URL...', 'Creating secure link');
                const cloudUrl = playWithCloudOrchestra(tmdbId, mediaType);
                console.log('CloudOrchestraNova URL:', cloudUrl);
                
                // Load the iframe with the CloudOrchestraNova URL
                const iframe = document.getElementById('playerFrame');
                iframe.src = cloudUrl;
                
                document.getElementById('statusBadge').innerHTML = '☁️ CLOUDORCHESTRANOVA • STREAMING';
                document.getElementById('statusBadge').style.borderColor = '#00ff9d';
                
                // Hide loading after iframe loads
                iframe.onload = () => {
                    hideLoading();
                };
                
                // Fallback timeout
                setTimeout(() => {
                    hideLoading();
                }, 5000);
                
            } catch(e) {
                console.error('Error:', e);
                updateLoading('ERROR', e.message);
                document.getElementById('statusBadge').innerHTML = '⚠️ ERROR LOADING STREAM';
                document.getElementById('statusBadge').style.borderColor = '#ff003c';
                
                // Still try to load fallback
                const fallbackUrl = playWithCloudOrchestra(tmdbId, mediaType);
                document.getElementById('playerFrame').src = fallbackUrl;
                setTimeout(() => hideLoading(), 3000);
            }
        }

        loadMovie();
    </script>
</body>
</html>
