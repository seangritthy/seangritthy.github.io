<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>MVHD Player</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        margin: 0;
        background: #0a0a0f;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .header {
        background: #000;
        padding: 15px 20px;
        text-align: center;
        border-bottom: 2px solid #00ff9d;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
    }
    
    .header h1 {
        margin: 0;
        color: #00ff9d;
        font-size: 1.3rem;
    }
    
    .container {
        padding: 80px 20px 20px;
        max-width: 1400px;
        margin: 0 auto;
    }
    
    .movie-info {
        background: rgba(255,255,255,0.05);
        border: 1px solid #00ff9d;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }
    
    .movie-poster {
        width: 180px;
        height: auto;
        border-radius: 8px;
        border: 2px solid #00ff9d;
    }
    
    .movie-details {
        flex: 1;
    }
    
    .movie-title {
        font-size: 1.8rem;
        color: #00ff9d;
        margin-bottom: 10px;
    }
    
    .movie-meta {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }
    
    .movie-meta span {
        color: #00ccff;
    }
    
    .movie-overview {
        line-height: 1.5;
        color: #ccc;
    }
    
    .player-container {
        background: #000;
        border: 3px solid #00ff9d;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }
    
    .player-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #ff003c, #fff200, #00ff9d, #00ccff, #ff00e5);
        animation: rainbow 2s linear infinite;
        z-index: 2;
    }
    
    @keyframes rainbow {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }
    
    iframe {
        width: 100%;
        height: 70vh;
        border: none;
        background: #000;
        display: block;
    }
    
    .status {
        margin-top: 15px;
        padding: 12px;
        border: 1px solid #00ff9d;
        border-radius: 8px;
        font-family: monospace;
        font-size: 12px;
        word-break: break-all;
        background: rgba(0,0,0,0.5);
    }
    
    .status.error {
        border-color: #ff4444;
        color: #ff4444;
    }
    
    .status.success {
        border-color: #00ff9d;
        color: #00ff9d;
    }
    
    .server-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
        justify-content: center;
    }
    
    .server-btn {
        padding: 10px 20px;
        background: rgba(0,0,0,0.6);
        border: 1px solid #00ff9d;
        color: #00ff9d;
        font-family: monospace;
        cursor: pointer;
        border-radius: 5px;
        transition: all 0.3s;
    }
    
    .server-btn:hover, .server-btn.active {
        background: #00ff9d;
        color: #000;
    }
    
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        flex-direction: column;
        gap: 20px;
    }
    
    .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0,255,157,0.2);
        border-top-color: #00ff9d;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .loading-text {
        color: #00ff9d;
        font-family: monospace;
    }
    
    @media (max-width: 768px) {
        iframe { height: 50vh; }
        .movie-title { font-size: 1.3rem; }
        .movie-poster { width: 120px; }
        .container { padding: 70px 15px 15px; }
    }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">INITIALIZING...</div>
</div>

<div class="header">
    <h1>🎬 MVHD CYBERCINEMA</h1>
</div>

<div class="container" id="mainContent" style="display: none;">
    <div class="server-selector" id="serverSelector">
        <button class="server-btn active" data-server="vidsrc">🎬 VidSrc.to</button>
        <button class="server-btn" data-server="embed2">📺 2Embed</button>
        <button class="server-btn" data-server="auto">🔄 AutoEmbed</button>
        <button class="server-btn" data-server="multi">📽️ MultiEmbed</button>
    </div>
    
    <div class="movie-info" id="movieInfo">
        <img class="movie-poster" id="moviePoster" src="" alt="Poster">
        <div class="movie-details">
            <div class="movie-title" id="movieTitle">Loading...</div>
            <div class="movie-meta">
                <span>⭐ RATING: <span id="movieRating">-</span>/10</span>
                <span>⏱️ RUNTIME: <span id="movieRuntime">-</span></span>
                <span>📅 YEAR: <span id="movieYear">-</span></span>
            </div>
            <div class="movie-overview" id="movieOverview"></div>
        </div>
    </div>
    
    <div class="player-container">
        <iframe id="playerFrame" src="" allowfullscreen></iframe>
    </div>
    
    <div class="status" id="status">Ready</div>
</div>

<script>
    // TMDB API key - in production, use a backend proxy
    // For GitHub Pages, this is the only way (no backend)
    const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
    
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    let tmdbId = urlParams.get('tmdb') || '1380291';
    const mediaType = urlParams.get('type') || 'movie';
    let season = urlParams.get('season') || '1';
    let episode = urlParams.get('episode') || '1';
    
    // Validate IDs
    tmdbId = tmdbId.replace(/[^0-9]/g, '');
    season = season.replace(/[^0-9]/g, '');
    episode = episode.replace(/[^0-9]/g, '');
    
    // Server configurations - FIXED for TV shows
    const servers = {
        vidsrc: {
            name: 'VidSrc.to',
            getUrl: () => {
                if (mediaType === 'tv') {
                    return `https://vidsrc.to/embed/tv/${tmdbId}/${season}/${episode}`;
                }
                return `https://vidsrc.to/embed/movie/${tmdbId}`;
            }
        },
        embed2: {
            name: '2Embed',
            getUrl: () => {
                if (mediaType === 'tv') {
                    return `https://www.2embed.cc/embedtv/${tmdbId}&s=${season}&e=${episode}`;
                }
                return `https://www.2embed.cc/embed/${tmdbId}`;
            }
        },
        auto: {
            name: 'AutoEmbed',
            getUrl: () => {
                if (mediaType === 'tv') {
                    return `https://autoembed.to/tv/tmdb/${tmdbId}/${season}/${episode}`;
                }
                return `https://autoembed.to/movie/tmdb/${tmdbId}`;
            }
        },
        multi: {
            name: 'MultiEmbed',
            getUrl: () => {
                if (mediaType === 'tv') {
                    return `https://multiembed.mov/video/${tmdbId}/tv-${season}-${episode}`;
                }
                return `https://multiembed.mov/video/${tmdbId}`;
            }
        }
    };
    
    let currentServer = 'vidsrc';
    
    function updateLoading(text) {
        document.getElementById('loadingText').textContent = text;
    }
    
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }, 500);
    }
    
    function updateStatus(text, type = 'info') {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = text;
        statusDiv.className = 'status';
        if (type === 'error') statusDiv.classList.add('error');
        else if (type === 'success') statusDiv.classList.add('success');
    }
    
    // Fetch movie info from TMDB
    async function fetchMovieInfo() {
        try {
            const url = `https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${TMDB_API_KEY}&language=en-US`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('Movie not found');
            
            const data = await response.json();
            const title = data.title || data.name;
            const year = (data.release_date || data.first_air_date || '').substring(0,4);
            
            document.title = `MVHD | ${title}`;
            document.getElementById('movieTitle').textContent = title;
            document.getElementById('movieYear').textContent = year || 'N/A';
            document.getElementById('movieRating').textContent = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
            
            if (mediaType === 'tv') {
                document.getElementById('movieRuntime').textContent = data.episode_run_time?.[0] ? `${data.episode_run_time[0]} min` : 'N/A';
                if (season && episode) {
                    document.getElementById('movieOverview').textContent = `Season ${season}, Episode ${episode}. ${data.overview || 'No description available.'}`;
                } else {
                    document.getElementById('movieOverview').textContent = data.overview || 'No description available.';
                }
            } else {
                document.getElementById('movieRuntime').textContent = data.runtime ? `${data.runtime} min` : 'N/A';
                document.getElementById('movieOverview').textContent = data.overview || 'No description available.';
            }
            
            if (data.poster_path) {
                document.getElementById('moviePoster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
            }
            
            if (data.backdrop_path) {
                document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                document.body.style.backgroundSize = 'cover';
            }
            
            return true;
        } catch(e) {
            console.error('TMDB Error:', e);
            document.getElementById('movieTitle').textContent = `${mediaType === 'tv' ? 'TV Show' : 'Movie'} ID: ${tmdbId}`;
            document.getElementById('movieOverview').textContent = 'Movie details unavailable, but stream may still work.';
            return false;
        }
    }
    
    // Load server
    function loadServer(serverKey) {
        currentServer = serverKey;
        const server = servers[serverKey];
        
        if (!server) return;
        
        let url;
        try {
            url = server.getUrl();
        } catch(e) {
            updateStatus(`Error generating URL for ${server.name}`, 'error');
            return;
        }
        
        const iframe = document.getElementById('playerFrame');
        iframe.src = url;
        
        updateStatus(`🎬 ${server.name}: ${url.substring(0, 80)}...`);
        
        // Update active button
        document.querySelectorAll('.server-btn').forEach(btn => {
            if (btn.dataset.server === serverKey) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    // Initialize
    async function init() {
        updateLoading('FETCHING MOVIE INFO...');
        
        await fetchMovieInfo();
        
        updateLoading('LOADING STREAM...');
        loadServer(currentServer);
        
        const iframe = document.getElementById('playerFrame');
        iframe.onload = () => {
            updateStatus(`✅ Streaming from ${servers[currentServer].name}`, 'success');
            hideLoading();
        };
        
        setTimeout(() => {
            hideLoading();
        }, 8000);
    }
    
    // Server button click handlers
    document.querySelectorAll('.server-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const serverKey = btn.dataset.server;
            loadServer(serverKey);
        });
    });
    
    init();
</script>

</body>
</html>
