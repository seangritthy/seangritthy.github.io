<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: monospace;
        }
        .container {
            width: 100%;
            height: 100vh;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: #00ff9d;
            padding: 10px;
            font-size: 12px;
            text-align: center;
            z-index: 1000;
        }
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #00ff9d;
            padding: 8px 15px;
            text-decoration: none;
            z-index: 1000;
            border: 1px solid #00ff9d;
            border-radius: 5px;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff9d;
            text-align: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,157,0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← BACK</a>
    <div class="container">
        <iframe id="playerFrame" src="" allowfullscreen></iframe>
    </div>
    <div class="info" id="info">Loading...</div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>LOADING CYBERSTREAM...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        const title = urlParams.get('title') || 'Movie';
        
        document.title = `MVHD | ${title}`;
        document.getElementById('info').innerHTML = `🎬 ${title}`;
        
        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 500);
            }
        }
        
        async function initializeStream() {
            if (!tmdbId) {
                document.getElementById('loading').innerHTML = '<div>ERROR: No movie ID parameters detected</div>';
                document.getElementById('info').innerHTML = 'ERROR: Invalid request';
                return;
            }

            const frame = document.getElementById('playerFrame');

            // Handle TV Shows (Using default proxy fallback player)
            if (mediaType === 'tv') {
                frame.src = `https://vidsrc.to/embed/tv/${tmdbId}/1/1`;
                frame.onload = hideLoading;
                setTimeout(hideLoading, 5000);
                return;
            }

            // Handle Movies via your Backend /api/extract Vercel function
            try {
                const response = await fetch(`/api/extract?tmdb=${tmdbId}`);
                if (!response.ok) throw new Error('API down');
                
                const data = await response.json();
                if (data && data.success && data.url) {
                    frame.src = data.url;
                } else {
                    // Fallback URL if extraction returned false
                    frame.src = data.url || `https://vidsrc.to/embed/movie/${tmdbId}`;
                }
            } catch (error) {
                console.error("Extraction failed, falling back to direct stream:", error);
                frame.src = `https://vidsrc.to/embed/movie/${tmdbId}`;
            }

            frame.onload = hideLoading;
            // absolute safety net timeout to remove spinner if iframe takes long
            setTimeout(hideLoading, 6000);
        }

        // Run
        initializeStream();
    </script>
</body>
</html>
