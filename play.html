<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MVHD | Cloudnestra Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0; padding: 0; background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden;
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2; pointer-events: none;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .header-content {
            max-width: 1400px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .site-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.7);
            text-decoration: none;
        }

        .main-container {
            max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px;
            display: none;
        }

        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9);
            backdrop-filter: blur(10px);
            border: var(--pixel-border);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--neon-glow);
            position: relative;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .movie-info-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); }

        .movie-details { flex: 1; }
        .movie-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            color: var(--cyber-blue);
        }

        .overview {
            margin: 20px 0;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .player-container {
            background: var(--player-bg);
            border: 3px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
            min-height: 400px;
        }

        .player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite;
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
        }

        .status-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .status-badge {
            padding: 12px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .badge-primary {
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .badge-warning {
            background: rgba(255, 242, 0, 0.1);
            border: 2px solid var(--cyber-yellow);
            color: var(--cyber-yellow);
        }

        .badge-success {
            background: rgba(0, 204, 255, 0.1);
            border: 2px solid var(--cyber-blue);
            color: var(--cyber-blue);
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.2);
            border-top-color: #00ff9d;
            border-right-color: #7b61ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.7);
        }

        .loading-step {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        /* Server Selector */
        .server-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .server-btn {
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .server-btn:hover, .server-btn.active {
            background: var(--primary);
            color: #000;
        }

        @media (max-width: 768px) {
            iframe { height: 400px; }
            .movie-title { font-size: 1.5rem; }
            .main-container { padding: 120px 15px 30px; }
            .movie-info-panel { flex-direction: column; }
            .movie-poster { max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">INITIALIZING CLOUDNESTRA...</div>
        <div class="loading-step" id="loadingStep">Connecting to stream server</div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        </div>
    </header>

    <div class="main-container" id="mainContent">
        <!-- Server Selector for backup -->
        <div class="server-selector" id="serverSelector">
            <button class="server-btn active" data-server="cloud">☁️ Cloudnestra</button>
            <button class="server-btn" data-server="vidsrc">🎬 VidSrc.to</button>
            <button class="server-btn" data-server="embed2">📺 2Embed</button>
        </div>

        <div class="movie-info-panel" id="moviePanel">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="movieTitle">Loading...</span> <span id="movieYear" style="color: var(--cyber-yellow);"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="movieRating">-</span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="movieRuntime">-</span></div>
                </div>
                <div class="overview" id="movieOverview"></div>
            </div>
        </div>

        <div class="player-container">
            <iframe id="playerFrame" src="" allowfullscreen></iframe>
        </div>

        <div class="status-badges">
            <div class="status-badge badge-primary" id="streamBadge">☁️ CLOUDNESTRA STREAM</div>
            <div class="status-badge badge-success" id="infoBadge">🎬 READY</div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let cloudUrl = urlParams.get('url');
        const tmdbId = urlParams.get('id');
        const mediaType = urlParams.get('type') || 'movie';
        const titleParam = urlParams.get('title');
        
        // Server configurations
        const servers = {
            cloud: {
                name: 'Cloudnestra',
                getUrl: () => cloudUrl
            },
            vidsrc: {
                name: 'VidSrc.to',
                getUrl: () => `https://vidsrc.to/embed/${mediaType}/${tmdbId || '1380291'}`
            },
            embed2: {
                name: '2Embed',
                getUrl: () => `https://www.2embed.cc/embed/${tmdbId || '1380291'}`
            }
        };
        
        let currentServer = 'cloud';
        
        function updateLoading(msg, step) {
            document.getElementById('loadingText').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
        }
        
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 500);
        }
        
        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
        }
        
        // Fix Cloudnestra URL (replace with working domain if needed)
        function fixCloudUrl(url) {
            if (!url) return null;
            // Replace cloudnestra.com with cloudorchestranova.com if needed
            if (url.includes('cloudnestra.com')) {
                return url.replace('cloudnestra.com', 'cloudorchestranova.com');
            }
            return url;
        }
        
        // Fetch movie info from TMDB
        async function fetchMovieInfo(id, type) {
            if (!id) return;
            
            try {
                const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=en-US`;
                const response = await fetch(url);
                if (!response.ok) return;
                
                const data = await response.json();
                const title = data.title || data.name;
                const year = (data.release_date || data.first_air_date || '').substring(0,4);
                
                document.title = `MVHD | ${title}`;
                document.getElementById('movieTitle').textContent = title;
                document.getElementById('movieYear').textContent = year ? `(${year})` : '';
                document.getElementById('movieRating').textContent = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
                document.getElementById('movieRuntime').textContent = data.runtime ? `${data.runtime} min` : (data.episode_run_time?.[0] ? `${data.episode_run_time[0]} min` : 'N/A');
                document.getElementById('movieOverview').textContent = data.overview || 'No description available.';
                document.getElementById('infoBadge').innerHTML = `🎬 ${title} (${year})`;
                
                if (data.poster_path) {
                    document.getElementById('moviePoster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                }
                
                if (data.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                }
            } catch(e) {
                console.error('TMDB Error:', e);
            }
        }
        
        // Load server
        function loadServer(serverKey) {
            currentServer = serverKey;
            const server = servers[serverKey];
            if (!server) return;
            
            let url;
            try {
                url = server.getUrl();
                if (serverKey === 'cloud' && url) {
                    url = fixCloudUrl(url);
                }
            } catch(e) {
                console.error('Error generating URL:', e);
                return;
            }
            
            if (!url) {
                // No URL available, try fallback
                if (serverKey === 'cloud') {
                    loadServer('vidsrc');
                }
                return;
            }
            
            const iframe = document.getElementById('playerFrame');
            iframe.src = url;
            
            const streamBadge = document.getElementById('streamBadge');
            streamBadge.innerHTML = `🎬 ${server.name} • STREAMING`;
            
            // Update active button
            document.querySelectorAll('.server-btn').forEach(btn => {
                if (btn.dataset.server === serverKey) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Initialize
        async function init() {
            showLoading();
            updateLoading('INITIALIZING CLOUDNESTRA...', 'Connecting to stream');
            
            // Set title from param if available
            if (titleParam) {
                document.getElementById('movieTitle').textContent = decodeURIComponent(titleParam);
                document.title = `MVHD | ${decodeURIComponent(titleParam)}`;
            }
            
            // Fetch movie info if TMDB ID available
            if (tmdbId) {
                await fetchMovieInfo(tmdbId, mediaType);
            }
            
            // Fix and load Cloudnestra URL
            if (cloudUrl) {
                cloudUrl = fixCloudUrl(decodeURIComponent(cloudUrl));
                updateLoading('LOADING CLOUDNESTRA STREAM...', cloudUrl.substring(0, 80));
                loadServer('cloud');
            } else if (tmdbId) {
                // No cloud URL but have TMDB ID - use vidsrc
                updateLoading('NO CLOUDNESTRA URL...', 'Using fallback player');
                loadServer('vidsrc');
            } else {
                updateLoading('ERROR', 'No stream URL provided');
            }
            
            // Hide loading after iframe loads
            const iframe = document.getElementById('playerFrame');
            iframe.onload = () => {
                hideLoading();
            };
            
            setTimeout(() => {
                hideLoading();
            }, 8000);
        }
        
        // Server button handlers
        document.querySelectorAll('.server-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const serverKey = btn.dataset.server;
                loadServer(serverKey);
            });
        });
        
        // Start
        init();
    </script>
</body>
</html>
