<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudnestra Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 90%;
            background: #0a0a0a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        h1 {
            color: #00ff9d;
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            color: #00ff9d;
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #fff;
            border-radius: 5px;
            font-family: monospace;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00ff9d;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 5px;
            word-break: break-all;
        }
        .result-label {
            color: #00ff9d;
            margin-bottom: 5px;
        }
        .result-value {
            color: #fff;
            font-size: 12px;
            font-family: monospace;
        }
        .note {
            color: #888;
            font-size: 11px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ Cloudnestra Tool</h1>
        
        <div class="input-group">
            <label>🔧 ACTION:</label>
            <select id="action">
                <option value="generate">Generate Cloudnestra URL from TMDB ID</option>
                <option value="decode">Decode Cloudnestra URL to vidsrc</option>
            </select>
        </div>
        
        <div class="input-group" id="generateGroup">
            <label>🎬 TMDB ID:</label>
            <input type="number" id="tmdbId" placeholder="e.g., 1327819" value="1327819">
        </div>
        
        <div class="input-group" id="mediaGroup">
            <label>📺 MEDIA TYPE:</label>
            <select id="mediaType">
                <option value="movie">Movie</option>
                <option value="tv">TV Show</option>
            </select>
        </div>
        
        <div class="input-group" id="decodeGroup" style="display:none;">
            <label>☁️ Cloudnestra URL:</label>
            <input type="text" id="cloudUrl" placeholder="https://cloudnestra.com/rcp/...">
        </div>
        
        <button id="actionBtn">GENERATE</button>
        
        <div class="result" id="result">
            <div class="result-label">📋 RESULT:</div>
            <div class="result-value" id="resultValue">-</div>
        </div>
        
        <div class="note">
            💡 Cloudnestra URL = base64(vidsrc.to URL)<br>
            🔓 Decoding gives back the original vidsrc URL
        </div>
    </div>

    <script>
        const actionSelect = document.getElementById('action');
        const generateGroup = document.getElementById('generateGroup');
        const mediaGroup = document.getElementById('mediaGroup');
        const decodeGroup = document.getElementById('decodeGroup');
        const actionBtn = document.getElementById('actionBtn');
        const resultValue = document.getElementById('resultValue');

        actionSelect.addEventListener('change', function() {
            if (this.value === 'generate') {
                generateGroup.style.display = 'block';
                mediaGroup.style.display = 'block';
                decodeGroup.style.display = 'none';
                actionBtn.textContent = '🔧 GENERATE CLOUDNESTRA URL';
            } else {
                generateGroup.style.display = 'none';
                mediaGroup.style.display = 'none';
                decodeGroup.style.display = 'block';
                actionBtn.textContent = '🔓 DECODE CLOUDNESTRA URL';
            }
        });

        // Generate Cloudnestra URL (same as Python code)
        function generateCloudnestraUrl() {
            const tmdbId = document.getElementById('tmdbId').value;
            const mediaType = document.getElementById('mediaType').value;
            
            if (!tmdbId) {
                resultValue.innerHTML = 'Please enter a TMDB ID';
                return;
            }
            
            // Step 1: Build vidsrc URL (same as Python)
            let vidsrcUrl;
            if (mediaType === 'tv') {
                vidsrcUrl = `https://vidsrc.to/embed/tv/${tmdbId}/1/1`;
            } else {
                vidsrcUrl = `https://vidsrc.to/embed/movie/${tmdbId}`;
            }
            
            // Step 2: Base64 encode (same as Python's b64encode)
            const encoded = btoa(vidsrcUrl);
            
            // Step 3: Create Cloudnestra URL (same as Python)
            const cloudUrl = `https://cloudnestra.com/rcp/${encoded}`;
            
            resultValue.innerHTML = `
                <strong>☁️ CLOUDNESTRA URL:</strong><br>
                <a href="${cloudUrl}" target="_blank" style="color:#00ff9d;">${cloudUrl}</a><br><br>
                <strong>🔗 Original VIDSRC URL:</strong><br>
                <span style="color:#888;">${vidsrcUrl}</span>
            `;
        }
        
        // Decode Cloudnestra URL (same as Python's decode_cloudstream)
        function decodeCloudnestraUrl() {
            let cloudUrl = document.getElementById('cloudUrl').value.trim();
            
            if (!cloudUrl) {
                resultValue.innerHTML = 'Please enter a Cloudnestra URL';
                return;
            }
            
            try {
                // Step 1: Extract encoded part after /rcp/ (same as Python)
                let encoded;
                if (cloudUrl.includes('/rcp/')) {
                    encoded = cloudUrl.split('/rcp/')[1];
                } else {
                    encoded = cloudUrl;
                }
                
                // Step 2: Fix base64 URL-safe encoding
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                // Step 3: Decode base64 (same as Python's b64decode)
                const decoded = atob(encoded);
                
                // Step 4: Look for vidsrc URL in decoded string (same as Python regex)
                const vidsrcMatch = decoded.match(/https?:\/\/vidsrc\.to\/[^\s]+/);
                const vidsrcUrl = vidsrcMatch ? vidsrcMatch[0] : decoded;
                
                resultValue.innerHTML = `
                    <strong>🔓 DECODED VIDSRC URL:</strong><br>
                    <a href="${vidsrcUrl}" target="_blank" style="color:#00ff9d;">${vidsrcUrl}</a><br><br>
                    <strong>📦 FULL DECODED DATA:</strong><br>
                    <span style="color:#888; font-size:11px;">${decoded.substring(0, 500)}${decoded.length > 500 ? '...' : ''}</span>
                `;
            } catch(e) {
                resultValue.innerHTML = `<strong style="color:#ff4444;">❌ DECODE ERROR:</strong><br>${e.message}`;
            }
        }
        
        actionBtn.addEventListener('click', function() {
            if (actionSelect.value === 'generate') {
                generateCloudnestraUrl();
            } else {
                decodeCloudnestraUrl();
            }
        });
        
        // Generate on load
        generateCloudnestraUrl();
    </script>
</body>
</html>
