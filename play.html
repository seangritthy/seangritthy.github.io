<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="page-title">MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2;
            pointer-events: none;
            animation: scanlines 10s linear infinite;
        }
        
        @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }
        
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; text-decoration: none; }
        
        .user-badge { padding: 8px 15px; background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary); font-size: 0.9rem; color: var(--primary); font-family: 'Share Tech Mono', monospace; }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; display: none; }
        
        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border);
            padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; display: flex; gap: 30px; flex-wrap: wrap;
        }
        
        .movie-info-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite;
        }
        
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        .movie-details { flex: 1; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.7); }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); }
        .overview { margin: 20px 0; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }

        .player-container {
            background: var(--player-bg); border: 3px solid var(--primary); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px; position: relative;
        }
        
        .player-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite; z-index: 2;
        }
        
        #direct-player { width: 100%; height: 650px; outline: none; background: #000; display: none; }
        #fallback-frame { width: 100%; height: 650px; border: none; display: none; }

        .extraction-status {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .extraction-status.active {
            display: block;
        }
        
        .status-log {
            color: var(--cyber-blue);
            margin: 5px 0;
        }
        
        .status-log.error {
            color: var(--cyber-red);
        }
        
        .status-log.success {
            color: var(--primary);
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column;
        }
        
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .loading-bar { width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 2s infinite; }
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }
        
        .loading-step {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }
        
        .back-button {
            display: inline-block; margin-top: 20px; padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none; font-family: 'Orbitron', sans-serif;
            transition: all 0.3s;
        }
        
        .back-button:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        
        @media (max-width: 768px) { #direct-player, #fallback-frame { height: 400px; } .movie-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-text" id="loading-msg">INITIALIZING MAINFRAME...</div>
            <div class="loading-bar"></div>
            <div class="loading-step" id="loadingStep">Starting extraction process...</div>
        </div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
            <div class="user-badge" id="statusBadge">🎬 CLOUDNESTRA EXTRACTOR V5</div>
        </div>
    </header>

    <div class="main-container" id="main-content">
        <div class="movie-info-panel">
            <div class="movie-poster">
                <img id="m-poster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="m-title">Title</span> <span id="m-year"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="m-rating"></span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="m-runtime"></span></div>
                </div>
                <div class="overview" id="m-overview"></div>
                <a href="index.html" class="back-button">← BACK TO CINEMA</a>
            </div>
        </div>

        <div class="player-container">
            <video id="direct-player" controls preload="auto" playsinline></video>
            <iframe id="fallback-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
        
        <div class="extraction-status" id="extractionStatus">
            <div class="status-log" id="statusLog"></div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        let currentMovieId = null;
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('statusLog');
            const logEntry = document.createElement('div');
            logEntry.className = `status-log ${type}`;
            logEntry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(logEntry);
            console.log(message);
            document.getElementById('extractionStatus').classList.add('active');
            // Auto-scroll to bottom
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateLoading(msg, step) {
            document.getElementById('loading-msg').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
            addLog(msg, 'info');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 500);
        }
        
        // Decode Cloudnestra base64 URL
        function decodeCloudnestraUrl(cloudnestraUrl) {
            try {
                addLog(`Decoding Cloudnestra URL...`);
                const match = cloudnestraUrl.match(/\/rcp\/([^?&"'>]+)/);
                if (!match) {
                    addLog(`No /rcp/ pattern found`, 'error');
                    return null;
                }
                
                let encoded = match[1];
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                const decoded = atob(encoded);
                addLog(`Decoded content length: ${decoded.length} chars`);
                
                // Find m3u8 URL
                const patterns = [
                    /(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\.mp4[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\/master[^\s"']*\.m3u8)/i,
                    /(https?:\/\/[^\s"']+\/playlist[^\s"']*\.m3u8)/i,
                    /(https?:\/\/[^\s"']+\/index[^\s"']*\.m3u8)/i
                ];
                
                for (const pattern of patterns) {
                    const videoMatch = decoded.match(pattern);
                    if (videoMatch) {
                        addLog(`Found video URL: ${videoMatch[1].substring(0, 80)}...`, 'success');
                        return videoMatch[1];
                    }
                }
                
                // If decoded string itself looks like a URL
                if (decoded.startsWith('http')) {
                    addLog(`Decoded string is a URL directly`, 'success');
                    return decoded;
                }
                
                addLog(`No video URL pattern found in decoded content`, 'error');
                return null;
            } catch(e) {
                addLog(`Decode error: ${e.message}`, 'error');
                return null;
            }
        }

        // Fetch page source using CORS proxy
        async function fetchPageSource(url) {
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://cors-anywhere.herokuapp.com/${url}`
            ];
            
            for (const proxy of proxies) {
                try {
                    addLog(`Trying proxy: ${proxy.substring(0, 60)}...`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const response = await fetch(proxy, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const text = await response.text();
                        addLog(`Proxy successful, got ${text.length} bytes`);
                        return text;
                    }
                } catch(e) {
                    addLog(`Proxy failed: ${e.message}`, 'error');
                }
            }
            return null;
        }

        // Extract Cloudnestra URL from vidsrc.to page
        async function extractCloudnestraUrl(tmdbId) {
            addLog(`Starting extraction for movie ID: ${tmdbId}`);
            
            const urlsToTry = [
                `https://vidsrc.to/embed/movie/${tmdbId}`,
                `https://vidsrc.xyz/embed/movie/${tmdbId}`,
                `https://vidsrc.net/embed/movie/${tmdbId}`,
                `https://vidsrc.me/embed/movie/${tmdbId}`
            ];
            
            for (const url of urlsToTry) {
                addLog(`Fetching: ${url}`);
                updateLoading("FETCHING VIDSRC PAGE...", `Attempting ${url.split('/')[2]}`);
                
                const html = await fetchPageSource(url);
                if (!html) continue;
                
                // Look for Cloudnestra RCP URL
                const cloudnestraPatterns = [
                    /https?:\/\/[^\s"']*cloudnestra[^\s"']*\/rcp\/[^\s"']+/gi,
                    /["']([^"']*\/rcp\/[^"']+)["']/gi,
                    /(?:src|href)=["']([^"']*cloudnestra[^"']*\/rcp\/[^"']*)["']/gi
                ];
                
                for (const pattern of cloudnestraPatterns) {
                    const matches = html.matchAll(pattern);
                    for (const match of matches) {
                        let cloudUrl = match[1] || match[0];
                        if (!cloudUrl.startsWith('http')) {
                            cloudUrl = 'https:' + cloudUrl;
                        }
                        addLog(`Found Cloudnestra URL: ${cloudUrl.substring(0, 80)}...`, 'success');
                        const videoUrl = decodeCloudnestraUrl(cloudUrl);
                        if (videoUrl) {
                            return videoUrl;
                        }
                    }
                }
                
                // Look for direct m3u8 as fallback
                const m3u8Match = html.match(/(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i);
                if (m3u8Match) {
                    addLog(`Found direct m3u8 URL`, 'success');
                    return m3u8Match[1];
                }
            }
            
            return null;
        }

        async function loadMovie(id) {
            try {
                updateLoading("FETCHING MOVIE DATA...", "Loading from TMDB database");
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();

                document.title = `MVHD | ${movie.title}`;
                document.getElementById('m-title').textContent = movie.title;
                
                const year = (movie.release_date || '').substring(0,4);
                document.getElementById('m-year').textContent = year ? `(${year})` : '';
                document.getElementById('m-rating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('m-runtime').textContent = movie.runtime ? `${movie.runtime} min` : 'N/A';
                document.getElementById('m-overview').textContent = movie.overview || 'No description available.';
                document.getElementById('m-poster').src = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/300x450/1a1a1a/ffffff?text=MVHD';
                
                if (movie.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundAttachment = 'fixed';
                }

                document.getElementById('main-content').style.display = 'block';
                document.getElementById('statusBadge').innerHTML = `🎬 ${movie.title}`;
                
                const videoPlayer = document.getElementById('direct-player');
                const fallbackFrame = document.getElementById('fallback-frame');
                
                // Try to extract Cloudnestra URL
                updateLoading("EXTRACTING CLOUDNESTRA...", "Fetching and decoding stream URL");
                const videoUrl = await extractCloudnestraUrl(id);
                
                if (videoUrl && videoUrl.includes('.m3u8')) {
                    addLog(`SUCCESS! Playing extracted Cloudnestra HLS stream`, 'success');
                    videoPlayer.style.display = 'block';
                    fallbackFrame.style.display = 'none';
                    document.getElementById('statusBadge').innerHTML = `☁️ CLOUDNESTRA • ${movie.title}`;
                    
                    if (Hls.isSupported()) {
                        const hls = new Hls({
                            debug: false,
                            enableWorker: true,
                            manifestLoadingTimeOut: 15000,
                            manifestLoadingMaxRetry: 3
                        });
                        hls.loadSource(videoUrl);
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            addLog(`HLS manifest loaded, playing`, 'success');
                            videoPlayer.play().catch(e => addLog(`Autoplay blocked: ${e.message}`, 'error'));
                        });
                        hls.on(Hls.Events.ERROR, (event, data) => {
                            addLog(`HLS Error: ${data.type} - ${data.details}`, 'error');
                        });
                    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                        videoPlayer.src = videoUrl;
                    }
                    hideLoading();
                } else if (videoUrl && videoUrl.includes('.mp4')) {
                    addLog(`SUCCESS! Playing extracted Cloudnestra MP4 stream`, 'success');
                    videoPlayer.style.display = 'block';
                    fallbackFrame.style.display = 'none';
                    videoPlayer.src = videoUrl;
                    document.getElementById('statusBadge').innerHTML = `☁️ CLOUDNESTRA • ${movie.title}`;
                    hideLoading();
                } else {
                    // Fallback to vidsrc.to iframe
                    addLog(`Extraction failed, using vidsrc.to fallback iframe`, 'error');
                    videoPlayer.style.display = 'none';
                    fallbackFrame.style.display = 'block';
                    fallbackFrame.src = `https://vidsrc.to/embed/movie/${id}`;
                    document.getElementById('statusBadge').innerHTML = `⚠️ FALLBACK • ${movie.title}`;
                    hideLoading();
                }
                
            } catch (error) {
                console.error(error);
                addLog(`Critical error: ${error.message}`, 'error');
                updateLoading("ERROR", "Failed to load movie");
                // Still show fallback
                document.getElementById('fallback-frame').style.display = 'block';
                document.getElementById('fallback-frame').src = `https://vidsrc.to/embed/movie/${id}`;
                hideLoading();
            }
        }

        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        
        if (tmdbId) {
            currentMovieId = tmdbId;
            loadMovie(tmdbId);
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
