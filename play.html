<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3;
            pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2;
            pointer-events: none;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }

        .video-stream-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }

        .data-packet {
            position: absolute;
            width: 3px;
            height: 20px;
            background: var(--primary);
            animation: dataFlow 3s linear infinite;
            filter: blur(1px);
        }

        @keyframes dataFlow {
            0% { transform: translateY(-100px) rotate(45deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
        }

        .cyber-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            z-index: 1000;
            border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .site-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.7);
            font-weight: 700;
            text-decoration: none;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            display: none;
        }

        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9);
            backdrop-filter: blur(10px);
            border: var(--pixel-border);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--neon-glow);
            position: relative;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .movie-info-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .movie-poster {
            flex: 0 0 200px;
        }

        .movie-poster img {
            width: 100%;
            height: auto;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .movie-details {
            flex: 1;
            min-width: 300px;
        }

        .movie-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.7);
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyber-blue);
        }

        .overview {
            margin: 20px 0;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .genre-tag {
            padding: 5px 15px;
            background: rgba(123, 97, 255, 0.2);
            border: 1px solid var(--secondary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
        }

        .player-container {
            background: var(--player-bg);
            border: 3px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3);
            margin-bottom: 30px;
            position: relative;
        }

        .player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite;
            z-index: 2;
        }

        #stream-frame {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
        }

        .status-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .status-badge {
            padding: 12px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .badge-primary {
            background: rgba(0, 255, 157, 0.1);
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .badge-success {
            background: rgba(0, 204, 255, 0.1);
            border: 2px solid var(--cyber-blue);
            color: var(--cyber-blue);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.2);
            border-top-color: #00ff9d;
            border-right-color: #7b61ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.7);
        }

        .loading-step {
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }

        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
        }

        @media (max-width: 768px) {
            #stream-frame { height: 400px; }
            .movie-title { font-size: 1.5rem; }
            .main-container { padding: 120px 15px 30px; }
            .movie-info-panel { flex-direction: column; }
            .movie-poster { max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>
    <div class="video-stream-effect" id="streamEffect"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">INITIALIZING CLOUDNESTRA...</div>
        <div class="loading-step" id="loadingStep">Starting extraction engine</div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        </div>
    </header>

    <div class="main-container" id="mainContent">
        <div class="movie-info-panel" id="moviePanel">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="movieTitle">Loading...</span> <span id="movieYear" style="color: var(--cyber-yellow);"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="movieRating">-</span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="movieRuntime">-</span></div>
                </div>
                <div class="overview" id="movieOverview"></div>
                <div class="genres" id="movieGenres"></div>
            </div>
        </div>

        <div class="player-container">
            <iframe id="stream-frame" src="" allowfullscreen></iframe>
        </div>

        <div class="status-badges">
            <div class="status-badge badge-primary" id="streamBadge">🚀 EXTRACTING CLOUDNESTRA...</div>
            <div class="status-badge badge-success" id="tmdbBadge">🎬 TMDB ID: -</div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        const titleParam = urlParams.get('title') || '';

        function updateLoading(msg, step) {
            document.getElementById('loadingText').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 500);
        }

        // ============================================================
        // EXACT MATCH OF YOUR Android UrlDecoder.decodeCloudnestraUrl()
        // ============================================================
        function decodeCloudnestraUrl(cloudnestraUrl) {
            try {
                console.log('Decoding Cloudnestra URL:', cloudnestraUrl);
                
                // Extract encoded part after /rcp/ (same as Android)
                const encoded = cloudnestraUrl.split('/rcp/')[1];
                if (!encoded) return null;
                
                // Fix base64 URL-safe encoding (same as Android Base64.decode)
                let base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) base64 += '=';
                
                // Decode base64 (same as Android Base64.decode)
                const decoded = atob(base64);
                console.log('Decoded:', decoded);
                
                // Same patterns as your Android code
                const patterns = [
                    /(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\.mp4[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\/(?:manifest|playlist|master)[^\s"']*)/i
                ];
                
                for (const pattern of patterns) {
                    const match = decoded.match(pattern);
                    if (match) {
                        console.log('Found video URL:', match[1]);
                        return match[1];
                    }
                }
                
                // If decoded starts with http, return as is (same as Android)
                if (decoded.startsWith('http')) {
                    return decoded;
                }
                
                return null;
            } catch(e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        // ============================================================
        // GENERATE CLOUDNESTRA URL (same as what your Android extractor returns)
        // ============================================================
        function generateCloudnestraUrl(id, type) {
            const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudnestra.com/rcp/${encoded}`;
        }

        // Fetch movie info from TMDB
        async function fetchMovieInfo(id, type) {
            try {
                const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=en-US`;
                const response = await fetch(url);
                const data = await response.json();
                return {
                    title: data.title || data.name,
                    year: (data.release_date || data.first_air_date || '').substring(0,4),
                    rating: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                    runtime: type === 'movie' ? (data.runtime ? data.runtime + ' min' : 'N/A') : (data.episode_run_time?.[0] ? data.episode_run_time[0] + ' min' : 'N/A'),
                    overview: data.overview || 'No description available.',
                    genres: data.genres ? data.genres.map(g => g.name) : [],
                    poster: data.poster_path ? `https://image.tmdb.org/t/p/w500${data.poster_path}` : null
                };
            } catch(e) {
                return {
                    title: titleParam || 'CYBERPUNK STREAM',
                    year: 'N/A',
                    rating: 'N/A',
                    runtime: 'N/A',
                    overview: 'Unable to fetch movie details. Streaming in progress.',
                    genres: [],
                    poster: null
                };
            }
        }

        // Update UI with movie info
        function updateMovieUI(movieInfo) {
            document.title = `MVHD | ${movieInfo.title}`;
            document.getElementById('movieTitle').textContent = movieInfo.title;
            document.getElementById('movieYear').textContent = movieInfo.year ? `(${movieInfo.year})` : '';
            document.getElementById('movieRating').textContent = movieInfo.rating;
            document.getElementById('movieRuntime').textContent = movieInfo.runtime;
            document.getElementById('movieOverview').textContent = movieInfo.overview;
            document.getElementById('tmdbBadge').innerHTML = `🎬 ${movieInfo.title} (${movieInfo.year})`;
            
            if (movieInfo.poster) {
                document.getElementById('moviePoster').src = movieInfo.poster;
            }
            
            const genresContainer = document.getElementById('movieGenres');
            genresContainer.innerHTML = '';
            movieInfo.genres.forEach(genre => {
                const tag = document.createElement('span');
                tag.className = 'genre-tag';
                tag.textContent = genre;
                genresContainer.appendChild(tag);
            });
        }

        // Create streaming effect
        function createStreamEffect() {
            const container = document.getElementById('streamEffect');
            const colors = ['#00ff9d', '#7b61ff', '#ff00e5', '#00ccff'];
            for (let i = 0; i < 25; i++) {
                const packet = document.createElement('div');
                packet.className = 'data-packet';
                packet.style.left = `${Math.random() * 100}%`;
                packet.style.animationDelay = `${Math.random() * 3}s`;
                packet.style.animationDuration = `${Math.random() * 2 + 2}s`;
                packet.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(packet);
            }
        }

        // ============================================================
        // MAIN FUNCTION - Exact same logic as your Android extractor
        // ============================================================
        async function main() {
            if (!tmdbId) {
                updateLoading('ERROR', 'No TMDB ID provided');
                setTimeout(() => window.location.href = 'index.html', 3000);
                return;
            }

            try {
                // Step 1: Fetch movie info (like TMDB API in Android)
                updateLoading('FETCHING MOVIE DATA...', 'Loading from TMDB');
                const movieInfo = await fetchMovieInfo(tmdbId, mediaType);
                updateMovieUI(movieInfo);
                
                // Step 2: Generate Cloudnestra URL (same as your Android extractor returns)
                updateLoading('GENERATING CLOUDNESTRA URL...', 'Creating encrypted stream link');
                const cloudnestraUrl = generateCloudnestraUrl(tmdbId, mediaType);
                console.log('Generated Cloudnestra URL:', cloudnestraUrl);
                
                // Step 3: Decode the Cloudnestra URL (same as UrlDecoder.decodeCloudnestraUrl)
                updateLoading('DECODING CLOUDNESTRA...', 'Extracting actual stream URL');
                const decodedUrl = decodeCloudnestraUrl(cloudnestraUrl);
                
                const iframe = document.getElementById('stream-frame');
                const streamBadge = document.getElementById('streamBadge');
                
                if (decodedUrl && (decodedUrl.includes('.m3u8') || decodedUrl.includes('.mp4'))) {
                    // We found the actual stream URL - play directly
                    updateLoading('STREAM FOUND!', 'Starting video player');
                    streamBadge.innerHTML = '🚀 CLOUDNESTRA EXTRACTED • DIRECT STREAM';
                    
                    // Use video element for direct playback (no iframe needed)
                    const playerContainer = document.querySelector('.player-container');
                    playerContainer.innerHTML = `
                        <video id="directPlayer" controls autoplay playsinline style="width:100%; height:650px;"></video>
                    `;
                    const videoPlayer = document.getElementById('directPlayer');
                    
                    if (decodedUrl.includes('.m3u8')) {
                        if (Hls.isSupported()) {
                            const hls = new Hls({ debug: false, enableWorker: true });
                            hls.loadSource(decodedUrl);
                            hls.attachMedia(videoPlayer);
                        } else {
                            videoPlayer.src = decodedUrl;
                        }
                    } else {
                        videoPlayer.src = decodedUrl;
                    }
                    hideLoading();
                } else {
                    // Fallback: Load Cloudnestra URL in iframe
                    updateLoading('LOADING STREAM...', 'Connecting to Cloudnestra');
                    iframe.src = cloudnestraUrl;
                    streamBadge.innerHTML = '☁️ CLOUDNESTRA STREAM • EMBEDDED';
                    hideLoading();
                }
                
            } catch(e) {
                console.error('Error:', e);
                updateLoading('ERROR', e.message);
            }
        }

        // Initialize
        createStreamEffect();
        
        // Check for URL parameter
        if (tmdbId) {
            main();
        } else {
            updateLoading('ERROR', 'No TMDB ID provided in URL');
            document.getElementById('loadingText').style.color = 'var(--cyber-red)';
            setTimeout(() => window.location.href = 'index.html', 3000);
        }
    </script>
</body>
</html>
