<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD CyberCinema | Secure Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
    :root {
        --primary: #00ff9d; --secondary: #7b61ff; --accent: #ff00e5; --dark-bg: #0a0a0f;
        --dark-card: #13131f; --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
        --pixel-border: 2px solid var(--primary); --cyber-red: #ff003c;
        --cyber-blue: #00ccff; --cyber-yellow: #fff200; --player-bg: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; background: var(--dark-bg); color: white; font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .cyber-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; opacity: 0.3; pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: -1; opacity: 0.2; pointer-events: none; animation: scanlines 10s linear infinite; }
    @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

    .cyber-header { position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border); box-shadow: 0 0 30px rgba(0, 255, 157, 0.5); font-family: 'Share Tech Mono', monospace; }
    .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; }
    .nav-link { color: var(--primary); text-decoration: none; padding: 8px 15px; border: 1px solid transparent; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; transition: all 0.3s ease; }
    .nav-link:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 157, 0.3); }

    .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; }

    .movie-info-panel { background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border); padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; display: flex; gap: 30px; flex-wrap: wrap; }
    .movie-info-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue)); }
    .movie-poster { flex: 0 0 220px; }
    .movie-poster img { width: 100%; border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); border-radius: 5px; }
    .movie-details { flex: 1; min-width: 300px; }
    .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--primary); margin-bottom: 15px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.7); line-height: 1.2; }
    
    .movie-meta { display: flex; flex-wrap: wrap; gap: 15px 25px; margin-bottom: 20px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); background: rgba(0,0,0,0.4); padding: 15px; border-radius: 5px; border: 1px solid rgba(0, 204, 255, 0.2); }
    .meta-item { display: flex; align-items: center; gap: 8px; }
    
    .overview { margin: 20px 0; line-height: 1.7; color: rgba(255, 255, 255, 0.9); font-size: 1.05rem; }
    
    .tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .section-label { width: 100%; color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 1rem; margin-top: 25px; margin-bottom: 10px; letter-spacing: 2px; border-bottom: 1px solid rgba(0, 255, 157, 0.2); padding-bottom: 5px; }
    
    /* Clickable Interactive Tags */
    .genre-tag { padding: 6px 16px; background: rgba(123, 97, 255, 0.1); border: 1px solid var(--secondary); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: white; text-decoration: none; transition: all 0.3s ease; cursor: pointer; border-radius: 4px; }
    .genre-tag:hover { background: var(--secondary); color: #fff; box-shadow: 0 0 15px rgba(123, 97, 255, 0.6); transform: translateY(-3px); }

    /* NEW: Pro Actor Cards */
    .cast-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin; scrollbar-color: var(--cyber-blue) transparent; }
    .cast-grid::-webkit-scrollbar { height: 8px; }
    .cast-grid::-webkit-scrollbar-thumb { background: var(--cyber-blue); border-radius: 4px; }
    
    .cast-card { flex: 0 0 130px; background: rgba(0, 204, 255, 0.05); border: 1px solid rgba(0, 204, 255, 0.3); border-radius: 8px; text-decoration: none; color: white; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; padding: 15px 10px; cursor: pointer; }
    .cast-card:hover { transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 204, 255, 0.4); background: rgba(0, 204, 255, 0.15); border-color: var(--cyber-blue); }
    .cast-photo { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid var(--secondary); margin-bottom: 12px; box-shadow: 0 0 10px rgba(123, 97, 255, 0.5); }
    .cast-name { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; text-align: center; color: var(--cyber-blue); line-height: 1.2; margin-bottom: 5px; font-weight: bold; }
    .cast-character { font-size: 0.75rem; text-align: center; color: #aaa; line-height: 1.2; font-style: italic; }

    .player-container { background: var(--player-bg); border: 3px solid var(--primary); border-radius: 10px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px; position: relative; }
    .player-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent)); z-index: 2; }
    #stream-frame { width: 100%; height: 650px; border: none; display: block; background: #000; }

    .status-badges { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
    .status-badge { padding: 12px 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 10px; animation: badgePulse 2s infinite; }
    .badge-primary { background: rgba(0, 255, 157, 0.1); border: 2px solid var(--primary); color: var(--primary); }
    .badge-success { background: rgba(0, 204, 255, 0.1); border: 2px solid var(--cyber-blue); color: var(--cyber-blue); }

    @keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
    .loading-text { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 255, 157, 0.7); margin-bottom: 20px;}
    
    @media (max-width: 768px) { #stream-frame { height: 400px; } .movie-title { font-size: 1.8rem; } .movie-poster { flex: 0 0 100%; max-width: 250px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div style="text-align:center;">
            <div class="loading-text" id="loadingText">ACTIVATING VSEMBED SHIELD...</div>
            <div style="color:var(--cyber-blue); font-family:monospace; margin-top:10px;">Routing connection...</div>
        </div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <div class="site-title">MVHD CYBERCINEMA</div>
            <a href="index.html" class="nav-link">← RETURN TO MAINFRAME</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Metadata -->
        <div class="movie-info-panel">
            <div class="movie-poster" id="moviePoster"></div>
            <div class="movie-details">
                <h1 class="movie-title" id="movieTitle">DECRYPTING...</h1>
                
                <!-- Expanded Meta Section -->
                <div class="movie-meta">
                    <div class="meta-item">⭐ <span id="ratingVal">N/A</span></div>
                    <div class="meta-item">⏱️ <span id="runtimeVal">N/A</span></div>
                    <div class="meta-item">📅 <span id="releaseVal">N/A</span></div>
                    <div class="meta-item">🌍 <span id="countryVal">N/A</span></div>
                    <div class="meta-item">🗣️ <span id="langVal">N/A</span></div>
                </div>
                
                <div class="overview" id="movieOverview">Loading encrypted data...</div>
                
                <div class="section-label">CATEGORIES</div>
                <div class="tags-container" id="movieGenres"></div>
                
                <!-- Pro Actor Grid Section -->
                <div class="section-label">KEY PERSONNEL</div>
                <div class="cast-grid" id="movieCast"></div>
            </div>
        </div>

        <!-- Video Player -->
        <div class="player-container">
            <iframe id="stream-frame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="status-badges">
            <div class="status-badge badge-primary">🛡️ ORIGIN GUARD: VSEMBED PLAYER ACTIVE</div>
            <div class="status-badge badge-success" id="tmdbBadge">🎬 TMDB: CONNECTED</div>
        </div>
    </div>

    <script>
        // Origin Guard Anti-Popup
        (function applyOriginGuard() {
            window.open = function() { console.warn("🛡️ Origin Guard: Blocked popup"); return { focus: function(){}, close: function(){} }; };
            window.onbeforeunload = function(e) { if (document.activeElement && document.activeElement.tagName === 'IFRAME') return "Origin Guard block."; };
            document.addEventListener('click', function(e) {
                // Ignore block rule if they are clicking a legit Pro Genre/Actor Tag route
                if (e.target.closest('.genre-tag') || e.target.closest('.cast-card')) return; 
                if (e.target.tagName === 'A' && (e.target.href.includes('ad') || e.target.href.includes('bet'))) e.preventDefault();
            }, true);
        })();

        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';

        function dismissOverlay() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function syncTmdbDetails() {
            if (!tmdbId) return;
            try {
                // 1. Fetch Main Data (Includes Countries & Languages)
                const res = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?api_key=${TMDB_API_KEY}`);
                const data = await res.json();

                const title = data.title || data.name || "Unknown";
                const year = (data.release_date || data.first_air_date || 'N/A').substring(0, 4);

                document.title = `MVHD | ${title}`;
                document.getElementById('movieTitle').innerHTML = `${title} <span style="color:var(--cyber-yellow);">(${year})</span>`;
                document.getElementById('ratingVal').innerText = data.vote_average ? `${data.vote_average.toFixed(1)}/10` : 'N/A';
                document.getElementById('runtimeVal').innerText = data.runtime ? `${data.runtime} min` : (data.episode_run_time && data.episode_run_time.length > 0 ? `${data.episode_run_time[0]} min` : 'N/A');
                document.getElementById('releaseVal').innerText = data.release_date || data.first_air_date || 'N/A';
                document.getElementById('movieOverview').innerText = data.overview || '';

                // NEW: Populate Countries and Languages
                document.getElementById('countryVal').innerText = data.production_countries && data.production_countries.length > 0 
                    ? data.production_countries.map(c => c.name).join(', ') : 'N/A';
                document.getElementById('langVal').innerText = data.spoken_languages && data.spoken_languages.length > 0 
                    ? data.spoken_languages.map(l => l.english_name).join(', ') : 'N/A';

                if (data.poster_path) document.getElementById('moviePoster').innerHTML = `<img src="https://image.tmdb.org/t/p/w500${data.poster_path}">`;
                if (data.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/w1280${data.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover'; document.body.style.backgroundPosition = 'center'; document.body.style.backgroundAttachment = 'fixed';
                }

                // Generates PRO Clickable Genre Anchors
                if (data.genres) {
                    document.getElementById('movieGenres').innerHTML = data.genres.map(g => 
                        `<a href="index.html?genre=${g.id}&genreName=${encodeURIComponent(g.name)}&type=${mediaType}" class="genre-tag">📁 ${g.name}</a>`
                    ).join('');
                }

                // 2. Fetch Cast & Crew Data (Photos & Character names)
                const castRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}/credits?api_key=${TMDB_API_KEY}`);
                const castData = await castRes.json();
                
                // Generates Visual Actor Cards
                if (castData.cast) {
                    const topCast = castData.cast.slice(0, 12); // Show up to 12 main actors
                    document.getElementById('movieCast').innerHTML = topCast.map(actor => {
                        const imgPath = actor.profile_path ? `https://image.tmdb.org/t/p/w185${actor.profile_path}` : 'https://via.placeholder.com/150x150/13131f/00ccff?text=NO+PHOTO';
                        return `
                        <a href="index.html?actor=${actor.id}&actorName=${encodeURIComponent(actor.name)}&type=${mediaType}" class="cast-card">
                            <img src="${imgPath}" class="cast-photo" alt="${actor.name}">
                            <div class="cast-name">${actor.name}</div>
                            <div class="cast-character">${actor.character || 'Unknown Role'}</div>
                        </a>`;
                    }).join('');
                }

            } catch (e) { console.warn("TMDB sync failed."); }
        }

        function loadVsembedFrame() {
            if (!tmdbId) return dismissOverlay();
            const targetEmbed = mediaType === 'tv' ? `https://vsembed.ru/embed/tv/${tmdbId}/1/1` : `https://vsembed.ru/embed/movie/${tmdbId}`;
            const frame = document.getElementById('stream-frame');
            if (frame) { frame.src = targetEmbed; frame.onload = dismissOverlay; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            syncTmdbDetails();
            loadVsembedFrame();
            setTimeout(dismissOverlay, 6000); 
        });
    </script>
</body>
</html>
