<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MVHD | Cloudnestra Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: #00ff9d;
            padding: 12px 20px;
            font-size: 12px;
            font-family: 'Share Tech Mono', monospace;
            z-index: 1000;
            border-top: 1px solid #00ff9d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-left {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-right {
            display: flex;
            gap: 15px;
        }

        .badge {
            padding: 4px 12px;
            background: rgba(0,255,157,0.1);
            border: 1px solid #00ff9d;
            border-radius: 20px;
            font-size: 11px;
        }

        .badge.success {
            background: rgba(0,255,157,0.2);
            color: #00ff9d;
        }

        .badge.warning {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .badge.error {
            border-color: #ff4444;
            color: #ff4444;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,157,0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #00ff9d;
            letter-spacing: 2px;
        }

        .loading-step {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
        }

        button {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 8px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            opacity: 0.8;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
        }

        .back-btn:hover {
            background: #00ff9d;
            color: #000;
        }

        @media (max-width: 768px) {
            .info-bar {
                flex-direction: column;
                text-align: center;
                padding: 10px;
            }
            .badge {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <video id="videoPlayer" controls autoplay playsinline></video>
    </div>

    <div class="info-bar" id="infoBar">
        <div class="info-left">
            <span id="movieTitle">MVHD Player</span>
            <span id="statusBadge" class="badge">⚡ INITIALIZING</span>
        </div>
        <div class="info-right">
            <span class="badge" id="streamType">☁️ CLOUDNESTRA</span>
            <button class="back-btn" onclick="goBack()">← BACK</button>
            <button onclick="location.reload()">⟳ RELOAD</button>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">DECODING CLOUDNESTRA URL...</div>
        <div class="loading-step" id="loadingStep">Initializing stream engine</div>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        let cloudnestraUrl = urlParams.get('url');
        const movieTitleParam = urlParams.get('title');
        const mediaType = urlParams.get('type');
        const tmdbId = urlParams.get('id');

        const video = document.getElementById('videoPlayer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingStep = document.getElementById('loadingStep');
        const statusBadge = document.getElementById('statusBadge');
        const movieTitleSpan = document.getElementById('movieTitle');

        // Set movie title
        if (movieTitleParam) {
            movieTitleSpan.textContent = movieTitleParam;
            document.title = `MVHD | ${movieTitleParam}`;
        }

        function updateLoading(msg, step) {
            loadingText.textContent = msg;
            if (step) loadingStep.textContent = step;
            console.log(msg);
        }

        function updateStatus(msg, type = 'warning') {
            statusBadge.textContent = msg;
            statusBadge.className = `badge ${type}`;
        }

        function hideLoading() {
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 500);
        }

        function showError(msg) {
            updateStatus(msg, 'error');
            loadingText.textContent = 'ERROR';
            loadingStep.textContent = msg;
            
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.95);
                border: 2px solid #ff4444;
                padding: 30px;
                border-radius: 10px;
                text-align: center;
                z-index: 1002;
                min-width: 300px;
            `;
            errorDiv.innerHTML = `
                <div style="color: #ff4444; font-size: 48px; margin-bottom: 15px;">❌</div>
                <div style="color: #ff4444; margin-bottom: 20px;">${msg}</div>
                <button onclick="location.reload()">RETRY</button>
                <button onclick="goBack()" style="margin-left: 10px;">GO BACK</button>
            `;
            document.body.appendChild(errorDiv);
            setTimeout(() => hideLoading(), 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Decode Cloudnestra URL
        function decodeCloudnestraUrl(cloudUrl) {
            try {
                const match = cloudUrl.match(/\/rcp\/([A-Za-z0-9+\/=]+)/);
                if (!match) throw new Error('Invalid Cloudnestra URL format');
                
                let encoded = match[1];
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                const decoded = atob(encoded);
                console.log('Decoded vidsrc URL:', decoded);
                return decoded;
            } catch(e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        // Fetch stream URL from vidsrc page
        async function fetchStreamFromVidSrc(vidsrcUrl) {
            updateLoading('FETCHING STREAM...', 'Connecting to vidsrc.to');
            
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(vidsrcUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(vidsrcUrl)}`
            ];
            
            for (const proxy of proxies) {
                try {
                    updateLoading('FETCHING STREAM...', `Trying proxy...`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    const response = await fetch(proxy, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const html = await response.text();
                        updateLoading('PARSING RESPONSE...', 'Looking for stream URL');
                        
                        // Look for m3u8 URL
                        const patterns = [
                            /(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i,
                            /(https?:\/\/[^\s"']+\/master[^\s"']*\.m3u8)/i,
                            /(https?:\/\/[^\s"']+\/playlist[^\s"']*\.m3u8)/i,
                            /(https?:\/\/[^\s"']+\/index[^\s"']*\.m3u8)/i
                        ];
                        
                        for (const pattern of patterns) {
                            const match = html.match(pattern);
                            if (match) {
                                return match[1];
                            }
                        }
                        
                        // Look for Cloudnestra redirect
                        const cloudMatch = html.match(/https?:\/\/[^\s"']*cloudnestra[^\s"']*\/rcp\/[^\s"']*/i);
                        if (cloudMatch) {
                            updateLoading('FOLLOWING REDIRECT...', 'Decoding nested Cloudnestra');
                            return await fetchStreamFromCloudnestra(cloudMatch[0]);
                        }
                    }
                } catch(e) {
                    console.log('Proxy failed:', e.message);
                }
            }
            return null;
        }

        // Direct Cloudnestra fetch
        async function fetchStreamFromCloudnestra(cloudUrl) {
            const vidsrcUrl = decodeCloudnestraUrl(cloudUrl);
            if (vidsrcUrl) {
                return await fetchStreamFromVidSrc(vidsrcUrl);
            }
            return null;
        }

        // Play the stream
        function playStream(streamUrl) {
            updateStatus('STREAM FOUND', 'success');
            updateLoading('PLAYING STREAM...', 'Starting video player');
            
            if (streamUrl.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    if (video.hls) video.hls.destroy();
                    const hls = new Hls({
                        debug: false,
                        enableWorker: true,
                        manifestLoadingTimeOut: 15000,
                        manifestLoadingMaxRetry: 3
                    });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    video.hls = hls;
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        hideLoading();
                        updateStatus('PLAYING', 'success');
                        video.play().catch(e => updateStatus('CLICK PLAY TO START', 'warning'));
                    });
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            showError('HLS Error: ' + data.type);
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    hideLoading();
                    updateStatus('PLAYING', 'success');
                    video.play();
                } else {
                    showError('HLS not supported in this browser');
                }
            } else {
                video.src = streamUrl;
                hideLoading();
                updateStatus('PLAYING', 'success');
                video.play();
            }
        }

        // Main function
        async function main() {
            if (!cloudnestraUrl) {
                // Try to generate from TMDB ID if available
                if (tmdbId) {
                    const mediaTypeParam = mediaType || 'movie';
                    const vidsrcUrl = `https://vidsrc.to/embed/${mediaTypeParam}/${tmdbId}`;
                    cloudnestraUrl = `https://cloudnestra.com/rcp/${btoa(vidsrcUrl)}`;
                    updateLoading('GENERATED CLOUDNESTRA URL...', 'Using TMDB ID');
                } else {
                    cloudnestraUrl = prompt('Enter Cloudnestra URL:', 'https://cloudnestra.com/rcp/');
                    if (!cloudnestraUrl) {
                        goBack();
                        return;
                    }
                }
            }
            
            try {
                updateLoading('DECODING CLOUDNESTRA...', 'Extracting vidsrc URL');
                const vidsrcUrl = decodeCloudnestraUrl(cloudnestraUrl);
                
                if (!vidsrcUrl) {
                    showError('Failed to decode Cloudnestra URL');
                    return;
                }
                
                updateLoading('FETCHING STREAM...', vidsrcUrl.substring(0, 60) + '...');
                let streamUrl = await fetchStreamFromVidSrc(vidsrcUrl);
                
                if (!streamUrl) {
                    // Fallback: Try direct Cloudnestra fetch
                    streamUrl = await fetchStreamFromCloudnestra(cloudnestraUrl);
                }
                
                if (streamUrl) {
                    playStream(streamUrl);
                } else {
                    // Ultimate fallback: Use iframe
                    updateStatus('USING FALLBACK', 'warning');
                    updateLoading('FALLBACK MODE...', 'Using vidsrc.to iframe');
                    
                    video.style.display = 'none';
                    const iframe = document.createElement('iframe');
                    iframe.src = vidsrcUrl;
                    document.getElementById('container').appendChild(iframe);
                    hideLoading();
                    updateStatus('FALLBACK PLAYER ACTIVE', 'warning');
                }
                
            } catch(e) {
                showError(e.message);
            }
        }

        // Handle fullscreen
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });

        // Start
        main();
    </script>
</body>
</html>
