<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVHD Player</title>

<style>
body{
    margin:0;
    background:#0a0a0f;
    color:#fff;
    font-family:Arial,sans-serif;
}
.header{
    background:#000;
    padding:15px;
    text-align:center;
    border-bottom:2px solid #00ff9d;
}
.header h1{
    margin:0;
    color:#00ff9d;
}
.container{
    padding:20px;
}
iframe{
    width:100%;
    height:80vh;
    border:none;
    background:#000;
}
.status{
    margin-top:10px;
    padding:10px;
    border:1px solid #00ff9d;
    font-family: monospace;
    font-size: 12px;
    word-break: break-all;
}
</style>
</head>
<body>

<div class="header">
    <h1>MVHD Player</h1>
</div>

<div class="container">
    <iframe id="player" allowfullscreen></iframe>
    <div class="status" id="status">Loading...</div>
</div>

<script>
const params = new URLSearchParams(location.search);

const tmdbId = params.get("tmdb") || "1380291";
const mediaType = params.get("type") || "movie";

const iframe = document.getElementById("player");
const status = document.getElementById("status");

// Generate CloudOrchestraNova URL from TMDB ID
function generateCloudUrl(id, type) {
    const vidsrcUrl = `https://vidsrc.to/embed/${type}/${id}`;
    const encoded = btoa(vidsrcUrl);
    return `https://cloudorchestranova.com/rcp/${encoded}`;
}

// Generate the URL
const playerUrl = generateCloudUrl(tmdbId, mediaType);

status.textContent = "CloudOrchestraNova: " + playerUrl;

iframe.src = playerUrl;

iframe.onload = () => {
    status.innerHTML = "✅ Stream loaded - Playing now<br>URL: " + playerUrl;
};

setTimeout(() => {
    if (iframe.src) {
        status.innerHTML = "⚠️ If video doesn't appear, the stream may still be loading. Check console (F12).<br>URL: " + playerUrl;
    }
}, 8000);
</script>

</body>
</html>
