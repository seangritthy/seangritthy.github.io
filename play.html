<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --web3-purple: #8a2be2;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0; padding: 0; background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden;
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2; pointer-events: none;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .video-stream-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.1; }
        .data-packet { position: absolute; width: 3px; height: 20px; background: var(--primary); animation: dataFlow 3s linear infinite; filter: blur(1px); }
        @keyframes dataFlow { 0% { transform: translateY(-100px) rotate(45deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(100vh) rotate(45deg); opacity: 0; } }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5); font-family: 'Share Tech Mono', monospace;
        }

        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; text-decoration: none;}

        .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; display: none; }
        
        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border);
            padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; display: flex; gap: 30px; flex-wrap: wrap;
        }
        .movie-info-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite; background-size: 200% 100%;
        }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        .movie-details { flex: 1; min-width: 300px; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.7); }
        .tagline { font-style: italic; color: var(--cyber-blue); margin-bottom: 15px; font-size: 1.1rem; }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); }
        .overview { margin: 20px 0; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }
        .genres { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .genre-tag { padding: 5px 15px; background: rgba(123, 97, 255, 0.2); border: 1px solid var(--secondary); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; }

        .player-container {
            background: var(--player-bg); border: 3px solid var(--primary); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px; position: relative;
        }
        .player-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite; z-index: 2;
        }
        #stream-frame { width: 100%; height: 650px; border: none; display: block; }

        .status-badges { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .status-badge {
            padding: 12px 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; letter-spacing: 1px;
            display: inline-flex; align-items: center; gap: 10px; animation: badgePulse 2s infinite;
        }
        .badge-primary { background: rgba(0, 255, 157, 0.1); border: 2px solid var(--primary); color: var(--primary); }
        .badge-warning { background: rgba(255, 242, 0, 0.1); border: 2px solid var(--cyber-yellow); color: var(--cyber-yellow); }
        .badge-success { background: rgba(0, 204, 255, 0.1); border: 2px solid var(--cyber-blue); color: var(--cyber-blue); }
        @keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .control-panel { background: rgba(19, 19, 31, 0.9); border: var(--pixel-border); padding: 25px; margin-top: 30px; box-shadow: var(--neon-glow); }
        .control-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; text-align: center; }
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .control-item { background: rgba(0, 0, 0, 0.5); padding: 20px; border: 1px solid var(--secondary); transition: all 0.3s ease; }
        .control-item:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); transform: translateY(-5px); }
        .control-label { color: var(--cyber-yellow); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; margin-bottom: 10px; }
        .control-value { color: white; font-size: 1.1rem; font-family: 'Orbitron', sans-serif; }

        .quality-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .quality-btn { padding: 10px 20px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--secondary); color: white; font-family: 'Share Tech Mono', monospace; cursor: pointer; transition: all 0.3s ease; }
        .quality-btn:hover, .quality-btn.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 157, 0.5); }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; gap: 20px;
            transition: opacity 0.5s;
        }
        .spinner { width: 60px; height: 60px; border: 3px solid rgba(0, 255, 157, 0.2); border-top-color: #00ff9d; border-right-color: #7b61ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 255, 157, 0.7); }
        .loading-bar { width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 2s infinite; }
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }

        @media (max-width: 768px) { #stream-frame { height: 400px; } .movie-title { font-size: 1.5rem; } .main-container { padding: 120px 15px 30px; } .movie-info-panel { flex-direction: column; } .movie-poster { max-width: 200px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>
    <div class="video-stream-effect" id="streamEffect"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">INITIALIZING MAINFRAME...</div>
        <div class="loading-bar"></div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        </div>
    </header>

    <div class="main-container" id="mainContent">
        <div class="movie-info-panel" id="moviePanel">
            <div class="movie-poster">
                <img id="moviePoster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="movieTitle">Loading...</span> <span id="movieYear" style="color: var(--cyber-yellow);"></span></h1>
                <div class="tagline" id="originalTitle" style="color: var(--cyber-blue); display: none;"></div>
                <div class="tagline" id="taglineText" style="display: none;"></div>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="movieRating">-</span>/10 (<span id="voteCount">0</span> votes)</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="movieRuntime">-</span></div>
                    <div class="meta-item">📅 RELEASE: <span id="releaseDate">-</span></div>
                    <div class="meta-item">🎯 QUALITY: <span id="streamQuality">1080p</span></div>
                </div>
                <div class="overview" id="movieOverview"></div>
                <div class="genres" id="genresContainer"></div>
            </div>
        </div>

        <div class="player-container">
            <iframe id="stream-frame" src="" allowfullscreen></iframe>
        </div>

        <div class="status-badges">
            <div class="status-badge" id="cloudBadge">🚀 EXTRACTING CLOUDNESTRA...</div>
            <div class="status-badge badge-success" id="tmdbBadge">🎬 TMDB ID: -</div>
        </div>

        <div class="control-panel">
            <h2 class="control-title">STREAM CONTROL PANEL • <span id="panelTitle"></span></h2>
            <div class="control-grid">
                <div class="control-item"><div class="control-label">SERVER STATUS</div><div class="control-value" id="serverStatus">CONNECTED</div></div>
                <div class="control-item"><div class="control-label">STREAM QUALITY</div><div class="control-value" id="displayQuality">1080p</div></div>
                <div class="control-item"><div class="control-label">BITRATE</div><div class="control-value" id="bitrate">8.5 MBPS</div></div>
                <div class="control-item"><div class="control-label">BUFFER HEALTH</div><div class="control-value" id="bufferHealth">98%</div></div>
            </div>
            <div class="quality-selector">
                <button class="quality-btn active" data-quality="auto">AUTO (RECOMMENDED)</button>
                <button class="quality-btn" data-quality="1080">1080P</button>
                <button class="quality-btn" data-quality="720">720P</button>
                <button class="quality-btn" data-quality="480">480P</button>
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        
        if (!tmdbId) {
            document.getElementById('loadingText').textContent = "ERROR: INVALID TMDB ID";
            document.getElementById('loadingText').style.color = "#ff003c";
        } else {
            document.getElementById('tmdbBadge').innerHTML = `🎬 TMDB ID: ${tmdbId}`;
            fetchMovieAndStream(tmdbId);
        }

        // Generate Cloudnestra URL (same as PHP function)
        async function getCloudNestraUrl(tmdbId) {
            const url = `https://vidsrc.xyz/embed/movie/${tmdbId}`;
            
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const html = data.contents;
                
                const iframeMatch = html.match(/iframe[^>]+src=["']([^"']*cloudnestra[^"']*)["']/i);
                if (iframeMatch) {
                    let cloudUrl = iframeMatch[1];
                    if (!cloudUrl.startsWith('http')) cloudUrl = 'https:' + cloudUrl;
                    return cloudUrl;
                }
                return null;
            } catch(e) {
                console.log('Cloudnestra extraction failed:', e);
                return null;
            }
        }

        async function fetchMovieAndStream(id) {
            try {
                document.getElementById('loadingText').textContent = "FETCHING TMDB DATABASE...";
                
                // Fetch movie info
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${id}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();

                const title = movie.title || movie.name;
                const year = (movie.release_date || movie.first_air_date || '').substring(0,4);
                
                document.title = `MVHD | ${title}`;
                document.getElementById('movieTitle').textContent = title;
                document.getElementById('movieYear').textContent = year ? `(${year})` : '';
                document.getElementById('movieRating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('voteCount').textContent = movie.vote_count || 0;
                document.getElementById('movieRuntime').textContent = movie.runtime ? `${movie.runtime} min` : (movie.episode_run_time?.[0] ? `${movie.episode_run_time[0]} min` : 'N/A');
                document.getElementById('releaseDate').textContent = movie.release_date || movie.first_air_date || 'N/A';
                document.getElementById('movieOverview').textContent = movie.overview || 'No description available.';
                document.getElementById('panelTitle').textContent = title.toUpperCase();
                document.getElementById('tmdbBadge').innerHTML = `🎬 ${title} (${year})`;
                
                if (movie.poster_path) {
                    document.getElementById('moviePoster').src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                }
                
                if (movie.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                }

                if (movie.original_title && movie.original_title !== title) {
                    document.getElementById('originalTitle').innerHTML = `Original: ${movie.original_title}`;
                    document.getElementById('originalTitle').style.display = 'block';
                }

                if (movie.tagline) {
                    document.getElementById('taglineText').innerHTML = `"${movie.tagline}"`;
                    document.getElementById('taglineText').style.display = 'block';
                }

                if (movie.genres && movie.genres.length > 0) {
                    const genresDiv = document.getElementById('genresContainer');
                    movie.genres.forEach(g => {
                        const span = document.createElement('span');
                        span.className = 'genre-tag';
                        span.textContent = g.name;
                        genresDiv.appendChild(span);
                    });
                }

                const qualities = ['4K HDR', '1080p', '720p', '480p'];
                const streamQuality = qualities[id % qualities.length];
                document.getElementById('streamQuality').textContent = streamQuality;
                document.getElementById('displayQuality').textContent = streamQuality;

                document.getElementById('mainContent').style.display = 'block';

                // Try to extract Cloudnestra URL (like PHP function)
                document.getElementById('loadingText').textContent = "EXTRACTING CLOUDNESTRA...";
                const frame = document.getElementById('stream-frame');
                const cloudBadge = document.getElementById('cloudBadge');

                try {
                    const cloudUrl = await getCloudNestraUrl(id);
                    if (cloudUrl) {
                        frame.src = cloudUrl;
                        cloudBadge.className = "status-badge badge-primary";
                        cloudBadge.innerHTML = "🚀 MVHD • BY BONG BEE";
                    } else {
                        throw new Error("Cloudnestra not found");
                    }
                } catch(e) {
                    // Fallback to vidsrc.to
                    frame.src = `https://vidsrc.to/embed/${mediaType}/${id}`;
                    cloudBadge.className = "status-badge badge-warning";
                    cloudBadge.innerHTML = "⚠️ FALLBACK PLAYER • STANDARD STREAM";
                }

                frame.onload = function() {
                    document.getElementById('loadingOverlay').style.opacity = '0';
                    setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 500);
                };

                setTimeout(() => {
                    const overlay = document.getElementById('loadingOverlay');
                    if (overlay.style.display !== 'none') {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.style.display = 'none', 500);
                    }
                }, 8000);

            } catch(e) {
                console.error(e);
                document.getElementById('loadingText').textContent = "CRITICAL MAINFRAME ERROR";
                document.getElementById('loadingText').style.color = "#ff003c";
            }
        }

        // Streaming effects
        function createStreamEffect() {
            const container = document.getElementById('streamEffect');
            const colors = ['#00ff9d', '#7b61ff', '#ff00e5', '#00ccff'];
            for (let i = 0; i < 25; i++) {
                const packet = document.createElement('div');
                packet.className = 'data-packet';
                packet.style.left = `${Math.random() * 100}%`;
                packet.style.animationDelay = `${Math.random() * 3}s`;
                packet.style.animationDuration = `${Math.random() * 2 + 2}s`;
                packet.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(packet);
            }
        }

        function updateStreamStats() {
            setInterval(() => {
                const bitrates = ['8.5 MBPS', '9.2 MBPS', '7.8 MBPS', '8.1 MBPS'];
                const bufferLevels = ['98%', '95%', '99%', '97%'];
                document.getElementById('bitrate').textContent = bitrates[Math.floor(Math.random() * bitrates.length)];
                document.getElementById('bufferHealth').textContent = bufferLevels[Math.floor(Math.random() * bufferLevels.length)];
                
                if (Math.random() > 0.9) {
                    document.getElementById('serverStatus').textContent = 'RECONNECTING';
                    document.getElementById('serverStatus').style.color = '#fff200';
                    setTimeout(() => {
                        document.getElementById('serverStatus').textContent = 'CONNECTED';
                        document.getElementById('serverStatus').style.color = '#00ff9d';
                    }, 2000);
                }
            }, 3000);
        }

        function setupQualitySelector() {
            const qualityBtns = document.querySelectorAll('.quality-btn');
            qualityBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    qualityBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const quality = this.getAttribute('data-quality');
                    const qualityText = quality === 'auto' ? 'AUTO' : quality + 'P';
                    document.getElementById('displayQuality').textContent = qualityText;
                });
            });
        }

        createStreamEffect();
        updateStreamStats();
        setupQualitySelector();
    </script>
</body>
</html>
