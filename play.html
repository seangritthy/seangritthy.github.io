<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MVHD | Cloudnestra Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: #00ff9d;
            padding: 12px 20px;
            font-size: 12px;
            font-family: 'Share Tech Mono', monospace;
            z-index: 1000;
            border-top: 1px solid #00ff9d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-left {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-right {
            display: flex;
            gap: 15px;
        }

        .badge {
            padding: 4px 12px;
            background: rgba(0,255,157,0.1);
            border: 1px solid #00ff9d;
            border-radius: 20px;
            font-size: 11px;
        }

        .badge.success {
            background: rgba(0,255,157,0.2);
            color: #00ff9d;
        }

        .badge.warning {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .badge.error {
            border-color: #ff4444;
            color: #ff4444;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,157,0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #00ff9d;
            letter-spacing: 2px;
        }

        .loading-step {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
        }

        button {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 8px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            opacity: 0.8;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
        }

        .back-btn:hover {
            background: #00ff9d;
            color: #000;
        }

        @media (max-width: 768px) {
            .info-bar {
                flex-direction: column;
                text-align: center;
                padding: 10px;
            }
            .badge {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <video id="videoPlayer" controls autoplay playsinline></video>
    </div>

    <div class="info-bar" id="infoBar">
        <div class="info-left">
            <span id="movieTitle">MVHD Player</span>
            <span id="statusBadge" class="badge">⚡ INITIALIZING</span>
        </div>
        <div class="info-right">
            <span class="badge" id="streamType">☁️ CLOUDNESTRA</span>
            <button class="back-btn" onclick="goBack()">← BACK</button>
            <button onclick="location.reload()">⟳ RELOAD</button>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">DECODING CLOUDNESTRA URL...</div>
        <div class="loading-step" id="loadingStep">Initializing stream engine</div>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        let cloudnestraUrl = urlParams.get('url');
        const movieTitleParam = urlParams.get('title');
        const mediaType = urlParams.get('type');
        const tmdbId = urlParams.get('id');

        const video = document.getElementById('videoPlayer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingStep = document.getElementById('loadingStep');
        const statusBadge = document.getElementById('statusBadge');
        const movieTitleSpan = document.getElementById('movieTitle');

        // Set movie title
        if (movieTitleParam) {
            movieTitleSpan.textContent = movieTitleParam;
            document.title = `MVHD | ${movieTitleParam}`;
        }

        function updateLoading(msg, step) {
            loadingText.textContent = msg;
            if (step) loadingStep.textContent = step;
            console.log(msg);
        }

        function updateStatus(msg, type = 'warning') {
            statusBadge.textContent = msg;
            statusBadge.className = `badge ${type}`;
        }

        function hideLoading() {
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 500);
        }

        function showError(msg) {
            updateStatus(msg, 'error');
            loadingText.textContent = 'ERROR';
            loadingStep.textContent = msg;
            
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.95);
                border: 2px solid #ff4444;
                padding: 30px;
                border-radius: 10px;
                text-align: center;
                z-index: 1002;
                min-width: 300px;
            `;
            errorDiv.innerHTML = `
                <div style="color: #ff4444; font-size: 48px; margin-bottom: 15px;">❌</div>
                <div style="color: #ff4444; margin-bottom: 20px;">${msg}</div>
                <button onclick="location.reload()">RETRY</button>
                <button onclick="goBack()" style="margin-left: 10px;">GO BACK</button>
            `;
            document.body.appendChild(errorDiv);
            setTimeout(() => hideLoading(), 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Decode Cloudnestra URL to get vidsrc URL
        function decodeCloudnestraUrl(cloudUrl) {
            try {
                // Extract base64 part after /rcp/
                const match = cloudUrl.match(/\/rcp\/([A-Za-z0-9+\/=]+)/);
                if (!match) throw new Error('Invalid Cloudnestra URL format');
                
                let encoded = match[1];
                // Fix URL-safe base64
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                // Decode base64
                const decoded = atob(encoded);
                console.log('Decoded vidsrc URL:', decoded);
                return decoded;
            } catch(e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        // Direct fallback: Play vidsrc URL in iframe
        function playVidSrcIframe(vidsrcUrl) {
            updateStatus('FALLBACK MODE', 'warning');
            updateLoading('FALLBACK MODE...', 'Loading vidsrc.to player');
            
            video.style.display = 'none';
            const iframe = document.createElement('iframe');
            iframe.src = vidsrcUrl;
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            document.getElementById('container').appendChild(iframe);
            hideLoading();
            updateStatus('PLAYING (FALLBACK)', 'warning');
        }

        // Main function - DECODE ONLY, don't open Cloudnestra URL directly
        async function main() {
            // If no URL in params, try to generate from TMDB ID
            if (!cloudnestraUrl) {
                if (tmdbId) {
                    const mediaTypeParam = mediaType || 'movie';
                    const vidsrcUrl = `https://vidsrc.to/embed/${mediaTypeParam}/${tmdbId}`;
                    // Don't open Cloudnestra URL - use vidsrc directly
                    playVidSrcIframe(vidsrcUrl);
                    return;
                } else {
                    // Ask user for input
                    const userInput = prompt('Enter TMDB ID or vidsrc URL:', tmdbId || '');
                    if (userInput) {
                        if (userInput.match(/^\d+$/)) {
                            // It's a TMDB ID
                            const vidsrcUrl = `https://vidsrc.to/embed/movie/${userInput}`;
                            playVidSrcIframe(vidsrcUrl);
                        } else if (userInput.includes('vidsrc.to')) {
                            // It's a vidsrc URL
                            playVidSrcIframe(userInput);
                        } else if (userInput.includes('cloudnestra')) {
                            // It's a Cloudnestra URL - decode it
                            const vidsrcUrl = decodeCloudnestraUrl(userInput);
                            if (vidsrcUrl) {
                                playVidSrcIframe(vidsrcUrl);
                            } else {
                                showError('Invalid Cloudnestra URL');
                            }
                        } else {
                            showError('Please enter a valid TMDB ID or URL');
                        }
                    } else {
                        goBack();
                    }
                    return;
                }
            }
            
            // We have a Cloudnestra URL - decode it and play the vidsrc URL
            updateLoading('DECODING CLOUDNESTRA...', 'Extracting vidsrc URL');
            
            try {
                const vidsrcUrl = decodeCloudnestraUrl(cloudnestraUrl);
                
                if (vidsrcUrl) {
                    // Play the decoded vidsrc URL directly (NOT the Cloudnestra URL!)
                    playVidSrcIframe(vidsrcUrl);
                } else {
                    showError('Failed to decode Cloudnestra URL');
                }
            } catch(e) {
                showError(e.message);
            }
        }

        // Handle fullscreen
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });

        // Start
        main();
    </script>
</body>
</html>
