<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD Cyber Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff9d; --secondary: #7b61ff; --accent: #ff00e5; --dark-bg: #0a0a0f; --cyber-blue: #00ccff; --cyber-yellow: #fff200; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark-bg); color: white; font-family: 'Exo 2', sans-serif; min-height: 100vh; background-size: cover; background-position: center; background-attachment: fixed;}
        .cyber-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; pointer-events: none; }
        .cyber-header { background: rgba(10, 10, 15, 0.95); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); font-family: 'Share Tech Mono', monospace;}
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; font-weight: 700; text-decoration: none; }
        .main-container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .movie-info-panel { background: rgba(19, 19, 31, 0.9); border: 2px solid var(--primary); padding: 25px; margin-bottom: 30px; display: flex; gap: 30px; flex-wrap: wrap; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);}
        .movie-poster img { width: 200px; border: 2px solid var(--primary); }
        .movie-details { flex: 1; min-width: 300px; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .meta-item { display: inline-block; margin-right: 20px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); margin-bottom: 10px;}
        .overview { margin: 20px 0; line-height: 1.6; }
        .player-container { background: #000; border: 3px solid var(--primary); border-radius: 10px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 0 30px rgba(0,255,157,0.3);}
        #stream-frame { width: 100%; height: 650px; border: none; display: none; }
        @keyframes scan { 0% { left: -50%; } 100% { left: 100%; } }
        @media (max-width: 768px) { #stream-frame { height: 400px; } .movie-info-panel { flex-direction: column; align-items: center; text-align: center;} }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>

    <header class="cyber-header">
        <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
        <div style="color: var(--primary);">👤 FRONTEND EXTRACTOR MODE</div>
    </header>

    <div class="main-container" id="content-container" style="display: none;">
        <div class="movie-info-panel">
            <div class="movie-poster">
                <img id="m-poster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title" id="m-title">Loading...</h1>
                <div class="movie-meta">
                    <span class="meta-item">⭐ RATING: <span id="m-rating"></span>/10</span>
                    <span class="meta-item">⏱️ RUNTIME: <span id="m-runtime"></span> min</span>
                    <span class="meta-item">📅 RELEASE: <span id="m-date"></span></span>
                </div>
                <div class="overview" id="m-overview"></div>
            </div>
        </div>

        <div class="player-container">
            <div id="stream-loading" style="text-align: center; padding: 100px 20px; font-family: 'Share Tech Mono', monospace; color: var(--primary);">
                <h2 style="font-family: 'Orbitron', sans-serif; margin-bottom: 15px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.5);">[ ESTABLISHING PROXY CONNECTION ]</h2>
                <p id="loading-status">Routing via AllOrigins to bypass CORS. Scanning for Cloudnestra...</p>
                <div style="width: 200px; height: 2px; background: var(--dark-bg); margin: 20px auto; overflow: hidden; position: relative;">
                    <div style="width: 50%; height: 100%; background: var(--primary); position: absolute; animation: scan 1s linear infinite;"></div>
                </div>
            </div>
            <iframe id="stream-frame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
        </div>
    </div>

    <script>
        const API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');

        if (!tmdbId) {
            document.body.innerHTML = '<h1 style="text-align:center; color:#ff003c; margin-top:50px;">SYSTEM ERROR: NO TMDB ID PROVIDED</h1>';
        } else {
            loadMovieData(tmdbId);
        }

        async function loadMovieData(id) {
            try {
                // Fetch UI Data
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();

                document.getElementById('m-title').textContent = `${movie.title} (${movie.release_date ? movie.release_date.substring(0,4) : ''})`;
                document.getElementById('m-rating').textContent = movie.vote_average.toFixed(1);
                document.getElementById('m-runtime').textContent = movie.runtime || 'N/A';
                document.getElementById('m-date').textContent = movie.release_date || 'N/A';
                document.getElementById('m-overview').textContent = movie.overview;
                document.getElementById('m-poster').src = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/200x300';
                
                if (movie.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                }

                document.getElementById('content-container').style.display = 'block';
                document.title = `MVHD | ${movie.title}`;

                // Extract Cloudnestra via Public Proxy
                const frame = document.getElementById('stream-frame');
                const loadingScreen = document.getElementById('stream-loading');
                const loadingStatus = document.getElementById('loading-status');

                try {
                    const targetUrl = encodeURIComponent(`https://vidsrc.xyz/embed/movie/${id}`);
                    const proxyUrl = `https://api.allorigins.win/get?url=${targetUrl}`;

                    const extractRes = await fetch(proxyUrl);
                    if (!extractRes.ok) throw new Error("Proxy request failed");
                    
                    const proxyData = await extractRes.json();
                    const html = proxyData.contents;

                    const iframeRegex = /iframe[^>]+src=["']([^"']*cloudnestra[^"']*)["']/i;
                    const match = html.match(iframeRegex);

                    if (match && match[1]) {
                        loadingStatus.textContent = "Target acquired. Injecting stream payload...";
                        const finalUrl = match[1].startsWith('http') ? match[1] : `https:${match[1]}`;
                        frame.src = finalUrl; 
                    } else {
                        throw new Error("Cloudnestra node not found in payload");
                    }
                } catch (extractError) {
                    console.error("Extraction failed, engaging fallback protocol:", extractError);
                    loadingStatus.textContent = "Primary route failed (Likely Cloudflare block). Engaging fallback stream...";
                    loadingStatus.style.color = "var(--cyber-yellow)";
                    frame.src = `https://vidsrc.to/embed/movie/${id}`;
                }

                frame.onload = () => {
                    loadingScreen.style.display = 'none';
                    frame.style.display = 'block';
                };

            } catch (error) {
                console.error("Critical Database Error:", error);
            }
        }
    </script>
</body>
</html>
