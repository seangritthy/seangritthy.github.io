<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3;
        }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }
        
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; text-decoration: none; }
        
        .user-badge { padding: 8px 15px; background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary); font-size: 0.9rem; color: var(--primary); font-family: 'Share Tech Mono', monospace; }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; display: none; }
        
        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border);
            padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; display: flex; gap: 30px; flex-wrap: wrap;
        }
        
        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); }
        .movie-details { flex: 1; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); }
        .overview { margin: 20px 0; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }

        .player-container {
            background: var(--player-bg); border: 3px solid var(--primary); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px;
        }

        #direct-player { width: 100%; height: 650px; outline: none; background: #000; display: none; }
        #fallback-frame { width: 100%; height: 650px; border: none; display: none; }

        .server-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .server-btn {
            padding: 12px 24px;
            background: rgba(19, 19, 31, 0.9);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
        }
        
        .server-btn:hover, .server-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column;
        }
        
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .loading-bar { width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 2s infinite; }
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }
        
        .loading-step {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }
        
        .back-button {
            display: inline-block; margin-top: 20px; padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none; font-family: 'Orbitron', sans-serif;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--primary);
            font-family: 'Share Tech Mono', monospace;
            border-radius: 8px;
        }
        
        @media (max-width: 768px) { #direct-player, #fallback-frame { height: 400px; } .movie-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-text" id="loading-msg">INITIALIZING MAINFRAME...</div>
            <div class="loading-bar"></div>
            <div class="loading-step" id="loadingStep">Connecting to Cloudnestra...</div>
        </div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
            <div class="user-badge" id="statusBadge">🎬 CLOUDNESTRA EXTRACTOR</div>
        </div>
    </header>

    <div class="main-container" id="main-content">
        <div class="movie-info-panel">
            <div class="movie-poster">
                <img id="m-poster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="m-title">Title</span> <span id="m-year"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="m-rating"></span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="m-runtime"></span></div>
                </div>
                <div class="overview" id="m-overview"></div>
                <a href="index.html" class="back-button">← BACK TO CINEMA</a>
            </div>
        </div>

        <div class="server-selector" id="serverSelector">
            <button class="server-btn active" data-server="cloudnestra">☁️ Cloudnestra (Direct)</button>
            <button class="server-btn" data-server="2embed">🎬 2Embed (Backup)</button>
            <button class="server-btn" data-server="autoembed">🔄 AutoEmbed</button>
            <button class="server-btn" data-server="multiembed">📺 MultiEmbed</button>
        </div>

        <div class="player-container">
            <video id="direct-player" controls preload="auto" playsinline></video>
            <iframe id="fallback-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        // Public API endpoints that can decode Cloudnestra URLs
        const CLOUDNESTRA_API = 'https://cors-anywhere.herokuapp.com/https://vidsrc.to/embed/movie/';
        
        let currentMovieId = null;
        let currentType = 'movie';
        let currentVideoUrl = null;

        function updateLoading(msg, step) {
            document.getElementById('loading-msg').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 500);
        }

        // Decode Cloudnestra base64 URL
        function decodeCloudnestraUrl(cloudnestraUrl) {
            try {
                const match = cloudnestraUrl.match(/\/rcp\/([^?&"'>]+)/);
                if (!match) return null;
                
                let encoded = match[1];
                encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
                while (encoded.length % 4) encoded += '=';
                
                const decoded = atob(encoded);
                console.log('Decoded:', decoded.substring(0, 200));
                
                // Find m3u8 URL
                const patterns = [
                    /(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\.mp4[^\s"']*)/i,
                    /(https?:\/\/[^\s"']+\/master[^\s"']*\.m3u8)/i,
                    /(https?:\/\/[^\s"']+\/playlist[^\s"']*\.m3u8)/i
                ];
                
                for (const pattern of patterns) {
                    const videoMatch = decoded.match(pattern);
                    if (videoMatch) return videoMatch[1];
                }
                
                return decoded.startsWith('http') ? decoded : null;
            } catch(e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        // Method 1: Try to get Cloudnestra URL via public API
        async function getCloudnestraUrl(tmdbId) {
            updateLoading("CONNECTING TO CLOUDNESTRA...", "Fetching encrypted stream URL");
            
            // Try multiple embed sources that might contain Cloudnestra
            const sources = [
                `https://vidsrc.to/embed/movie/${tmdbId}`,
                `https://vidsrc.xyz/embed/movie/${tmdbId}`,
                `https://vidsrc.net/embed/movie/${tmdbId}`
            ];
            
            // Use CORS proxies that still work
            const proxies = [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?',
                'https://cors-anywhere.herokuapp.com/'
            ];
            
            for (const source of sources) {
                for (const proxy of proxies) {
                    try {
                        updateLoading("SCANNING CLOUDNESTRA...", `Checking ${source.split('/')[2]} via proxy`);
                        const proxyUrl = proxy + encodeURIComponent(source);
                        const response = await fetch(proxyUrl, { timeout: 10000 });
                        if (!response.ok) continue;
                        
                        const html = await response.text();
                        
                        // Look for Cloudnestra URL
                        const cloudMatch = html.match(/https?:\/\/[^\s"']*cloudnestra[^\s"']*\/rcp\/[^\s"']+/i);
                        if (cloudMatch) {
                            updateLoading("CLOUDNESTRA FOUND!", "Decoding stream URL");
                            const videoUrl = decodeCloudnestraUrl(cloudMatch[0]);
                            if (videoUrl) return videoUrl;
                        }
                        
                        // Look for any rcp URL
                        const rcpMatch = html.match(/["']([^"']*\/rcp\/[^"']+)["']/i);
                        if (rcpMatch) {
                            let rcpUrl = rcpMatch[1];
                            if (!rcpUrl.startsWith('http')) rcpUrl = 'https:' + rcpUrl;
                            const videoUrl = decodeCloudnestraUrl(rcpUrl);
                            if (videoUrl) return videoUrl;
                        }
                    } catch(e) {
                        console.log(`Failed: ${source} via ${proxy}`);
                    }
                }
            }
            return null;
        }

        // Method 2: Direct 2Embed (works as fallback)
        function get2EmbedUrl(tmdbId) {
            return `https://www.2embed.cc/embed/${tmdbId}`;
        }

        function getAutoEmbedUrl(tmdbId) {
            return `https://autoembed.to/movie/tmdb/${tmdbId}`;
        }

        function getMultiEmbedUrl(tmdbId) {
            return `https://multiembed.mov/video/${tmdbId}`;
        }

        async function loadCloudnestraStream(id) {
            const videoPlayer = document.getElementById('direct-player');
            const fallbackFrame = document.getElementById('fallback-frame');
            const statusBadge = document.getElementById('statusBadge');
            
            videoPlayer.style.display = 'none';
            fallbackFrame.style.display = 'none';
            
            try {
                const videoUrl = await getCloudnestraUrl(id);
                
                if (videoUrl && videoUrl.includes('.m3u8')) {
                    console.log('Cloudnestra extracted:', videoUrl);
                    videoPlayer.style.display = 'block';
                    statusBadge.innerHTML = `☁️ CLOUDNESTRA EXTRACTED • HLS STREAM`;
                    
                    if (Hls.isSupported()) {
                        const hls = new Hls({
                            debug: false,
                            enableWorker: true,
                            manifestLoadingTimeOut: 15000
                        });
                        hls.loadSource(videoUrl);
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            videoPlayer.play().catch(e => console.log('Autoplay blocked'));
                        });
                    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                        videoPlayer.src = videoUrl;
                    }
                    hideLoading();
                    return true;
                } else if (videoUrl && videoUrl.includes('.mp4')) {
                    videoPlayer.style.display = 'block';
                    videoPlayer.src = videoUrl;
                    statusBadge.innerHTML = `☁️ CLOUDNESTRA EXTRACTED • MP4 STREAM`;
                    hideLoading();
                    return true;
                }
            } catch(e) {
                console.error('Cloudnestra extraction failed:', e);
            }
            return false;
        }

        async function loadMovie(id, type) {
            try {
                updateLoading("FETCHING MOVIE DATA...", "Loading from TMDB");
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();

                document.title = `MVHD | ${movie.title || movie.name}`;
                document.getElementById('m-title').textContent = movie.title || movie.name;
                
                const year = (movie.release_date || movie.first_air_date || '').substring(0,4);
                document.getElementById('m-year').textContent = year ? `(${year})` : '';
                document.getElementById('m-rating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('m-runtime').textContent = movie.runtime ? `${movie.runtime} min` : 'N/A';
                document.getElementById('m-overview').textContent = movie.overview || 'No description available.';
                document.getElementById('m-poster').src = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/300x450/1a1a1a/ffffff?text=MVHD';
                
                document.getElementById('main-content').style.display = 'block';
                
                // Try Cloudnestra first
                const cloudnestraSuccess = await loadCloudnestraStream(id);
                
                if (!cloudnestraSuccess) {
                    // Fallback to 2Embed
                    updateLoading("CLOUDNESTRA UNAVAILABLE", "Using fallback server");
                    setTimeout(() => {
                        loadServer('2embed', id, type);
                        hideLoading();
                    }, 1000);
                }
                
            } catch (error) {
                console.error(error);
                updateLoading("ERROR", "Loading fallback player");
                setTimeout(() => {
                    loadServer('2embed', id, type);
                    hideLoading();
                }, 1000);
            }
        }
        
        function loadServer(serverKey, id, type) {
            const videoPlayer = document.getElementById('direct-player');
            const fallbackFrame = document.getElementById('fallback-frame');
            const statusBadge = document.getElementById('statusBadge');
            
            videoPlayer.style.display = 'none';
            fallbackFrame.style.display = 'block';
            
            let url = '';
            switch(serverKey) {
                case '2embed':
                    url = `https://www.2embed.cc/embed/${id}`;
                    statusBadge.innerHTML = `🎬 2EMBED • FALLBACK MODE`;
                    break;
                case 'autoembed':
                    url = `https://autoembed.to/movie/tmdb/${id}`;
                    statusBadge.innerHTML = `🔄 AUTOEMBED • FALLBACK MODE`;
                    break;
                case 'multiembed':
                    url = `https://multiembed.mov/video/${id}`;
                    statusBadge.innerHTML = `📺 MULTIEMBED • FALLBACK MODE`;
                    break;
                default:
                    url = `https://www.2embed.cc/embed/${id}`;
            }
            
            fallbackFrame.src = url;
            
            document.querySelectorAll('.server-btn').forEach(btn => {
                if (btn.dataset.server === serverKey) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Server button handlers
        document.querySelectorAll('.server-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const serverKey = btn.dataset.server;
                if (currentMovieId) {
                    if (serverKey === 'cloudnestra') {
                        loadCloudnestraStream(currentMovieId);
                    } else {
                        loadServer(serverKey, currentMovieId, currentType);
                    }
                }
            });
        });

        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        
        if (tmdbId) {
            currentMovieId = tmdbId;
            currentType = mediaType;
            loadMovie(tmdbId, mediaType);
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
