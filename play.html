<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVHD | Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: monospace;
        }
        .player-container {
            width: 100%;
            height: 100vh;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #00ff9d;
            padding: 8px;
            font-size: 12px;
            text-align: center;
            z-index: 1000;
            font-family: monospace;
        }
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #00ff9d;
            padding: 10px 15px;
            text-decoration: none;
            z-index: 1000;
            font-family: monospace;
            border: 1px solid #00ff9d;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff9d;
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,157,0.2);
            border-top-color: #00ff9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← BACK</a>
    <div class="player-container">
        <iframe id="playerFrame" src="" allowfullscreen></iframe>
    </div>
    <div class="info" id="info">Loading stream...</div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>INITIALIZING STREAM...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const title = urlParams.get('title') || 'Movie';
        
        document.title = `MVHD | ${title}`;
        
        function generateCloudUrl(id) {
            const vidsrcUrl = `https://vidsrc.to/embed/movie/${id}`;
            const encoded = btoa(vidsrcUrl);
            return `https://cloudorchestranova.com/rcp/${encoded}`;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading');
            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 500);
        }
        
        if (tmdbId) {
            const cloudUrl = generateCloudUrl(tmdbId);
            document.getElementById('info').innerHTML = `🎬 ${title} • ${cloudUrl.substring(0, 80)}...`;
            document.getElementById('playerFrame').src = cloudUrl;
            
            document.getElementById('playerFrame').onload = hideLoading;
            setTimeout(hideLoading, 5000);
        } else {
            document.getElementById('info').innerHTML = 'ERROR: No TMDB ID provided';
            document.getElementById('loading').innerHTML = '<div>ERROR: Invalid request</div>';
        }
    </script>
</body>
</html>
