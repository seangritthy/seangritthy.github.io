<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
            --player-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3; pointer-events: none;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2; pointer-events: none;
            animation: scanlines 10s linear infinite;
        }
        
        @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }
        
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; text-decoration: none; }
        
        .user-badge { padding: 8px 15px; background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary); font-size: 0.9rem; color: var(--primary); font-family: 'Share Tech Mono', monospace; }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; display: none; }
        
        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border);
            padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; overflow: hidden; display: flex; gap: 30px; flex-wrap: wrap;
        }
        
        .movie-info-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite; background-size: 200% 100%;
        }
        
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        .movie-details { flex: 1; min-width: 300px; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.7); }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); }
        .overview { margin: 20px 0; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }

        .player-container {
            background: var(--player-bg); border: 3px solid var(--primary); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px; position: relative;
        }
        
        .player-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite; z-index: 2;
        }
        
        #stream-frame { width: 100%; height: 650px; border: none; display: none; }
        #direct-player { width: 100%; height: 650px; outline: none; display: none; background: #000; }

        .status-badges { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .status-badge {
            padding: 12px 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; letter-spacing: 1px;
            display: inline-flex; align-items: center; gap: 10px;
        }
        
        .badge-primary { background: rgba(0, 255, 157, 0.1); border: 2px solid var(--primary); color: var(--primary); box-shadow: 0 0 10px rgba(0,255,157,0.3);}
        .badge-warning { background: rgba(255, 242, 0, 0.1); border: 2px solid var(--cyber-yellow); color: var(--cyber-yellow); }
        .badge-success { background: rgba(0, 204, 255, 0.1); border: 2px solid var(--cyber-blue); color: var(--cyber-blue); }
        .badge-error { background: rgba(255, 0, 60, 0.1); border: 2px solid var(--cyber-red); color: var(--cyber-red); }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s;
        }
        
        .loading-content { text-align: center; }
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 30px; text-shadow: 0 0 20px rgba(0, 255, 157, 0.7); animation: loadingText 2s infinite; }
        
        @keyframes loadingText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .loading-bar { width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 2s infinite; }
        
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }
        
        .back-button {
            display: inline-block; margin-top: 20px; padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none; font-family: 'Orbitron', sans-serif;
            transition: all 0.3s;
        }
        
        .back-button:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        
        .extraction-details {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            display: none;
        }
        
        .extraction-details.active {
            display: block;
        }
        
        @media (max-width: 768px) { #stream-frame, #direct-player { height: 400px; } .movie-title { font-size: 1.8rem; } .main-container { padding: 120px 15px 30px; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-text" id="loading-msg">INITIALIZING MAINFRAME...</div>
            <div class="loading-bar"></div>
            <div id="loading-detail" style="margin-top: 20px; font-size: 12px; color: #888;"></div>
        </div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
            <div class="user-info">
                <div class="user-badge">👤 CLOUDNESTRA EXTRACTOR V2</div>
            </div>
        </div>
    </header>

    <div class="main-container" id="main-content">
        <div class="movie-info-panel">
            <div class="movie-poster">
                <img id="m-poster" src="" alt="Poster" onerror="this.src='https://via.placeholder.com/300x450/1a1a1a/ffffff?text=MVHD'">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="m-title">Title</span> <span style="color: var(--cyber-yellow); font-size: 1.5rem;" id="m-year"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">
                        <span style="color: var(--cyber-yellow)">⭐</span>
                        <span>RATING: <span id="m-rating"></span>/10</span>
                    </div>
                    <div class="meta-item">
                        <span style="color: var(--primary)">⏱️</span>
                        <span>RUNTIME: <span id="m-runtime"></span></span>
                    </div>
                </div>
                <div class="overview" id="m-overview"></div>
                <a href="index.html" class="back-button">← BACK TO CINEMA</a>
            </div>
        </div>

        <div class="player-container">
            <iframe id="stream-frame" src="" allowfullscreen loading="lazy"></iframe>
            <video id="direct-player" controls preload="auto" playsinline></video>
        </div>

        <div class="status-badges">
            <div class="status-badge badge-warning" id="badge-player">
                ⚠️ EXTRACTING STREAM...
            </div>
            <div class="status-badge badge-success" id="badge-tmdb">
                🎬 TMDB ID: SCANNING...
            </div>
        </div>
        
        <div class="extraction-details" id="extractionDetails">
            <strong>🔧 EXTRACTION LOG:</strong>
            <div id="extractionLog"></div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        let extractionAttempts = 0;
        let currentVideoUrl = null;

        // Helper function to add extraction log
        function addLog(message, isError = false) {
            const logDiv = document.getElementById('extractionLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            logEntry.style.color = isError ? 'var(--cyber-red)' : 'var(--cyber-blue)';
            logEntry.style.marginBottom = '5px';
            logDiv.appendChild(logEntry);
            document.getElementById('extractionDetails').classList.add('active');
            console.log(message);
        }

        function updateLoadingMessage(msg, detail = '') {
            document.getElementById('loading-msg').textContent = msg;
            document.getElementById('loading-detail').textContent = detail;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tmdbId = urlParams.get('tmdb');

            if (!tmdbId) {
                updateLoadingMessage("ERROR: INVALID TMDB ID");
                setTimeout(() => { window.location.href = 'index.html'; }, 3000);
            } else {
                document.getElementById('badge-tmdb').innerHTML = `🎬 TMDB ID: ${tmdbId}`;
                fetchMovieAndStream(tmdbId);
            }
        });

        function hideLoading() {
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 500);
        }

        // Decode Cloudnestra RCP URL (base64)
        function decodeCloudnestraUrl(cloudnestraUrl) {
            try {
                addLog(`Decoding Cloudnestra URL: ${cloudnestraUrl.substring(0, 100)}...`);
                const encodedPart = cloudnestraUrl.split('/rcp/')[1];
                if (!encodedPart) {
                    addLog("No /rcp/ part found in URL", true);
                    return null;
                }
                
                // Fix base64 URL-safe encoding
                let base64 = encodedPart.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) {
                    base64 += '=';
                }
                
                const decoded = atob(base64);
                addLog(`Decoded content length: ${decoded.length} chars`);
                
                // Look for m3u8 URL
                const m3u8Match = decoded.match(/(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i);
                if (m3u8Match) {
                    addLog(`Found m3u8 URL: ${m3u8Match[1].substring(0, 80)}...`);
                    return m3u8Match[1];
                }
                
                // Look for mp4 URL
                const mp4Match = decoded.match(/(https?:\/\/[^\s"']+\.mp4[^\s"']*)/i);
                if (mp4Match) {
                    addLog(`Found mp4 URL: ${mp4Match[1].substring(0, 80)}...`);
                    return mp4Match[1];
                }
                
                // Look for master playlist
                const masterMatch = decoded.match(/(https?:\/\/[^\s"']+\/master[^\s"']*\.m3u8[^\s"']*)/i);
                if (masterMatch) {
                    addLog(`Found master playlist: ${masterMatch[1].substring(0, 80)}...`);
                    return masterMatch[1];
                }
                
                // Look for any URL containing m3u8
                const anyM3u8 = decoded.match(/(https?:\/\/[^\s"']+[^\s"']*\.m3u8[^\s"']*)/i);
                if (anyM3u8) {
                    addLog(`Found m3u8 (any): ${anyM3u8[1].substring(0, 80)}...`);
                    return anyM3u8[1];
                }
                
                addLog("No video URL pattern found in decoded content", true);
                return null;
            } catch (e) {
                addLog(`Decode error: ${e.message}`, true);
                return null;
            }
        }

        // Method 1: Use a CORS proxy to fetch the page
        async function extractWithProxy(tmdbId) {
            addLog(`Method 1: Fetching from vidsrc.to via proxy...`);
            updateLoadingMessage("EXTRACTING VIA PROXY...", "Connecting to vidsrc.to");
            
            const proxyUrls = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(`https://vidsrc.to/embed/movie/${tmdbId}`)}`,
                `https://corsproxy.io/?${encodeURIComponent(`https://vidsrc.to/embed/movie/${tmdbId}`)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(`https://vidsrc.to/embed/movie/${tmdbId}`)}`
            ];
            
            for (const proxyUrl of proxyUrls) {
                try {
                    addLog(`Trying proxy: ${proxyUrl.substring(0, 60)}...`);
                    const response = await fetch(proxyUrl);
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    const html = data.contents || data;
                    
                    // Look for Cloudnestra URL
                    const cloudnestraMatch = html.match(/(?:src|href)=["']([^"']*cloudnestra[^"']*\/rcp\/[^"']*)["']/i);
                    if (cloudnestraMatch) {
                        let rcpUrl = cloudnestraMatch[1];
                        if (!rcpUrl.startsWith('http')) rcpUrl = 'https:' + rcpUrl;
                        addLog(`Found Cloudnestra URL: ${rcpUrl.substring(0, 80)}...`);
                        
                        const videoUrl = decodeCloudnestraUrl(rcpUrl);
                        if (videoUrl) {
                            return videoUrl;
                        }
                    }
                    
                    // Look for direct m3u8
                    const directM3u8 = html.match(/(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i);
                    if (directM3u8) {
                        addLog(`Found direct m3u8: ${directM3u8[1].substring(0, 80)}...`);
                        return directM3u8[1];
                    }
                    
                } catch (e) {
                    addLog(`Proxy failed: ${e.message}`, true);
                }
            }
            return null;
        }

        // Method 2: Alternative embed source (2embed)
        async function extractFrom2Embed(tmdbId) {
            addLog(`Method 2: Trying 2embed.cc...`);
            updateLoadingMessage("TRYING ALTERNATIVE SOURCE...", "2embed.cc");
            
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.2embed.cc/embed/${tmdbId}`)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) return null;
                
                const data = await response.json();
                const html = data.contents;
                
                // Look for iframe with cloudnestra
                const iframeMatch = html.match(/<iframe[^>]+src=["']([^"']+cloudnestra[^"']+)["']/i);
                if (iframeMatch) {
                    const rcpUrl = iframeMatch[1];
                    addLog(`Found Cloudnestra in iframe: ${rcpUrl.substring(0, 80)}...`);
                    const videoUrl = decodeCloudnestraUrl(rcpUrl);
                    if (videoUrl) return videoUrl;
                }
                
                // Look for direct video source
                const sourceMatch = html.match(/<source[^>]+src=["']([^"']+\.m3u8[^"']+)["']/i);
                if (sourceMatch) {
                    addLog(`Found source tag: ${sourceMatch[1]}`);
                    return sourceMatch[1];
                }
                
                return null;
            } catch (e) {
                addLog(`2Embed failed: ${e.message}`, true);
                return null;
            }
        }

        // Method 3: Direct API endpoint (if available)
        async function extractFromApi(tmdbId) {
            addLog(`Method 3: Trying moviesapi.xyz...`);
            updateLoadingMessage("CHECKING API...", "moviesapi.xyz");
            
            try {
                const apiUrl = `https://moviesapi.xyz/api/v2/embed/movie?tmdb=${tmdbId}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) return null;
                
                const data = await response.json();
                const content = data.contents;
                
                // Try to parse as JSON
                try {
                    const json = JSON.parse(content);
                    if (json.url) {
                        addLog(`API returned URL: ${json.url}`);
                        return json.url;
                    }
                } catch(e) {}
                
                // Look for m3u8 in response
                const m3u8Match = content.match(/(https?:\/\/[^\s"']+\.m3u8[^\s"']*)/i);
                if (m3u8Match) return m3u8Match[1];
                
                return null;
            } catch (e) {
                addLog(`API failed: ${e.message}`, true);
                return null;
            }
        }

        async function fetchMovieAndStream(id) {
            try {
                updateLoadingMessage("FETCHING TMDB DATABASE...", "Loading movie details");
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();

                document.title = `MVHD | ${movie.title}`;
                document.getElementById('page-title').textContent = `MVHD | ${movie.title}`;
                document.getElementById('m-title').textContent = movie.title;
                document.getElementById('m-year').textContent = movie.release_date ? `(${movie.release_date.substring(0,4)})` : '';
                document.getElementById('m-rating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('m-runtime').textContent = movie.runtime ? `${movie.runtime} min` : 'N/A';
                document.getElementById('m-overview').textContent = movie.overview || 'No description available.';
                document.getElementById('m-poster').src = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/300x450/1a1a1a/ffffff?text=MVHD';
                
                if (movie.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundAttachment = 'fixed';
                }

                document.getElementById('main-content').style.display = 'block';

                const iframeElement = document.getElementById('stream-frame');
                const videoElement = document.getElementById('direct-player');
                const playerBadge = document.getElementById('badge-player');

                // Try multiple extraction methods
                updateLoadingMessage("EXTRACTING CLOUDNESTRA STREAM...", "Method 1/4");
                let videoUrl = await extractWithProxy(id);
                
                if (!videoUrl) {
                    updateLoadingMessage("METHOD 1 FAILED...", "Trying method 2/4");
                    videoUrl = await extractFrom2Embed(id);
                }
                
                if (!videoUrl) {
                    updateLoadingMessage("METHOD 2 FAILED...", "Trying method 3/4");
                    videoUrl = await extractFromApi(id);
                }
                
                if (!videoUrl) {
                    updateLoadingMessage("METHOD 3 FAILED...", "Using fallback iframe");
                    addLog("All extraction methods failed. Using fallback iframe.", true);
                    
                    // Fallback: Use iframe directly
                    videoElement.style.display = 'none';
                    iframeElement.style.display = 'block';
                    iframeElement.src = `https://vidsrc.to/embed/movie/${id}`;
                    playerBadge.className = "status-badge badge-warning";
                    playerBadge.innerHTML = "⚠️ FALLBACK PLAYER • VIDSRC EMBED";
                    iframeElement.onload = hideLoading;
                    setTimeout(hideLoading, 5000);
                    return;
                }
                
                // Success! Play the extracted URL
                addLog(`SUCCESS! Extracted video URL: ${videoUrl.substring(0, 100)}...`);
                updateLoadingMessage("STREAM ACQUIRED!", "Starting player");
                
                iframeElement.style.display = 'none';
                videoElement.style.display = 'block';
                playerBadge.className = "status-badge badge-primary";
                playerBadge.innerHTML = "🚀 CLOUDNESTRA STREAM EXTRACTED • PLAYING";
                
                currentVideoUrl = videoUrl;
                
                if (videoUrl.includes('.m3u8')) {
                    addLog("Initializing HLS.js for m3u8 stream...");
                    if (Hls.isSupported()) {
                        const hls = new Hls({
                            debug: false,
                            enableWorker: true,
                            lowLatencyMode: true,
                            manifestLoadingTimeOut: 30000,
                            manifestLoadingMaxRetry: 3
                        });
                        hls.loadSource(videoUrl);
                        hls.attachMedia(videoElement);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            addLog("HLS manifest loaded, playing...");
                            videoElement.play().catch(e => addLog(`Play error: ${e.message}`, true));
                        });
                        hls.on(Hls.Events.ERROR, (event, data) => {
                            addLog(`HLS Error: ${data.type} - ${data.details}`, true);
                        });
                    } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                        videoElement.src = videoUrl;
                    } else {
                        addLog("HLS not supported, using iframe fallback", true);
                        iframeElement.style.display = 'block';
                        videoElement.style.display = 'none';
                        iframeElement.src = videoUrl;
                    }
                } else {
                    videoElement.src = videoUrl;
                }
                
                hideLoading();
                
            } catch (error) {
                console.error(error);
                addLog(`CRITICAL ERROR: ${error.message}`, true);
                updateLoadingMessage("CRITICAL MAINFRAME ERROR", error.message);
                setTimeout(() => { window.location.href = 'index.html'; }, 5000);
            }
        }
    </script>
</body>
</html>
