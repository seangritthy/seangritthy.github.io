<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="page-title">MVHD | CyberCinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #7b61ff;
            --accent: #ff00e5;
            --dark-bg: #0a0a0f;
            --dark-card: #13131f;
            --neon-glow: 0 0 20px rgba(0, 255, 157, 0.5);
            --pixel-border: 2px solid var(--primary);
            --cyber-red: #ff003c;
            --cyber-blue: #00ccff;
            --cyber-yellow: #fff200;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg); color: white;
            font-family: 'Exo 2', sans-serif; min-height: 100vh;
        }

        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 157, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 97, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1; opacity: 0.3;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: -1; opacity: 0.2;
            pointer-events: none;
            animation: scanlines 10s linear infinite;
        }
        
        @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        .cyber-header {
            position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px); padding: 15px 0; z-index: 1000; border-bottom: var(--pixel-border);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
        }
        
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        
        .site-title { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 157, 0.7); font-weight: 700; text-decoration: none; }
        
        .user-badge { padding: 8px 15px; background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary); font-size: 0.9rem; color: var(--primary); font-family: 'Share Tech Mono', monospace; }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px 40px; display: none; }
        
        .movie-info-panel {
            background: rgba(19, 19, 31, 0.9); backdrop-filter: blur(10px); border: var(--pixel-border);
            padding: 25px; margin-bottom: 30px; box-shadow: var(--neon-glow); position: relative; display: flex; gap: 30px; flex-wrap: wrap;
        }
        
        .movie-info-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--cyber-red), var(--primary), var(--cyber-blue));
            animation: rainbow 3s linear infinite;
        }
        
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .movie-poster { flex: 0 0 200px; }
        .movie-poster img { width: 100%; height: auto; border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
        .movie-details { flex: 1; }
        .movie-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 157, 0.7); }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .meta-item { display: flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; color: var(--cyber-blue); }
        .overview { margin: 20px 0; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }

        .player-container {
            background: #000; border: 3px solid var(--primary); border-radius: 10px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.3); margin-bottom: 30px; position: relative;
        }
        
        .player-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-yellow), var(--primary), var(--cyber-blue), var(--accent));
            animation: rainbow 3s linear infinite; z-index: 2;
        }
        
        iframe { width: 100%; height: 650px; border: none; display: block; }

        .server-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .server-btn {
            padding: 12px 24px;
            background: rgba(19, 19, 31, 0.9);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
        }
        
        .server-btn:hover, .server-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column;
        }
        
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .loading-bar { width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loading 2s infinite; }
        @keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }
        
        .loading-step {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }
        
        .back-button {
            display: inline-block; margin-top: 20px; padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1); border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none; font-family: 'Orbitron', sans-serif;
            transition: all 0.3s;
        }
        
        .back-button:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
        
        @media (max-width: 768px) { iframe { height: 400px; } .movie-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-text" id="loading-msg">INITIALIZING MAINFRAME...</div>
            <div class="loading-bar"></div>
            <div class="loading-step" id="loadingStep">Loading movie data...</div>
        </div>
    </div>

    <header class="cyber-header">
        <div class="header-content">
            <a href="index.html" class="site-title">MVHD CYBERCINEMA</a>
            <div class="user-badge" id="statusBadge">🎬 MULTI-SOURCE PLAYER</div>
        </div>
    </header>

    <div class="main-container" id="main-content">
        <div class="movie-info-panel">
            <div class="movie-poster">
                <img id="m-poster" src="" alt="Poster">
            </div>
            <div class="movie-details">
                <h1 class="movie-title"><span id="m-title">Title</span> <span id="m-year"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item">⭐ RATING: <span id="m-rating"></span>/10</div>
                    <div class="meta-item">⏱️ RUNTIME: <span id="m-runtime"></span></div>
                </div>
                <div class="overview" id="m-overview"></div>
                <a href="index.html" class="back-button">← BACK TO CINEMA</a>
            </div>
        </div>

        <div class="server-selector" id="serverSelector">
            <button class="server-btn active" data-server="vidsrc">🎬 VidSrc.to</button>
            <button class="server-btn" data-server="vidsrc2">🎬 VidSrc.xyz</button>
            <button class="server-btn" data-server="vidsrc3">🎬 VidSrc.net</button>
            <button class="server-btn" data-server="embed2">📺 2Embed</button>
            <button class="server-btn" data-server="autoembed">🔄 AutoEmbed</button>
            <button class="server-btn" data-server="multiembed">📺 MultiEmbed</button>
        </div>

        <div class="player-container">
            <iframe id="playerFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '5e10bf06e4f15dae6e9ff35ff35e8df2';
        
        let currentMovieId = null;
        let currentType = 'movie';
        
        // Server configurations - multiple sources for redundancy
        const servers = {
            vidsrc: {
                name: 'VidSrc.to',
                getUrl: (id, type) => `https://vidsrc.to/embed/${type}/${id}`
            },
            vidsrc2: {
                name: 'VidSrc.xyz',
                getUrl: (id, type) => `https://vidsrc.xyz/embed/${type}/${id}`
            },
            vidsrc3: {
                name: 'VidSrc.net',
                getUrl: (id, type) => `https://vidsrc.net/embed/${type}/${id}`
            },
            embed2: {
                name: '2Embed',
                getUrl: (id, type) => `https://www.2embed.cc/embed/${id}`
            },
            autoembed: {
                name: 'AutoEmbed',
                getUrl: (id, type) => `https://autoembed.to/${type}/tmdb/${id}`
            },
            multiembed: {
                name: 'MultiEmbed',
                getUrl: (id, type) => `https://multiembed.mov/video/${id}`
            }
        };
        
        function hideLoading() {
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 500);
        }
        
        function updateLoading(msg, step) {
            document.getElementById('loading-msg').textContent = msg;
            if (step) document.getElementById('loadingStep').textContent = step;
        }

        async function loadMovie(id, type) {
            try {
                updateLoading("FETCHING MOVIE DATA...", "Loading from TMDB");
                const tmdbRes = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await tmdbRes.json();

                document.title = `MVHD | ${movie.title || movie.name}`;
                document.getElementById('m-title').textContent = movie.title || movie.name;
                
                const year = (movie.release_date || movie.first_air_date || '').substring(0,4);
                document.getElementById('m-year').textContent = year ? `(${year})` : '';
                document.getElementById('m-rating').textContent = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
                document.getElementById('m-runtime').textContent = movie.runtime ? `${movie.runtime} min` : (movie.episode_run_time?.[0] ? `${movie.episode_run_time[0]} min` : 'N/A');
                document.getElementById('m-overview').textContent = movie.overview || 'No description available.';
                document.getElementById('m-poster').src = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/300x450/1a1a1a/ffffff?text=MVHD';
                
                if (movie.backdrop_path) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(10,10,15,0.9), rgba(10,10,15,0.9)), url('https://image.tmdb.org/t/p/original${movie.backdrop_path}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundAttachment = 'fixed';
                }

                document.getElementById('main-content').style.display = 'block';
                document.getElementById('statusBadge').innerHTML = `🎬 ${movie.title || movie.name}`;
                
                // Load default server
                loadServer('vidsrc', id, type);
                hideLoading();
                
            } catch (error) {
                console.error(error);
                document.getElementById('loading-msg').textContent = 'ERROR LOADING MOVIE';
                document.getElementById('loadingStep').textContent = error.message;
                setTimeout(() => { window.location.href = 'index.html'; }, 3000);
            }
        }
        
        function loadServer(serverKey, id, type) {
            const server = servers[serverKey];
            if (!server) return;
            
            const frame = document.getElementById('playerFrame');
            const url = server.getUrl(id, type);
            frame.src = url;
            
            document.getElementById('statusBadge').innerHTML = `🎬 ${server.name} • ${id}`;
            
            // Highlight active button
            document.querySelectorAll('.server-btn').forEach(btn => {
                if (btn.dataset.server === serverKey) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Server button handlers
        document.querySelectorAll('.server-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const serverKey = btn.dataset.server;
                if (currentMovieId) {
                    loadServer(serverKey, currentMovieId, currentType);
                }
            });
        });

        // Get TMDB ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb');
        const mediaType = urlParams.get('type') || 'movie';
        
        if (tmdbId) {
            currentMovieId = tmdbId;
            currentType = mediaType;
            loadMovie(tmdbId, mediaType);
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
