<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub Movies logo">
  <defs>
    <linearGradient id="bg" x1="24" y1="20" x2="224" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="56" y1="46" x2="200" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="shine" x1="80" y1="84" x2="176" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#cbd5e1" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)"/>
    <rect x="22" y="22" width="212" height="212" rx="46" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.8"/>
  </g>

  <g transform="translate(32 34)">
    <rect x="22" y="18" width="148" height="132" rx="24" fill="#0b1325" stroke="url(#accent)" stroke-width="6"/>
    <rect x="22" y="18" width="148" height="30" rx="20" fill="#111b32"/>

    <circle cx="46" cy="33" r="6" fill="#22d3ee"/>
    <circle cx="64" cy="33" r="6" fill="#22d3ee" opacity="0.82"/>
    <circle cx="82" cy="33" r="6" fill="#22d3ee" opacity="0.62"/>
    <rect x="98" y="28" width="58" height="10" rx="5" fill="#334155"/>

    <circle cx="96" cy="92" r="34" fill="none" stroke="url(#shine)" stroke-width="8"/>
    <polygon points="88,74 88,110 118,92" fill="url(#shine)"/>

    <circle cx="150" cy="152" r="18" fill="none" stroke="#38bdf8" stroke-width="5"/>
    <circle cx="150" cy="152" r="4" fill="#38bdf8"/>
    <line x1="150" y1="134" x2="150" y2="124" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <line x1="150" y1="170" x2="150" y2="180" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <line x1="132" y1="152" x2="122" y2="152" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <line x1="168" y1="152" x2="178" y2="152" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>