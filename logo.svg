<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bitcoin Movies logo">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b3a9d9"/>
      <stop offset="100%" stop-color="#7f95bf"/>
    </linearGradient>
    <style>
      .soft-glow { filter: drop-shadow(0 0 5px rgba(127, 149, 191, 0.45)); }
      .frame { fill: #0f1628; stroke: url(#ring); stroke-width: 2; }
      .coin { fill: #111b31; stroke: #7f95bf; stroke-width: 2; }
      .btc { fill: #b3a9d9; font: 700 36px 'Orbitron', sans-serif; }
      .play { fill: #d9a786; opacity: 0.92; }
      .detail { stroke: #7f95bf; stroke-width: 1.6; stroke-linecap: round; opacity: 0.8; }
    </style>
  </defs>

  <g class="soft-glow">
    <rect x="6" y="6" width="88" height="88" rx="12" class="frame"/>
    <circle cx="50" cy="50" r="28" class="coin"/>
    <text x="50" y="61" text-anchor="middle" class="btc">₿</text>
    <polygon points="69,44 69,56 78,50" class="play"/>
    <line x1="18" y1="50" x2="28" y2="50" class="detail"/>
    <line x1="72" y1="20" x2="80" y2="28" class="detail"/>
  </g>
</svg>